const ENDO_CARDS = [
  // ── FUNDAMENTALS ──
  {cat:'endo',q:'What are the TWO major systems that regulate all physiological activities?',a:'1. Nervous System. 2. Endocrine System. They INTERACT and work TOGETHER. The hypothalamus is the bridge connecting both systems.'},
  {cat:'endo',q:'Why are endocrine glands called "ductless glands"?',a:'They release hormones DIRECTLY INTO THE BLOOD without any duct. Compare with exocrine glands (salivary, sweat) which USE ducts.'},
  {cat:'endo',q:'What are the THREE chemical classes of hormones?',a:'1. STEROID – from cholesterol (cortisol, aldosterone, testosterone, estrogen). 2. PROTEIN/Polypeptide – water-soluble (insulin, GH, TSH, ADH, PTH). 3. TYROSINE DERIVATIVES – from tyrosine (T3, T4, adrenaline, noradrenaline, dopamine).'},
  {cat:'endo',q:'Where are receptors for each hormone class located?',a:'Cell MEMBRANE → Protein hormones + Catecholamines. CYTOPLASM → Steroid hormones. NUCLEUS → Thyroid hormones (T3, T4). Rule: More lipid-soluble = deeper into cell.'},
  {cat:'endo',q:'What are the 3 mechanisms by which hormone-receptor complex acts?',a:'1. Alters PERMEABILITY of cell membrane. 2. Activates INTRACELLULAR ENZYMES. 3. Activates GENES → mRNA → protein synthesis.'},
  {cat:'endo',q:'Hormones of the PINEAL gland and THYMUS.',a:'PINEAL: Melatonin (regulates circadian rhythm/sleep). THYMUS: Thymosin + Thymin (both essential for T-lymphocyte maturation).'},
  {cat:'endo',q:'What hormones does the KIDNEY secrete?',a:'1. ERYTHROPOIETIN – stimulates RBC production. 2. RENIN – activates angiotensin → aldosterone release. 3. CALCITRIOL (1,25-dihydroxycholecalciferol) – active vitamin D for calcium absorption.'},
  {cat:'endo',q:'What does the HEART secrete? What do they do?',a:'ANP (atria), BNP (ventricles), CNP. All promote Na⁺ and water EXCRETION → lower blood pressure. They counteract aldosterone\'s sodium-retaining effects.'},
  {cat:'endo',q:'What hormones does the PLACENTA secrete?',a:'HCG (maintains corpus luteum; basis of pregnancy tests), Human Chorionic Somatomammotropin, Estrogen, Progesterone.'},
  {cat:'endo',q:'What makes hormone receptors unique?',a:'Large PROTEIN molecules. Each receptor is specific for ONLY ONE hormone (lock-and-key). Cannot combine with any other hormone. Located in target cells only.'},
  // ── PITUITARY ──
  {cat:'endo',q:'Pituitary gland: location and connection to hypothalamus.',a:'Also called HYPOPHYSIS. Small gland at the BASE OF THE BRAIN. Connected to hypothalamus by the PITUITARY (HYPOPHYSEAL) STALK.'},
  {cat:'endo',q:'TWO main portions of the pituitary gland.',a:'1. ANTERIOR pituitary = ADENOHYPOPHYSIS (glandular tissue). 3 divisions: Pars distalis, Pars tuberalis, Pars intermedia. 2. POSTERIOR pituitary = NEUROHYPOPHYSIS (neural tissue). Contains Pars nervosa, Neural stalk, Median eminence.'},
  {cat:'endo',q:'Name the 6 hormones of the ANTERIOR pituitary.',a:'1. GH (Growth Hormone/STH) 2. TSH 3. ACTH 4. FSH 5. LH (ICSH in males) 6. PROLACTIN. Bonus 7th: beta-LIPOTROPIN.'},
  {cat:'endo',q:'How does the hypothalamus control the anterior pituitary?',a:'Via HYPOTHALAMO-HYPOPHYSEAL PORTAL VESSELS. Releasing hormones: GHRH, TRH, CRH, GnRH. Inhibiting: GHIH (somatostatin) inhibits GH; PIH (dopamine) inhibits prolactin.'},
  {cat:'endo',q:'What are pituicytes? Do they secrete hormones?',a:'Pituicytes = supporting (glial-like) cells of POSTERIOR pituitary. They DO NOT secrete any hormone. ADH and oxytocin arrive from hypothalamus via axons.'},
  {cat:'endo',q:'FSH + LH are collectively called what?',a:'GONADOTROPINS or GONADOTROPIC HORMONES. They act on the GONADS — ovaries and testes.'},
  {cat:'endo',q:'Why is the anterior pituitary called the "master gland"?',a:'It controls MANY other endocrine glands via tropic hormones (TSH→thyroid, ACTH→adrenal cortex, FSH+LH→gonads). BUT the hypothalamus controls the pituitary — making it "master of the master gland".'},
  // ── GROWTH HORMONE ──
  {cat:'endo',q:'What cells secrete GH? Chemical nature?',a:'Secreted by ACIDOPHILS (SOMATOTROPHS) of anterior pituitary. Chemical nature: PROTEIN hormone. Also called STH (Somatotropic Hormone).'},
  {cat:'endo',q:'What INCREASES GH secretion? (6 factors)',a:'1. Hypoglycemia 2. Fasting 3. Starvation 4. Exercise 5. Stress/trauma 6. EARLY stages of sleep. Rule: Body NEEDS ENERGY or is STRESSED → GH rises.'},
  {cat:'endo',q:'What DECREASES GH secretion?',a:'1. Hyperglycemia (high blood sugar). 2. Increased free fatty acids. 3. LATER stages of sleep. Rule: Energy is ABUNDANT → GH falls.'},
  {cat:'endo',q:'Differentiate: Gigantism vs Acromegaly vs Dwarfism.',a:'GIGANTISM = Excess GH in CHILDHOOD (before epiphyseal fusion) → bones grow in LENGTH → abnormal height. ACROMEGALY = Excess GH in ADULTS (after epiphyseal fusion) → bones THICKEN/BROADEN (jaw, hands, feet). DWARFISM = DEFICIENCY of GH in infancy/early childhood → restricted growth; normal intelligence.'},
  // ── OTHER ANTERIOR PITUITARY HORMONES ──
  {cat:'endo',q:'What does TSH do? What does ACTH do?',a:'TSH: Necessary for GROWTH and SECRETORY ACTIVITY of thyroid gland (without it → thyroid atrophies). ACTH: Necessary for STRUCTURAL INTEGRITY and SECRETORY ACTIVITY of adrenal cortex (without it → cortex atrophies).'},
  {cat:'endo',q:'What does FSH do in MALES vs FEMALES?',a:'MALES: With testosterone → accelerates SPERMIOGENESIS. FEMALES: Develops GRAAFIAN FOLLICLE, stimulates theca cells → ESTROGEN, promotes AROMATASE activity.'},
  {cat:'endo',q:'What does LH do in MALES vs FEMALES?',a:'MALES (= ICSH): Stimulates LEYDIG CELLS → secrete TESTOSTERONE. FEMALES: Causes follicle maturation, induces OVULATION, forms CORPUS LUTEUM, activates corpus luteum secretory function.'},
  {cat:'endo',q:'PROLACTIN and BETA-LIPOTROPIN functions.',a:'PROLACTIN: Final preparation of mammary glands for milk PRODUCTION and SECRETION. (Milk EJECTION = oxytocin!). BETA-LIPOTROPIN: Mobilizes FAT from adipose tissue → promotes LIPOLYSIS.'},
  // ── ADH AND OXYTOCIN ──
  {cat:'endo',q:'CRITICAL: Where are ADH and oxytocin MADE vs STORED?',a:'MADE in: HYPOTHALAMUS. Transported via: nerve fibers (hypothalamo-hypophyseal tract). STORED and RELEASED from: POSTERIOR PITUITARY. They are called NEUROHORMONES. Posterior pituitary does NOT make any hormone!'},
  {cat:'endo',q:'Two main actions of ADH.',a:'1. ANTIDIURETIC (main): Water RETENTION by renal collecting ducts → reduces urine output. 2. VASOPRESSOR: Vasoconstriction → increases BLOOD PRESSURE. Deficiency → DIABETES INSIPIDUS (massive dilute urine).'},
  {cat:'endo',q:'Diabetes Insipidus vs Diabetes Mellitus.',a:'Diabetes INSIPIDUS: ADH deficiency → massive DILUTE urine (tasteless). Posterior pituitary disorder. Diabetes MELLITUS: Insulin deficiency → SWEET urine (glucose). Pancreatic beta-cell failure. INSIPIDUS = tasteless; MELLITUS = sweet (honey-like).'},
  {cat:'endo',q:'Main actions of OXYTOCIN.',a:'1. PREGNANT uterus: CONTRACTIONS → expulsion of fetus (labor). 2. NON-PREGNANT uterus: facilitates SPERM TRANSPORT. 3. MILK EJECTION from mammary glands (let-down reflex). 4. MALES: increases during ejaculation → sperm release. Secreted in BOTH sexes!'},
  // ── THYROID GLAND ──
  {cat:'endo',q:'Thyroid gland anatomy and key features.',a:'Location: Root of NECK, either side of trachea. Structure: Two lobes + ISTHMUS. Weight: 20–40 g. Larger in FEMALES. Increases during PREGNANCY and LACTATION. Decreases at MENOPAUSE.'},
  {cat:'endo',q:'Histological structure of the thyroid gland.',a:'Closed FOLLICLES lined with cuboidal (FOLLICULAR) cells. Follicular cavity = THYROGLOBULIN (colloid, storage form). Follicular cells secrete T4 + T3. PARAFOLLICULAR CELLS (C cells) between follicles → secrete CALCITONIN.'},
  {cat:'endo',q:'3 thyroid hormones: which is more abundant? More potent?',a:'T4 (THYROXINE) – 90% of secretion – LESS potent. T3 (Triiodothyronine) – 9–10% – 4× MORE POTENT. CALCITONIN – from C cells. In peripheral tissues: T4 → converted to ACTIVE T3. Reverse T3 (rT3) = biologically INACTIVE.'},
  {cat:'endo',q:'Two essentials for thyroid hormone synthesis.',a:'1. IODINE (from diet → converted to iodide → absorbed from GI). 2. TYROSINE (amino acid from diet). Synthesis occurs IN THYROGLOBULIN in the follicular cavity.'},
  {cat:'endo',q:'Why is the thyroid UNIQUE among endocrine glands?',a:'Only endocrine gland that can store hormones for ~4 MONTHS (as thyroglobulin in follicles). Clinical: signs of deficiency appear ~4 months late; antithyroid drugs take weeks to work.'},
  {cat:'endo',q:'How are thyroid hormones transported in blood?',a:'Bound to 3 plasma proteins: 1. TBG (Thyroxine-Binding Globulin) – main carrier. 2. TBPA (Thyroxine-Binding Prealbumin). 3. Albumin. THYROGLOBULIN itself is NEVER released into blood (stays in gland).'},
  {cat:'endo',q:'Key metabolic effects of thyroid hormones.',a:'1. Increase BMR (calorigenic). 2. Increase PROTEIN synthesis. 3. Stimulate CARBOHYDRATE metabolism. 4. DECREASE FAT STORAGE (mobilize fat, lower cholesterol). 5. Increase HEAT PRODUCTION. 6. Increase cardiac activity. 7. Essential for NORMAL SLEEP and BODY WEIGHT.'},
  {cat:'endo',q:'HYPERTHYROIDISM: definition and 2 causes.',a:'Increased thyroid hormones. CAUSE 1: GRAVES\' DISEASE – autoimmune; antibodies mimic TSH → most common; may cause EXOPHTHALMOS. CAUSE 2: THYROID ADENOMA – localized tumor secreting excess T3/T4.'},
  {cat:'endo',q:'HYPOTHYROIDISM in adults vs. children.',a:'ADULTS → MYXEDEMA: edematous appearance, fatigue, bradycardia, cold intolerance, weight gain. Intelligence PRESERVED. CHILDREN → CRETINISM: stunted growth + INTELLECTUAL DISABILITY. Permanent brain damage if untreated.'},
  {cat:'endo',q:'What is GOITER?',a:'ENLARGEMENT of the thyroid gland. Occurs in BOTH: NON-TOXIC goiter (hypothyroidism – excess TSH drives growth) and TOXIC goiter (hyperthyroidism – e.g., Graves\' disease). Goiter = enlarged gland, not necessarily hyper or hypo.'},
  // ── PARATHYROID & CALCITONIN ──
  {cat:'endo',q:'Parathyroid gland anatomy and which cells secrete PTH.',a:'FOUR glands immediately BEHIND thyroid at upper and lower poles. Size: 6mm long, 3mm wide. Color: dark brown. PTH = PROTEIN hormone secreted by CHIEF CELLS.'},
  {cat:'endo',q:'Main function of PTH. Normal blood calcium?',a:'PTH maintains blood calcium at 9–11 mg/dL. Acts on 3 targets: 1. BONES – Ca²⁺ resorption. 2. KIDNEYS – Ca²⁺ reabsorption + activates vitamin D. 3. GI TRACT – Ca²⁺ absorption (via vitamin D).'},
  {cat:'endo',q:'How is PTH secretion regulated?',a:'INVERSELY proportional to blood CALCIUM: ↓Ca²⁺ → ↑PTH; ↑Ca²⁺ → ↓PTH. DIRECTLY proportional to blood PHOSPHATE: ↑phosphate → combines with Ca²⁺ → ↓free Ca²⁺ → ↑PTH.'},
  {cat:'endo',q:'What is CALCITONIN? Where from? What does it do?',a:'POLYPEPTIDE from PARAFOLLICULAR (C) CELLS in THYROID. Opposes PTH – LOWERS blood calcium: 1. Stimulates OSTEOBLASTS (bone formation). 2. Suppresses OSTEOCLASTS (reduces bone resorption). 3. Increases Ca²⁺ EXCRETION in urine. 4. Prevents Ca²⁺ absorption from intestine.'},
  // ── PANCREAS ENDOCRINE ──
  {cat:'endo',q:'Islets of Langerhans: how many? % of pancreatic mass?',a:'1 to 2 MILLION islets in the human pancreas. They represent ~2% of pancreatic mass but perform ALL endocrine functions.'},
  {cat:'endo',q:'4 cell types of the islets and what each secretes.',a:'A cells (alpha) → GLUCAGON. B cells (beta) → INSULIN. D cells (delta) → SOMATOSTATIN. F cells (PP) → PANCREATIC POLYPEPTIDE. Memory: A=glucAGON rises; B=Blood sugar falls (insulin).'},
  {cat:'endo',q:'INSULIN: what is it and all major actions.',a:'POLYPEPTIDE from B/beta-cells. The ONLY ANTIDIABETIC hormone. 1. LOWERS blood glucose. 2. Promotes PROTEIN synthesis. 3. Stimulates FAT synthesis + storage. 4. Promotes GROWTH (anabolic). Regulated by BLOOD GLUCOSE LEVEL.'},
  {cat:'endo',q:'Why is insulin the "only antidiabetic hormone"?',a:'ONLY insulin LOWERS blood glucose. ALL other hormones are DIABETOGENIC (raise glucose): glucagon, cortisol, GH, adrenaline, thyroid hormones. Insulin deficiency → DIABETES MELLITUS.'},
  {cat:'endo',q:'GLUCAGON: what is it and major actions.',a:'POLYPEPTIDE from A/alpha-cells. ANTAGONISTIC to insulin: 1. Raises BLOOD GLUCOSE (glycogenolysis + gluconeogenesis). 2. Increases LIPOLYSIS. 3. Converts PROTEINS to glucose. 4. Inhibits GASTRIC JUICE secretion. 5. Increases BILE secretion.'},
  {cat:'endo',q:'SOMATOSTATIN: what does it do?',a:'POLYPEPTIDE from hypothalamus + D/delta-cells (pancreas + GI). Within islets: inhibits BOTH alpha (glucagon) AND beta (insulin) cells. Hypothalamic somatostatin = GHIH → inhibits GH + TSH.'},
  {cat:'endo',q:'Why must blood glucose be tightly regulated?',a:'Glucose is the ONLY nutrient that can be used by BRAIN TISSUE, RETINA, and GERMINAL EPITHELIUM of gonads. These CANNOT switch to other fuels. Severe hypoglycemia → brain damage → coma → death.'},
  // ── ADRENAL CORTEX ──
  {cat:'endo',q:'Anatomy of the adrenal glands.',a:'TWO glands on the UPPER POLE of each kidney (suprarenal glands). Each has 2 parts: CORTEX (outer 80%) → STEROIDS. MEDULLA (inner 20%) → CATECHOLAMINES. Structurally and functionally completely different.'},
  {cat:'endo',q:'THREE zones of adrenal cortex and what each produces. (GFR)',a:'(Outside → inside): GLOMERULOSA → MINERALOCORTICOIDS (aldosterone). FASCICULATA → GLUCOCORTICOIDS (cortisol). RETICULARIS → SEX HORMONES (androgens). GFR = Go Find Resources.'},
  {cat:'endo',q:'TWO mineralocorticoids. Which is dominant?',a:'1. ALDOSTERONE – 90% of mineralocorticoid activity (DOMINANT). 2. 11-deoxycorticosterone – 10%. Aldosterone = LIFE-SAVING HORMONE. Total loss → death in 3 days to 2 weeks.'},
  {cat:'endo',q:'ALL functions of ALDOSTERONE.',a:'1. Increases Na⁺ REABSORPTION from kidney tubules. 2. Water follows Na⁺ → increases ECF VOLUME. 3. Increases BLOOD VOLUME → BLOOD PRESSURE. 4. Increases K⁺ EXCRETION (hypokalemia risk). 5. Increases H⁺ SECRETION. 6. Reabsorbs Na⁺ from salivary and sweat glands.'},
  {cat:'endo',q:'THREE glucocorticoids. Which is dominant?',a:'1. CORTISOL – 95% of glucocorticoid activity (DOMINANT). 2. Corticosterone – 4%. 3. Cortisone – 1%. Cortisol = "life-protecting hormone" (helps withstand stress + trauma).'},
  {cat:'endo',q:'ALL functions of GLUCOCORTICOIDS (cortisol).',a:'1. RAISES blood glucose (gluconeogenesis). 2. PROTEIN catabolism. 3. Mobilizes/redistributes FATS. 4. Increases WATER excretion. 5. Na⁺ retention, K⁺ excretion. 6. DECREASES blood CALCIUM. 7. Stimulates BONE RESORPTION. 8. INHIBITS bone formation. 9. Decreases EOSINOPHILS. 10. ANTI-INFLAMMATORY. 11. ANTIALLERGIC + IMMUNOSUPPRESSIVE.'},
  {cat:'endo',q:'Adrenal SEX HORMONES: zone and main types.',a:'From ZONA RETICULARIS. Mostly ANDROGENS: 1. DHEA (most active adrenal androgen). 2. Androstenedione. 3. Testosterone. Small amounts: estrogen + progesterone. Responsible for MASCULINE features.'},
  {cat:'endo',q:'3 disorders of adrenal cortex HYPERACTIVITY.',a:'1. CUSHING\'S SYNDROME: excess CORTISOL → moon face, buffalo hump, hyperglycemia, hypertension, muscle wasting. 2. CONN\'S SYNDROME: excess ALDOSTERONE (zona glomerulosa tumor) → hypertension + hypokalemia. 3. ADRENOGENITAL SYNDROME: excess SEX HORMONES.'},
  // ── ADRENAL MEDULLA ──
  {cat:'endo',q:'Adrenal medulla composition and what it secretes.',a:'Made of CHROMAFFIN CELLS. Two types: 90% → ADRENALINE-secreting; 10% → NORADRENALINE-secreting. THREE catecholamines: Adrenaline, Noradrenaline, Dopamine. Precursor: Amino acid TYROSINE.'},
  {cat:'endo',q:'Two types of adrenergic receptors.',a:'ALPHA receptors (alpha-1, alpha-2): mainly vasoconstriction. BETA receptors (beta-1, beta-2): heart rate, bronchodilation, vasodilation. Adrenaline: acts through BOTH equally. Noradrenaline: acts MAINLY through ALPHA receptors.'},
  {cat:'endo',q:'How does ADRENALINE affect METABOLISM?',a:'Increases O₂ consumption + CO₂ removal → raises BMR. Carbohydrate: Increases blood glucose via GLYCOGENOLYSIS. Fat: Mobilizes free fatty acids (LIPOLYSIS). Called a CALORIGENIC hormone.'},
  {cat:'endo',q:'How does ADRENALINE affect the HEART? (beta receptors)',a:'Stronger effects than noradrenaline: 1. Increases heart RATE (chronotropic). 2. Increases force of CONTRACTION (inotropic). 3. Increases EXCITABILITY (bathmotropic). 4. Increases CONDUCTIVITY (dromotropic). Overall: Increases cardiac OUTPUT.'},
  {cat:'endo',q:'Adrenaline vs noradrenaline on BLOOD VESSELS.',a:'NORADRENALINE: Constricts ALL blood vessels (alpha) → "GENERAL VASOCONSTRICTOR" → increases total peripheral resistance. ADRENALINE: Constricts most vessels (alpha) BUT DILATES skeletal muscle, liver, heart vessels via BETA-2 receptors → DECREASES total peripheral resistance.'},
  {cat:'endo',q:'Adrenaline vs noradrenaline on BLOOD PRESSURE.',a:'ADRENALINE: Raises SYSTOLIC (↑cardiac output). Lowers DIASTOLIC (↓TPR via beta-2). NORADRENALINE: Raises DIASTOLIC (↑TPR via alpha). Raises SYSTOLIC slightly. Both require GLUCOCORTICOIDS for full effect.'},
  {cat:'endo',q:'What smooth muscles do catecholamines CONTRACT vs RELAX?',a:'CONTRACT: Splenic capsule, GI sphincters, arrector pili, gallbladder, uterus, dilator pupillae. RELAX: Non-sphincteric GI tract, BRONCHIOLES (bronchodilation!), urinary bladder.'},
  {cat:'endo',q:'What is PHEOCHROMOCYTOMA?',a:'Tumor of adrenal medulla CHROMAFFIN cells → HYPERSECRETION of catecholamines. Features: PAROXYSMAL severe HYPERTENSION, sweating, palpitations, headache. Surgically curable. Test: elevated urine catecholamine metabolites (VMA).'},
  {cat:'endo',q:'DOPAMINE: actions and brain relevance.',a:'Catecholamine from adrenal medulla. In BRAIN: neurotransmitter in basal ganglia. Deficiency in basal ganglia → PARKINSONISM. When injected: vasoconstriction, vasodilation in mesentery, increases heart rate + systolic BP only. Does NOT affect diastolic BP.'},
  {cat:'endo',q:'"Fight or flight" response. Which hormone drives it?',a:'ADRENALINE. In acute stress: increases heart rate + cardiac output, raises blood glucose (glycogenolysis), bronchodilation (more O₂), increases blood flow to skeletal muscles (vasodilation via beta-2), increases mental alertness.'},
  // ── COMPARISONS ──
  {cat:'endo',q:'PTH vs CALCITONIN on blood calcium.',a:'PTH → RAISES Ca²⁺: bone resorption (osteoclasts), kidney Ca²⁺ reabsorption + activates Vit D, GI Ca²⁺ absorption. CALCITONIN → LOWERS Ca²⁺: stimulates osteoblasts, inhibits osteoclasts, increases renal Ca²⁺ excretion, prevents intestinal absorption. They are ANTAGONISTS.'},
  {cat:'endo',q:'INSULIN vs GLUCAGON comparison.',a:'INSULIN (B/beta cells) → LOWERS blood glucose: glycogen synthesis, fat storage, protein anabolism. GLUCAGON (A/alpha cells) → RAISES blood glucose: glycogenolysis, gluconeogenesis, lipolysis. ANTAGONISTS. ONLY insulin lowers glucose.'},
  {cat:'endo',q:'MYXEDEMA vs CRETINISM.',a:'Both = HYPOTHYROIDISM. MYXEDEMA (adults): edema, fatigue, bradycardia, cold intolerance, weight gain. Intelligence PRESERVED. CRETINISM (children): stunted growth + INTELLECTUAL DISABILITY. Brain damage PERMANENT if untreated.'},
  {cat:'endo',q:'GIGANTISM vs ACROMEGALY.',a:'Both = EXCESS GH. GIGANTISM = before epiphyseal fusion (childhood) → bones grow in LENGTH → extreme height. ACROMEGALY = after epiphyseal fusion (adults) → bones THICKEN and BROADEN → enlarged jaw, hands, feet.'},
  {cat:'endo',q:'CUSHING\'S vs CONN\'S SYNDROME.',a:'CUSHING\'S = excess CORTISOL: moon face, buffalo hump, obesity, hyperglycemia, hypertension, muscle wasting. CONN\'S = excess ALDOSTERONE (zona glomerulosa tumor): hypertension, hypokalemia, Na⁺ retention, metabolic alkalosis. BOTH have hypertension but different mechanisms!'},
  {cat:'endo',q:'ANTERIOR vs POSTERIOR pituitary comparison.',a:'ANTERIOR: GLANDULAR tissue; 6 hormones (GH, TSH, ACTH, FSH, LH, Prolactin); controlled by hypothalamic portal blood. POSTERIOR: NEURAL tissue (pituicytes + nerve fibers); STORES + RELEASES ADH + Oxytocin (made in hypothalamus); does NOT manufacture any hormone.'},
  {cat:'endo',q:'T3 vs T4 quick comparison.',a:'T4: 90% of output, LESS potent, 4 iodine atoms. T3: 9–10% of output, 4× MORE POTENT, 3 iodine atoms. T4 → converted to T3 in peripheral tissues. Both transported by TBG, TBPA, albumin. Thyroglobulin NEVER enters blood.'},
  // ── CLINICAL ──
  {cat:'endo',q:'Why does chronic steroid therapy cause OSTEOPOROSIS?',a:'Glucocorticoids: 1. STIMULATE osteoclasts → bone RESORPTION. 2. INHIBIT osteoblasts → stops bone FORMATION. 3. Decrease Ca²⁺ absorption from GI. 4. Increase Ca²⁺ excretion by kidneys. Net: Progressive bone loss.'},
  {cat:'endo',q:'How does GRAVES\' DISEASE cause hyperthyroidism?',a:'Autoimmune: TSH-receptor ANTIBODIES mimic TSH → bind TSH receptors → thyroid secretes excess T3+T4 UNCONTROLLED (antibodies don\'t respond to negative feedback). Unique: EXOPHTHALMOS (bulging eyes) from retro-orbital tissue swelling.'},
  {cat:'endo',q:'Most potent adrenal androgen?',a:'DEHYDROEPIANDROSTERONE (DHEA) – most active adrenal androgen. Secreted by zona RETICULARIS. Along with androstenedione and testosterone. Responsible for MASCULINE features of the body.'},
  {cat:'endo',q:'Significance of thyroid hormone storage for 4 months.',a:'1. Antithyroid drugs → symptom improvement takes WEEKS. 2. Thyroid failure → symptoms appear 4 MONTHS LATER. 3. Thyroid cancer → thyroglobulin is a TUMOR MARKER (normally never enters blood).'},
  {cat:'endo',q:'What happens if aldosterone is completely lost?',a:'Death in 3 DAYS TO 2 WEEKS: No Na⁺ retention → massive Na⁺ and water loss → severe hypovolemia → cardiovascular collapse → death. This is why it\'s called the "life-saving hormone." Addison\'s disease requires immediate hormone replacement.'},
  {cat:'endo',q:'Why does iodine deficiency cause goiter (non-toxic)?',a:'Iodine deficiency → cannot synthesize T3/T4 → T3/T4 FALL → pituitary senses low T3/T4 (no negative feedback) → secretes MORE TSH → excess TSH drives THYROID ENLARGEMENT (GOITER) → but still no T3/T4 (no iodine). Result: enlarged gland + hypothyroid state.'},
  {cat:'endo',q:'Why is adrenaline used to treat ANAPHYLAXIS?',a:'Anaphylaxis: massive vasodilation + bronchospasm → shock. Adrenaline reverses: 1. VASOCONSTRICTION (alpha) → raises BP. 2. BRONCHODILATION (beta-2) → opens airways. 3. Increases heart rate + force (beta-1) → improves circulation. Addresses ALL life-threatening aspects.'},
  {cat:'endo',q:'What is Parkinsonism? Endocrine relevance?',a:'DOPAMINE DEFICIENCY in BASAL GANGLIA. Substantia nigra → coordinates smooth movement. Without it → tremor, rigidity, bradykinesia, postural instability. Treatment: L-DOPA (crosses BBB → converted to dopamine). Adrenal medulla also makes dopamine but brain deficiency is the issue.'},
  {cat:'endo',q:'Type 1 vs Type 2 diabetes from endocrine perspective.',a:'TYPE 1: Autoimmune destruction of BETA CELLS → absolute insulin DEFICIENCY → must inject insulin. TYPE 2: Insulin RESISTANCE + relative insulin deficiency → initially managed with diet/drugs. Both: hyperglycemia + long-term complications risk.'},
  {cat:'endo',q:'Relationship between vitamin D and PTH.',a:'PTH ACTIVATES Vitamin D: stimulates kidney to convert 25-OH-Vit-D → active CALCITRIOL. Calcitriol then increases Ca²⁺ absorption from GI tract. So PTH raises blood calcium via bone + kidney + (indirectly) GI. Vitamin D deficiency → poor GI absorption even if PTH high.'},
  {cat:'endo',q:'Why is somatostatin also called GHIH?',a:'Same somatostatin molecule acts in two locations: 1. HYPOTHALAMUS: GHIH → inhibits GH and TSH from anterior pituitary. 2. PANCREAS (D cells): inhibits BOTH insulin and glucagon locally. Same molecule, different anatomical sources, related functions.'},
  // ── MASTER SUMMARY ──
  {cat:'endo',q:'Hormones that LOWER blood calcium.',a:'1. CALCITONIN – main calcium-lowering hormone (suppresses osteoclasts + increases renal Ca excretion). 2. GLUCOCORTICOIDS (cortisol) – decrease Ca absorption from GI. REMEMBER: PTH RAISES calcium!'},
  {cat:'endo',q:'ALL hormones that RAISE blood glucose.',a:'1. GLUCAGON (most direct). 2. CORTISOL (gluconeogenesis + inhibits tissue uptake). 3. GROWTH HORMONE (diabetogenic). 4. ADRENALINE (glycogenolysis). 5. THYROID HORMONES (↑metabolism). Insulin is the ONLY one that LOWERS glucose.'},
  {cat:'endo',q:'5 most exam-critical facts in Endocrine Physiology.',a:'1. GH by ACIDOPHILS; Gigantism (child) vs Acromegaly (adult). 2. ADH + Oxytocin MADE in HYPOTHALAMUS, stored in posterior pituitary. 3. T3 is 4× more potent than T4; thyroglobulin NEVER enters blood. 4. INSULIN only antidiabetic; A=glucagon, B=insulin. 5. GFR zones: Glomerulosa=aldosterone; Fasciculata=cortisol; Reticularis=androgens.'},
  {cat:'endo',q:'Classic EXAM TRAP mistakes in endocrinology.',a:'TRAP 1: Posterior pituitary MAKES hormones → FALSE. TRAP 2: Pituicytes secrete hormones → FALSE. TRAP 3: Alpha cells secrete INSULIN → FALSE (beta cells do). TRAP 4: Goiter = hypothyroidism only → FALSE (both). TRAP 5: Calcitonin stimulates osteoclasts → FALSE (suppresses them). TRAP 6: Adrenaline raises diastolic BP → FALSE (noradrenaline does more). TRAP 7: Glucocorticoids from zona GLOMERULOSA → FALSE (fasciculata!).'},
  {cat:'endo',q:'Complete list of secondary endocrine organs and their hormones.',a:'KIDNEY: Erythropoietin, Renin, Calcitriol. HEART: ANP, BNP, CNP. PLACENTA: HCG, Estrogen, Progesterone, Somatomammotropin. PINEAL: Melatonin. THYMUS: Thymosin, Thymin. GI TRACT: Gastrin, Secretin, CCK, GIP.'},
  {cat:'endo',q:'Master hormone-source gland overview.',a:'Hypothalamus: GHRH, GHIH, TRH, CRH, GnRH, PIH. Anterior Pituitary: GH, TSH, ACTH, FSH, LH, Prolactin. Posterior Pituitary: stores ADH + Oxytocin. Thyroid: T4, T3, Calcitonin. Parathyroid: PTH. Pancreas: Insulin(B), Glucagon(A), Somatostatin(D), PP(F). Adrenal cortex: Aldosterone, Cortisol, Androgens. Adrenal medulla: Adrenaline, Noradrenaline, Dopamine.'},
  {cat:'endo',q:'Complete list of endocrine disorders to know.',a:'PITUITARY: Gigantism, Acromegaly, Dwarfism, Diabetes Insipidus. THYROID: Graves\' disease, Thyroid adenoma, Myxedema (adults), Cretinism (children), Goiter. PARATHYROID: Hyper → hypercalcemia + hypophosphatemia. PANCREAS: Diabetes Mellitus, Hypoglycemia. ADRENAL CORTEX: Cushing\'s, Conn\'s, Adrenogenital syndrome, Addison\'s. ADRENAL MEDULLA: Pheochromocytoma. DOPAMINE (brain): Parkinsonism.'},
];

const ENDO_QUIZ_DATA = [
  // MCQ (40)
  {type:'mcq',q:'Endocrine glands are called ductless glands because:',opts:['They have no physiological role','Hormones are released directly into blood without any duct','They are too small to contain ducts','Their secretions remain stored inside'],ans:1,exp:'Endocrine glands secrete hormones directly into the bloodstream, bypassing any duct — the defining distinction from exocrine glands.'},
  {type:'mcq',q:'Which is classified as a PROTEIN hormone?',opts:['Cortisol','Aldosterone','Insulin','Thyroxine (T4)'],ans:2,exp:'Insulin is a polypeptide hormone from beta cells. Cortisol and aldosterone are steroids; T4 is a tyrosine derivative.'},
  {type:'mcq',q:'Thyroxine (T4) belongs to which chemical class?',opts:['Steroid hormones','Protein hormones','Tyrosine derivatives','Mineralocorticoids'],ans:2,exp:'T4, T3, adrenaline, noradrenaline, and dopamine are all synthesized from tyrosine (tyrosine derivatives).'},
  {type:'mcq',q:'Where are receptors for STEROID hormones located?',opts:['Cell membrane','Nucleus','Cytoplasm','Blood plasma'],ans:2,exp:'Steroids are lipid-soluble, so they cross the cell membrane and bind cytoplasmic receptors. The complex then moves to the nucleus.'},
  {type:'mcq',q:'Where are receptors for THYROID hormones located?',opts:['Cell membrane','Cytoplasm','Nucleus','Golgi apparatus'],ans:2,exp:'Thyroid hormones directly enter the nucleus and bind nuclear receptors, activating gene transcription.'},
  {type:'mcq',q:'The pituitary gland is also known as:',opts:['Pineal gland','Islets of Langerhans','Hypophysis','Thymus'],ans:2,exp:'Hypophysis is the scientific name for the pituitary gland, sitting at the base of the brain connected to the hypothalamus via the hypophyseal stalk.'},
  {type:'mcq',q:'The anterior pituitary is scientifically known as:',opts:['Neurohypophysis','Adenohypophysis','Pars nervosa','Median eminence'],ans:1,exp:'Adenohypophysis = anterior pituitary (glandular tissue). Neurohypophysis = posterior pituitary (neural tissue).'},
  {type:'mcq',q:'How many hormones does the anterior pituitary secrete?',opts:['2','4','6','8'],ans:2,exp:'Anterior pituitary secretes 6 classical hormones: GH, TSH, ACTH, FSH, LH, and Prolactin. A 7th, beta-lipotropin, is also secreted.'},
  {type:'mcq',q:'Growth hormone is secreted by which cells of the anterior pituitary?',opts:['Basophils','Acidophils (somatotrophs)','Gonadotrophs','Chromophobes'],ans:1,exp:'GH and prolactin are secreted by acidophilic somatotrophs. Basophils secrete TSH, ACTH, FSH, and LH.'},
  {type:'mcq',q:'Which of the following INCREASES GH secretion?',opts:['Hyperglycemia','Increased free fatty acids','Later stages of deep sleep','Exercise and physical stress'],ans:3,exp:'GH increases with: hypoglycemia, fasting, starvation, exercise, stress/trauma, and EARLY sleep stages.'},
  {type:'mcq',q:'Gigantism is caused by:',opts:['GH deficiency in adults','Excess GH in childhood/pre-adult life','GH deficiency in early infancy','Excess TSH during childhood'],ans:1,exp:'Gigantism = excess GH BEFORE epiphyseal fusion. Growth plates open → long bones grow excessively → abnormally tall stature.'},
  {type:'mcq',q:'Acromegaly is caused by:',opts:['GH deficiency in adults','Excess TSH in adults','Excess GH in adults AFTER epiphyseal fusion','ADH deficiency after puberty'],ans:2,exp:'After epiphyseal fusion, bones cannot grow in length. Excess GH causes thickening of bones, particularly hands, feet, and jaw.'},
  {type:'mcq',q:'Diabetes insipidus is caused by:',opts:['Excess insulin','Excess GH','Deficiency of ADH','Excess TSH'],ans:2,exp:'Without ADH, renal collecting ducts cannot reabsorb water → massive dilute urine. Insipidus = tasteless, unlike mellitus (sweet).'},
  {type:'mcq',q:'ADH and oxytocin are actually SYNTHESIZED in:',opts:['Anterior pituitary','Posterior pituitary','Hypothalamus','Adrenal cortex'],ans:2,exp:'ADH and oxytocin are synthesized in hypothalamic nuclei, transported via axons to posterior pituitary for storage. They are neurohormones.'},
  {type:'mcq',q:'The MAJOR function of ADH is:',opts:['Stimulate milk ejection','Retention of water by the kidneys','Stimulate ovulation','Increase blood glucose'],ans:1,exp:'ADH increases water reabsorption in renal collecting ducts, reducing urine volume and maintaining blood osmolarity.'},
  {type:'mcq',q:'Normal weight of the thyroid gland in adults:',opts:['5–10 grams','20–40 grams','80–100 grams','200–250 grams'],ans:1,exp:'Thyroid weighs 20–40 g, has two lobes connected by an isthmus, larger in females, varies with hormonal status.'},
  {type:'mcq',q:'What % of thyroid secretion does T4 represent?',opts:['50%','70%','80%','90%'],ans:3,exp:'T4 = ~90% of output; T3 = 9–10%. T3 is 4× more potent. In peripheral tissues, T4 is converted to T3.'},
  {type:'mcq',q:'Calcitonin is secreted by which cells of the thyroid?',opts:['Follicular cells','Chief cells of parathyroid','Parafollicular cells (C cells)','Beta cells of pancreas'],ans:2,exp:'Parafollicular/C cells secrete calcitonin. Follicular cells secrete T3 and T4. Easy mix-up trap!'},
  {type:'mcq',q:'Which is NOT an effect of thyroid hormones?',opts:['Increases BMR','Increases protein synthesis','Stimulates carbohydrate and fat metabolism','Increases fat storage'],ans:3,exp:'Thyroid hormones DECREASE fat storage — mobilize fat, increase lipolysis, lower cholesterol. Hyperthyroid patients lose weight.'},
  {type:'mcq',q:'Hypothyroidism in ADULTS leads to:',opts:['Gigantism','Graves\' disease','Myxedema','Cretinism'],ans:2,exp:'Myxedema = adult hypothyroidism: edema, weight gain, fatigue, cold intolerance, bradycardia. Cretinism = childhood hypothyroidism.'},
  {type:'mcq',q:'PTH is secreted by:',opts:['Follicular cells of thyroid','Chief cells of parathyroid','Parafollicular cells of thyroid','Alpha cells of pancreas'],ans:1,exp:'PTH = protein hormone from chief cells of the 4 parathyroid glands (behind thyroid). Principal regulator of blood calcium.'},
  {type:'mcq',q:'PTH maintains blood calcium within:',opts:['1–2 mg/dL','9–11 mg/dL','50–100 mg/dL','120–140 mmol/L'],ans:1,exp:'PTH keeps Ca²⁺ at 9–11 mg/dL via bone resorption, renal Ca²⁺ reabsorption, and intestinal Ca²⁺ absorption (via Vit D).'},
  {type:'mcq',q:'Effect of CALCITONIN on blood calcium:',opts:['Increases blood calcium','No significant effect','Decreases blood calcium','First increases then decreases'],ans:2,exp:'Calcitonin opposes PTH: suppresses osteoclasts + stimulates osteoblasts, increases renal calcium excretion, prevents intestinal absorption.'},
  {type:'mcq',q:'Insulin is secreted by which cells?',opts:['A cells (alpha)','B cells (beta)','D cells (delta)','F cells (PP)'],ans:1,exp:'B for Beta = B for Blood sugar (lowers it). A/alpha → glucagon. D/delta → somatostatin. F/PP → pancreatic polypeptide.'},
  {type:'mcq',q:'Insulin is uniquely described as:',opts:['The only antidiabetic hormone','A steroid from alpha cells','Antagonistic to its own function','Secreted only in response to low blood glucose'],ans:0,exp:'Insulin is the ONLY hormone that lowers blood glucose. All others (glucagon, cortisol, GH, adrenaline) are diabetogenic.'},
  {type:'mcq',q:'Glucagon\'s actions are:',opts:['Identical to insulin','Synergistic with insulin','Antagonistic to insulin','Inhibitory to somatostatin'],ans:2,exp:'Glucagon raises blood glucose via glycogenolysis, gluconeogenesis, lipolysis — exactly opposing insulin\'s effects.'},
  {type:'mcq',q:'Somatostatin within the islets acts to:',opts:['Stimulate insulin only','Stimulate glucagon only','Inhibit BOTH insulin AND glucagon','Stimulate TSH and GH'],ans:2,exp:'Pancreatic somatostatin (from D/delta cells) inhibits both alpha cells (glucagon) and beta cells (insulin) — paracrine brake.'},
  {type:'mcq',q:'Adrenal cortex constitutes what % of total adrenal mass?',opts:['20%','50%','60%','80%'],ans:3,exp:'Cortex = outer 80% (three zones: glomerulosa, fasciculata, reticularis). Medulla = inner 20% (chromaffin cells).'},
  {type:'mcq',q:'Aldosterone provides what % of total mineralocorticoid activity?',opts:['50%','70%','90%','100%'],ans:2,exp:'Aldosterone = 90% of mineralocorticoid activity. Remaining 10% from 11-deoxycorticosterone. Life-saving hormone.'},
  {type:'mcq',q:'Total loss of aldosterone without treatment causes death within:',opts:['2–6 hours','3 days to 2 weeks','1–2 months','6–12 months'],ans:1,exp:'Without aldosterone, cannot retain Na⁺ and water → severe hypovolemia → cardiovascular collapse → death in days to weeks.'},
  {type:'mcq',q:'Cushing\'s syndrome is caused by:',opts:['Hyposecretion of cortisol','Deficiency of aldosterone','Hypersecretion of glucocorticoids (cortisol)','Tumor in zona glomerulosa causing aldosterone excess'],ans:2,exp:'Cushing\'s = excess cortisol → moon face, buffalo hump, hyperglycemia, hypertension, muscle wasting. Conn\'s = excess aldosterone.'},
  {type:'mcq',q:'Conn\'s syndrome is caused by:',opts:['Excess cortisol from fasciculata','Tumor in zona glomerulosa causing excess aldosterone','ADH deficiency from posterior pituitary','GH hyposecretion'],ans:1,exp:'Conn\'s = adenoma in zona glomerulosa → autonomous aldosterone → hypertension, hypokalemia, Na⁺ retention, metabolic alkalosis.'},
  {type:'mcq',q:'Pheochromocytoma is characterized by:',opts:['Excess insulin from beta cells','Hyposecretion of catecholamines','Hypersecretion of catecholamines from adrenal medulla','Cortisol deficiency'],ans:2,exp:'Pheochromocytoma = chromaffin cell tumor → massive catecholamine hypersecretion → paroxysmal hypertension, sweating, palpitations.'},
  {type:'mcq',q:'Noradrenaline is the "general vasoconstrictor" because:',opts:['It dilates blood vessels','It constricts ALL blood vessels via alpha receptors','It acts only on coronary arteries','It decreases total peripheral resistance'],ans:1,exp:'Noradrenaline acts through alpha receptors to constrict ALL blood vessels, increasing total peripheral resistance and diastolic pressure.'},
  {type:'mcq',q:'The "fight or flight" hormone is:',opts:['Noradrenaline','Cortisol','Adrenaline','Glucagon'],ans:2,exp:'Adrenaline (epinephrine) is the fight or flight hormone, mobilizing energy and preparing the body for action in acute stress.'},
  {type:'mcq',q:'Which adrenal zone produces glucocorticoids?',opts:['Zona glomerulosa','Zona fasciculata','Zona reticularis','Adrenal medulla'],ans:1,exp:'Zona FASCICULATA → glucocorticoids (cortisol). Glomerulosa → mineralocorticoids. Reticularis → sex hormones. GFR rule.'},
  {type:'mcq',q:'Dopamine deficiency in the basal ganglia causes:',opts:['Myxedema','Pheochromocytoma','Parkinsonism','Cushing\'s syndrome'],ans:2,exp:'Dopamine from substantia nigra coordinates smooth movement. Deficiency → tremor, rigidity, bradykinesia. Treatment: L-DOPA.'},
  {type:'mcq',q:'Which hormone is secreted by the KIDNEY?',opts:['ANP','Melatonin','Erythropoietin','Thymosin'],ans:2,exp:'Kidney secretes: Erythropoietin (stimulates RBC production), Renin (angiotensin-aldosterone system), and Calcitriol (active Vit D).'},
  {type:'mcq',q:'HCG is secreted by the placenta and is the basis for:',opts:['Diabetes diagnosis','Pregnancy tests','Thyroid function tests','Adrenal function tests'],ans:1,exp:'HCG (Human Chorionic Gonadotropin) from placenta maintains corpus luteum in early pregnancy; its detection = basis of pregnancy tests.'},
  {type:'mcq',q:'Cortisol provides what % of total glucocorticoid activity?',opts:['50%','75%','95%','100%'],ans:2,exp:'Cortisol = 95%, corticosterone = 4%, cortisone = 1%. Cortisol = life-protecting hormone enabling body to withstand stress and trauma.'},
  // T/F (40)
  {type:'tf',q:'The nervous system and endocrine system function completely independently.',ans:false,exp:'These two systems closely interact (neuroendocrine integration). The hypothalamus is the master link — it produces hormones and controls the pituitary.'},
  {type:'tf',q:'Cortisol is classified as a steroid hormone.',ans:true,exp:'Cortisol is a glucocorticoid steroid derived from cholesterol, secreted by zona fasciculata. It is lipid-soluble and binds cytoplasmic receptors.'},
  {type:'tf',q:'ADH is a polypeptide (protein) hormone.',ans:true,exp:'ADH is a 9-amino-acid polypeptide, so its receptors are on the CELL MEMBRANE (not cytoplasm like steroids, or nucleus like thyroid hormones).'},
  {type:'tf',q:'Each hormone receptor can combine with multiple different hormones.',ans:false,exp:'Each receptor is strictly specific for ONE single hormone — lock-and-key specificity ensures the right hormone acts on the right target cell.'},
  {type:'tf',q:'Protein hormones (insulin, GH, TSH) bind receptors on the cell membrane.',ans:true,exp:'Protein hormones are large, water-soluble and cannot cross the lipid bilayer. They bind surface membrane receptors and signal via second messengers.'},
  {type:'tf',q:'The anterior pituitary is the "master gland" of the endocrine system.',ans:true,exp:'It produces tropic hormones (TSH, ACTH, FSH, LH) controlling thyroid, adrenal cortex, and gonads. However, the hypothalamus controls the pituitary.'},
  {type:'tf',q:'The anterior pituitary has only TWO divisions: pars distalis and pars tuberalis.',ans:false,exp:'Anterior pituitary (adenohypophysis) has THREE divisions: Pars distalis, Pars tuberalis, and Pars intermedia.'},
  {type:'tf',q:'GH is also known as somatotropic hormone (STH).',ans:true,exp:'GH = STH = somatotropin. Produced by acidophilic somatotrophs. Drives growth of almost all tissues by increasing cell size and number.'},
  {type:'tf',q:'Hypoglycemia DECREASES GH secretion.',ans:false,exp:'Hypoglycemia STIMULATES GH secretion (basis of insulin tolerance test for GH deficiency). Low glucose signals energy deficit, prompting GH to mobilize fat.'},
  {type:'tf',q:'The posterior pituitary SYNTHESIZES ADH and oxytocin.',ans:false,exp:'ADH and oxytocin are SYNTHESIZED in hypothalamic nuclei, transported via axons to posterior pituitary where they are STORED and RELEASED.'},
  {type:'tf',q:'Pituicytes, the cells of posterior pituitary, secrete ADH and oxytocin.',ans:false,exp:'Pituicytes are glial-like supporting cells only — they do NOT secrete any hormone. Hormones arrive from hypothalamus.'},
  {type:'tf',q:'ADH has a vasopressor action that increases blood pressure.',ans:true,exp:'ADH = "vasopressin." By constricting blood vessels it increases total peripheral resistance and blood pressure. Used in vasodilatory shock.'},
  {type:'tf',q:'Oxytocin is secreted exclusively in females.',ans:false,exp:'Oxytocin is secreted in BOTH sexes. In males, it rises during ejaculation and facilitates sperm transport. In both sexes: milk ejection reflex.'},
  {type:'tf',q:'The thyroid gland is larger in females than in males.',ans:true,exp:'Thyroid is physiologically larger in females, varying with menstrual cycle, pregnancy (increases), lactation (increases), menopause (decreases).'},
  {type:'tf',q:'T3 is 4 times more potent than T4.',ans:true,exp:'T3 is 4× more potent despite being only 9–10% of thyroid output vs T4\'s 90%. T4 is converted to T3 in peripheral tissues.'},
  {type:'tf',q:'Thyroglobulin is released directly into the bloodstream along with T3 and T4.',ans:false,exp:'Thyroglobulin is the storage scaffold in the follicular cavity — it STAYS in the thyroid. Only T3 and T4 are released into blood.'},
  {type:'tf',q:'Reverse T3 (rT3) is biologically active.',ans:false,exp:'Reverse T3 is biologically INACTIVE. T4 losing iodine from outer ring → active T3. Losing from inner ring → inactive rT3.'},
  {type:'tf',q:'The thyroid can store its hormones for approximately 4 months.',ans:true,exp:'Unique among endocrine glands! Stored as thyroglobulin in follicles. Antithyroid drugs take weeks; deficiency symptoms appear ~4 months late.'},
  {type:'tf',q:'Goiter occurs ONLY in hypothyroidism.',ans:false,exp:'Goiter occurs in BOTH: non-toxic goiter (hypothyroidism, ↑TSH drives gland enlargement) AND toxic goiter (hyperthyroidism, e.g., Graves\' disease).'},
  {type:'tf',q:'PTH secretion is inversely proportional to blood calcium level.',ans:true,exp:'↓Blood Ca²⁺ → ↑PTH secretion (negative feedback). PTH then restores calcium via bone resorption, renal reabsorption, and GI absorption.'},
  {type:'tf',q:'Calcitonin stimulates osteoclastic activity (bone resorption).',ans:false,exp:'Calcitonin SUPPRESSES osteoclasts and STIMULATES osteoblasts (bone formation). Net: calcium deposited into bone → blood calcium FALLS.'},
  {type:'tf',q:'The human pancreas contains 1 to 2 million islets of Langerhans.',ans:true,exp:'These 1–2 million micro-clusters represent only ~2% of pancreatic mass, yet contain 4 cell types secreting 4 different hormones.'},
  {type:'tf',q:'Alpha (A) cells of the islets secrete insulin.',ans:false,exp:'ALPHA cells secrete GLUCAGON! BETA (B) cells secrete insulin. Most common exam error. A = raises glucose; B = lowers it.'},
  {type:'tf',q:'Insulin is the only antidiabetic hormone secreted in the body.',ans:true,exp:'All other metabolically active hormones are diabetogenic (raise blood glucose). ONLY insulin lowers glucose. Without it → type 1 diabetes.'},
  {type:'tf',q:'Glucagon raises the blood glucose level.',ans:true,exp:'Glucagon raises glucose via: glycogenolysis in liver/muscle, gluconeogenesis, lipolysis. Also increases bile and inhibits gastric juice.'},
  {type:'tf',q:'Pancreatic somatostatin is also known as GHIH.',ans:true,exp:'Somatostatin wears two hats: pancreatic somatostatin inhibits insulin and glucagon; hypothalamic somatostatin (GHIH) suppresses GH and TSH.'},
  {type:'tf',q:'Adrenal glands are situated at the LOWER pole of each kidney.',ans:false,exp:'Adrenal glands sit on the UPPER pole of each kidney — called "suprarenal glands" (supra = above). Embedded in perirenal fat above kidneys.'},
  {type:'tf',q:'Aldosterone increases sodium reabsorption from renal tubules.',ans:true,exp:'Aldosterone acts on principal cells of distal tubule and collecting duct → increases Na⁺/K⁺-ATPase → Na⁺ and water reabsorption, K⁺ excretion.'},
  {type:'tf',q:'Glucocorticoids are secreted mainly by zona GLOMERULOSA.',ans:false,exp:'FASCICULATA → glucocorticoids. Glomerulosa → mineralocorticoids. Reticularis → sex hormones. GFR rule: Glomerulosa=Salt, Fasciculata=Sugar, Reticularis=Sex.'},
  {type:'tf',q:'Glucocorticoids promote bone formation by stimulating osteoblastic activity.',ans:false,exp:'Glucocorticoids STIMULATE bone resorption (osteoclastic) and INHIBIT bone formation (osteoblastic). This is why long-term steroid therapy causes osteoporosis.'},
  {type:'tf',q:'Adrenal sex hormones from zona reticularis are mostly androgens.',ans:true,exp:'Zona reticularis mainly secretes androgens: DHEA (most active), androstenedione, testosterone. Small amounts of estrogen and progesterone also produced.'},
  {type:'tf',q:'The adrenal medulla constitutes 80% of the total adrenal gland mass.',ans:false,exp:'Adrenal medulla = INNER 20%. Adrenal cortex = OUTER 80%. Medulla: chromaffin cells — 90% secrete adrenaline, 10% secrete noradrenaline.'},
  {type:'tf',q:'Adrenaline acts through BOTH alpha and beta adrenergic receptors equally.',ans:true,exp:'Adrenaline acts through both alpha and beta receptors equally. Noradrenaline acts MAINLY through alpha receptors. Hence different cardiovascular effects.'},
  {type:'tf',q:'Noradrenaline influences metabolic functions MORE than adrenaline.',ans:false,exp:'ADRENALINE influences metabolic functions MORE than noradrenaline. Adrenaline increases BMR, blood glucose (glycogenolysis), and mobilizes fatty acids — calorigenic hormone.'},
  {type:'tf',q:'Adrenaline causes bronchodilation of the bronchioles.',ans:true,exp:'Adrenaline dilates bronchioles via beta-2 receptors — reducing airway resistance. This is why epinephrine is first-line treatment for anaphylaxis.'},
  {type:'tf',q:'Dopamine deficiency in the basal ganglia produces Parkinsonism.',ans:true,exp:'Dopamine from substantia nigra modulates basal ganglia circuits controlling smooth movement. Deficiency → tremor, rigidity, bradykinesia. Treatment: L-DOPA.'},
  {type:'tf',q:'In Graves\' disease, TSH levels are elevated because the thyroid is stimulated.',ans:false,exp:'In Graves\' disease, TSH-receptor ANTIBODIES (not TSH) stimulate the thyroid. TSH is actually LOW due to negative feedback from high T3/T4. The antibodies bypass normal feedback.'},
  {type:'tf',q:'PTH and calcitonin are antagonists in calcium regulation.',ans:true,exp:'PTH raises blood calcium; calcitonin lowers it. They are a classic antagonistic hormone pair, like insulin/glucagon for glucose regulation.'},
  {type:'tf',q:'The brain can use fatty acids as an alternative fuel source when glucose is low.',ans:false,exp:'The blood-brain barrier is IMPERMEABLE to fatty acids. Brain neurons CANNOT use alternative fuels. Hypoglycemia → brain energy failure → seizures → coma → death.'},
  {type:'tf',q:'In type 1 diabetes, the primary problem is insulin resistance.',ans:false,exp:'Type 1 = autoimmune destruction of BETA CELLS → absolute insulin DEFICIENCY. Type 2 = insulin RESISTANCE + relative deficiency. Type 1 requires insulin injection.'},
];

/* ═══════════════════════════════════════════════
   CARDIOVASCULAR SYSTEM — FLASH CARDS (70)
═══════════════════════════════════════════════ */
const CVS_CARDS = [
  // T/F Cards (1–30)
  {cat:'cvs',q:'How many times does the average heart contract over an 80-year lifetime?',a:'Approximately 3 billion times (~100,000 beats/day).'},
  {cat:'cvs',q:'When does the heart begin its function?',a:'Within weeks of conception — it starts supplying the body with nutrients even before birth.'},
  {cat:'cvs',q:'What is the PRIMARY function of the heart?',a:'To pump blood through the arteries, capillaries, and veins (~60,000 miles of vessels in the adult body).'},
  {cat:'cvs',q:'Is cardiac muscle voluntary or involuntary?',a:'INVOLUNTARY. It contracts without conscious stimulation. It is found only within the heart.'},
  {cat:'cvs',q:'What language does the word "cardiac" derive from, and what does it mean?',a:'Greek — from the word "kardia" meaning "heart."'},
  {cat:'cvs',q:'What are the two layers of the pericardium?',a:'Fibrous pericardium (outer) and serous pericardium (inner). The serous is further divided into two sub-layers with the pericardial cavity between them.'},
  {cat:'cvs',q:'What is the epicardium, and where is it located?',a:'The epicardium is the visceral (innermost) layer of the serous pericardium, lying directly on the surface of the heart. It consists of connective tissue.'},
  {cat:'cvs',q:'Which atrium receives oxygenated blood from the pulmonary veins?',a:'The LEFT atrium. The right atrium receives DEOXYGENATED blood from the superior and inferior vena cava.'},
  {cat:'cvs',q:'Why does the left ventricle have thicker walls than the right?',a:'It must pump oxygenated blood to the ENTIRE body (systemic circulation), requiring greater pressure. The right ventricle only pumps to the lungs.'},
  {cat:'cvs',q:'Where is the tricuspid valve located and what does it do?',a:'Between the RIGHT atrium and RIGHT ventricle. It allows blood to flow from atrium to ventricle during diastole and snaps shut during systole to prevent backflow.'},
  {cat:'cvs',q:'Where is the SA node located and what is its role?',a:'In the RIGHT atrium. It is the natural pacemaker — releases regular electrical stimuli that initiate each heartbeat.'},
  {cat:'cvs',q:'What is the significance of the AV node delay (~0.1 second)?',a:'It allows the atria to contract and EMPTY their contents into the ventricles before ventricular stimulation occurs. It also prevents rapid (fibrillatory) conduction.'},
  {cat:'cvs',q:'What are Purkinje fibres and why are they important?',a:'Specialised cardiomyocytes in the INNER VENTRICULAR WALLS that conduct action potentials most quickly. They enable synchronised ventricular contraction, maintaining consistent rhythm.'},
  {cat:'cvs',q:'Do all arteries carry oxygenated blood?',a:'NO. The PULMONARY ARTERY is the exception — it carries deoxygenated blood from the right ventricle to the lungs.'},
  {cat:'cvs',q:'Why do veins have one-way venous valves?',a:'To prevent BACKFLOW caused by gravity. Veins have low blood pressure and rely on skeletal muscle contractions to push blood toward the heart.'},
  {cat:'cvs',q:'Describe the wall of a capillary.',a:'A SINGLE layer of endothelial cells — thin enough for diffusion of O₂, water, lipids, CO₂, and urea between blood and tissues.'},
  {cat:'cvs',q:'What are the three types of capillaries?',a:'1) CONTINUOUS — sealed epithelium, only small molecules/water/ions.\n2) FENESTRATED — openings for larger molecules.\n3) SINUSOIDAL — largest openings; allow RBCs and serum proteins through.'},
  {cat:'cvs',q:'What is the normal resting heart rate range for adults?',a:'60–100 bpm. Below 60 = bradycardia; above 100 = tachycardia. Average: ~70 bpm (males), ~75 bpm (females).'},
  {cat:'cvs',q:'Define bradycardia and tachycardia.',a:'BRADYCARDIA = heart rate < 60 bpm. TACHYCARDIA = heart rate > 100 bpm.'},
  {cat:'cvs',q:'What does the P wave on an ECG represent?',a:'Atrial stimulation (depolarization) — the atria are electrically stimulated to pump blood into the ventricles.'},
  {cat:'cvs',q:'What is normal resting blood pressure and in what units?',a:'~120/80 mmHg. 120 = systolic (peak during contraction); 80 = diastolic (resting phase).'},
  {cat:'cvs',q:'Define systolic pressure and when is it measured.',a:'The PEAK pressure in the arteries during ventricular SYSTOLE (contraction). Average: 120 mmHg.'},
  {cat:'cvs',q:'What is the aorta?',a:'The LARGEST artery in the systemic circuit. It receives blood from the left ventricle and branches to all parts of the body. It is elastic and can distend.'},
  {cat:'cvs',q:'What are the superior and inferior vena cavae?',a:'Two large veins returning de-oxygenated blood to the right atrium. SVC = upper body. IVC = lower body.'},
  {cat:'cvs',q:'When does atherosclerosis typically begin?',a:'In EARLY ADOLESCENCE, but is asymptomatic for decades. It becomes serious when it interferes with coronary or cerebral circulation.'},
  {cat:'cvs',q:'What is a thrombus and how is it formed?',a:'A blood clot — the final product of coagulation. Formed by PLATELET AGGREGATION (platelet plug) + activation of the humoral coagulation system (clotting factors).'},
  {cat:'cvs',q:'Distinguish between thrombosis and embolism.',a:'THROMBOSIS = clot forms IN PLACE within a vessel. EMBOLISM = an object (embolus) MIGRATES from one location and blocks a vessel elsewhere.'},
  {cat:'cvs',q:'What percentage of strokes are ischemic vs hemorrhagic?',a:'~80–90% are ISCHEMIC (vessel occlusion). ~10–20% are HEMORRHAGIC (vessel rupture). Both interrupt blood supply to the brain.'},
  {cat:'cvs',q:'What is the bundle of His and why is it unique?',a:'A collection of cardiac muscle cells specialised for electrical conduction. It is the ONLY site where action potential can conduct from the ATRIA to the VENTRICLES.'},
  {cat:'cvs',q:'What type of capillary allows RBCs and serum proteins to pass through?',a:'SINUSOIDAL capillaries — special fenestrated capillaries with the largest openings. Found in liver, bone marrow, spleen.'},
  // MCQ Cards (31–70)
  {cat:'cvs',q:'What distinguishes cardiac muscle from skeletal muscle?',a:'Cardiac muscle is SELF-EXCITING (autorhythmic) — it has its own conduction system and does not require conscious or reflex nervous stimuli to contract.'},
  {cat:'cvs',q:'What are the 5 elements of the cardiac conduction pathway (in order)?',a:'1) SA node → 2) AV node → 3) Bundle of His → 4) Left & Right bundle branches → 5) Purkinje fibres.'},
  {cat:'cvs',q:'What is the pericardial cavity?',a:'The SPACE between the two layers of the SEROUS pericardium. It contains lubricating fluid that protects and reduces friction during heartbeats.'},
  {cat:'cvs',q:'What are the two semilunar (SL) valves and their locations?',a:'1) PULMONARY semilunar — between right ventricle and pulmonary trunk.\n2) AORTIC semilunar — between left ventricle and aorta.'},
  {cat:'cvs',q:'What is the subvalvular apparatus and what is its function?',a:'Papillary muscles + chordae tendinae. Function: prevent AV valves from PROLAPSING into the atria when they close. They do NOT open/close valves.'},
  {cat:'cvs',q:'Describe blood flow through the heart (complete cycle).',a:'IVC/SVC → Right atrium → Tricuspid valve → Right ventricle → Pulmonary valve → Pulmonary artery → Lungs → Pulmonary veins → Left atrium → Mitral valve → Left ventricle → Aortic valve → Aorta → Body.'},
  {cat:'cvs',q:'What is blood flow sequence AFTER leaving the heart?',a:'Aorta → Arteries → Arterioles → Capillaries → Venules → Veins → Vena Cava → Right atrium.'},
  {cat:'cvs',q:'What are the three layers of an artery wall?',a:'1) ENDOTHELIUM (inside layer).\n2) Smooth muscle (middle layer).\n3) Connective tissue (outside layer). Thick walls expand under pressure.'},
  {cat:'cvs',q:'What is the QRS complex on an ECG?',a:'Indicates VENTRICULAR stimulation — ventricles are electrically activated to pump blood out.'},
  {cat:'cvs',q:'What does the T wave represent on an ECG?',a:'The RECOVERY (repolarization) period of the ventricles after contraction.'},
  {cat:'cvs',q:'What does the ST segment represent on an ECG?',a:'The time from the END of ventricular contraction to the BEGINNING of the T wave. Elevation or depression is clinically significant (e.g., MI).'},
  {cat:'cvs',q:'What is cardiac diastole?',a:'The period when the heart RELAXES after contraction, preparing to refill with blood. Diastolic pressure = lowest arterial pressure (~80 mmHg).'},
  {cat:'cvs',q:'What is cardiac systole?',a:'The period of ventricular CONTRACTION, initiated by SA node depolarization. Systolic pressure = peak arterial pressure (~120 mmHg).'},
  {cat:'cvs',q:'What is calcium-induced calcium release in cardiac muscle?',a:'Action potential → opens voltage-gated Ca²⁺ channels in T-tubules → Ca²⁺ binds receptors on the SR → SR releases MORE Ca²⁺ → Ca²⁺ binds troponin → allows actin–myosin binding → CONTRACTION.'},
  {cat:'cvs',q:'What is the mitral (bicuspid) valve?',a:'The LEFT atrioventricular (AV) valve. Has TWO cusps (bicuspid). Prevents blood flowing from the left ventricle BACK into the left atrium.'},
  {cat:'cvs',q:'Compare arteriole constriction vs dilation and their effects on blood pressure.',a:'CONSTRICTION → raises blood pressure. DILATION → lowers blood pressure. The more vessels dilated, the lower the blood pressure.'},
  {cat:'cvs',q:'What is the coronary circulation?',a:'The system supplying blood TO and removing blood FROM the heart muscle. Coronary ARTERIES supply oxygenated blood; cardiac VEINS remove deoxygenated blood. Coronary arteries are "end circulation."'},
  {cat:'cvs',q:'What are the two main coronary arteries?',a:'1) LEFT coronary artery (originates from left aortic sinus).\n2) RIGHT coronary artery (originates from right aortic sinus). Both originate from the root of the aorta just above the aortic valve.'},
  {cat:'cvs',q:'What is hypertension and what conditions does it risk?',a:'Chronically ELEVATED blood pressure. Risk factors for: stroke, heart attack, heart failure, arterial aneurysm, and chronic renal failure.'},
  {cat:'cvs',q:'What is atherosclerosis?',a:'Hardening/furring of arteries caused by formation of multiple PLAQUES within arterial walls. Deposits of tough, rigid collagen reduce elasticity and narrow the vessel lumen.'},
  {cat:'cvs',q:'What is a plaque (atheroma)?',a:'An abnormal inflammatory accumulation of macrophage white blood cells within the WALLS of arteries.'},
  {cat:'cvs',q:'What is circulatory shock?',a:'A severe condition resulting from REDUCED blood circulation, causing inadequate delivery of oxygen and nutrients to tissues.'},
  {cat:'cvs',q:'What is a thrombus vs a physiological clot?',a:'A thrombus is PATHOLOGIC in thrombosis but PHYSIOLOGIC in normal injury. Heparin and warfarin inhibit formation and growth of thrombi.'},
  {cat:'cvs',q:'List the types of embolic materials.',a:'1) Blood clots (most common).\n2) Fat globules (fat embolism).\n3) Air bubbles (air embolism).\n4) Septic emboli (pus + bacteria).\n5) Amniotic fluid.'},
  {cat:'cvs',q:'What is an ischemic stroke?',a:'Occurs in ~85–90% of strokes. A blood vessel BECOMES OCCLUDED, blocking blood supply to part of the brain. Subdivided into: thrombotic, embolic, watershed, venous.'},
  {cat:'cvs',q:'What is a hemorrhagic stroke?',a:'A blood vessel in the brain RUPTURES or BLEEDS. Blood irritates brain tissue, disrupts chemical balance, and may increase intracranial pressure. Types: intracerebral hemorrhage and subarachnoid hemorrhage.'},
  {cat:'cvs',q:'What is myocardial infarction (heart attack)?',a:'Occurs when blood and oxygen supply to an area of heart muscle is BLOCKED (usually by a coronary artery clot). If untreated, the affected muscle dies and is replaced by scar tissue.'},
  {cat:'cvs',q:'What is angina pectoris?',a:'Chest pain due to ISCHEMIA of the heart muscle, caused by obstruction or spasm of the coronary arteries (lack of blood and oxygen to the myocardium).'},
  {cat:'cvs',q:'What is the pulmonary circuit?',a:'Right ventricle → Pulmonary arteries → Lungs (O₂/CO₂ exchange in alveolae) → Pulmonary veins → Left atrium. Blood is oxygenated here.'},
  {cat:'cvs',q:'What is the systemic circuit?',a:'Left ventricle → Aorta → Systemic arteries → All body organs/tissues → Capillaries (gas exchange) → Veins → Vena cava → Right atrium. Supplies oxygenated blood to the body.'},
  {cat:'cvs',q:'What is the double circulatory system in humans?',a:'Two SEPARATE circuits — pulmonary (right side, lungs) and systemic (left side, body) — that work simultaneously. Blood circulates through the body 2–3 times per minute.'},
  {cat:'cvs',q:'What is autoregulation in capillary beds?',a:'Capillary beds can be "opened" or "closed" based on metabolic need. They normally carry no more than 25% of the blood they could hold. More metabolically active cells require more capillaries.'},
  {cat:'cvs',q:'What is the lumen of a vein?',a:'The HOLLOW INTERNAL CAVITY through which blood flows. A muscular layer allows the vein to contract, pushing more blood into circulation.'},
  {cat:'cvs',q:'How does the aorta help maintain blood pressure during diastole?',a:'It is an ELASTIC artery. When the left ventricle contracts, the aorta EXPANDS and stores potential energy. During diastole, it CONTRACTS PASSIVELY, releasing this energy to maintain pressure.'},
  {cat:'cvs',q:'What is the membranous ventricular septum?',a:'The THIN, FIBROUS upper-posterior part of the interventricular septum. It separates the aortic vestibule from the lower right atrium and upper right ventricle.'},
  {cat:'cvs',q:'What is the muscular ventricular septum?',a:'The GREATER (thicker) portion of the interventricular septum. It forms the main structural barrier between the left and right ventricles.'},
  {cat:'cvs',q:'What role do venules play in circulation?',a:'Small veins that allow deoxygenated blood to return from CAPILLARY BEDS to larger veins. They have three layers but less smooth muscle than arteries, making them thinner.'},
  {cat:'cvs',q:'How are strokes classified and what is the most common type?',a:'Two categories: ISCHEMIC (~80–90%) and HEMORRHAGIC (~10–20%). Ischemic is most common, caused by vessel occlusion. Hemorrhagic is caused by vessel rupture and is more dangerous.'},

/* ═══════════════════════════════════════════════
   FLASH CARDS LOGIC
═══════════════════════════════════════════════ */
let fcFilter = 'all';
let fcDeck = [];
let fcIndex = 0;
let fcFlipped = false;

function buildDeck() {
  const ALL_CARDS = [...CARDS, ...WBC_CARDS, ...PLT_CARDS, ...BG_CARDS, ...MUS_CARDS, ...ORG_CARDS, ...ENDO_CARDS, ...URN_CARDS, ...CVS_CARDS];
  if (fcFilter === 'all') fcDeck = [...ALL_CARDS];
  else fcDeck = ALL_CARDS.filter(c => c.cat === fcFilter);
  fcIndex = 0;
  fcFlipped = false;
  renderCard();
}

function renderCard() {
  const card = fcDeck[fcIndex];
  document.getElementById('fcCurrent').textContent = fcIndex + 1;
  document.getElementById('fcTotal').textContent = fcDeck.length;
  document.getElementById('fcTag').textContent = card.cat === 'blood' ? '🩸 BLOOD' : card.cat === 'rbc' ? '🔴 RED BLOOD CELLS' : card.cat === 'wbc' ? '🦠 WHITE BLOOD CELLS' : card.cat === 'plt' ? '🩹 PLATELETS & COAGULATION' : card.cat === 'bg' ? '🧬 BLOOD GROUPS & LYMPHATICS' : card.cat === 'mus' ? '💪 MUSCLE PHYSIOLOGY' : card.cat === 'digestive' ? '🫁 DIGESTIVE PHYSIOLOGY' : card.cat === 'endo' ? '🧬 ENDOCRINE PHYSIOLOGY' : card.cat === 'urinary' ? '🫘 URINARY PHYSIOLOGY' : card.cat === 'cvs' ? '❤️ CARDIOVASCULAR SYSTEM' : '📖 PHYSIOLOGY';
  document.getElementById('fcQuestion').textContent = card.q;
  document.getElementById('fcAnswer').textContent = card.a;
  const cardEl = document.getElementById('fcCard');
  cardEl.classList.remove('flipped');
  fcFlipped = false;
}

function flipCard() {
  fcFlipped = !fcFlipped;
  document.getElementById('fcCard').classList.toggle('flipped', fcFlipped);
}

function nextCard() {
  fcIndex = (fcIndex + 1) % fcDeck.length;
  renderCard();
}

function prevCard() {
  fcIndex = (fcIndex - 1 + fcDeck.length) % fcDeck.length;
  renderCard();
}

function shuffleCards() {
  for (let i = fcDeck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [fcDeck[i], fcDeck[j]] = [fcDeck[j], fcDeck[i]];
  }
  fcIndex = 0;
  renderCard();
}

function resetCards() {
  buildDeck();
}

function setFCFilter(f) {
  fcFilter = f;
  document.querySelectorAll('#fcFilter .filter-btn').forEach(b => b.classList.remove('active'));
  const btns = document.querySelectorAll('#fcFilter .filter-btn');
  if (f === 'all') btns[0].classList.add('active');
  else if (f === 'blood') btns[1].classList.add('active');
  else if (f === 'rbc') btns[2].classList.add('active');
  else if (f === 'wbc') btns[3].classList.add('active');
  else if (f === 'plt') btns[4].classList.add('active');
  else if (f === 'bg') btns[5].classList.add('active');
  else if (f === 'mus') btns[6].classList.add('active');
  else if (f === 'digestive') btns[7].classList.add('active');
  else if (f === 'endo') btns[8].classList.add('active');
  else if (f === 'urinary') btns[9].classList.add('active');
  else if (f === 'cvs') btns[10].classList.add('active');
  else btns[0].classList.add('active');
  buildDeck();
}

let quizDeck = [];
let quizIndex = 0;
let quizCorrect = 0;
let quizAnswered = false;

function startQuiz(mode) {
  if (mode === 'rbc') quizDeck = [...QUIZ_DATA];
  else if (mode === 'wbc') quizDeck = [...WBC_QUIZ_DATA];
  else if (mode === 'plt') quizDeck = [...PLT_QUIZ_DATA];
  else if (mode === 'bg') quizDeck = [...BG_QUIZ_DATA];
  else if (mode === 'mus') quizDeck = [...MUS_QUIZ_DATA];
  else if (mode === 'digestive') quizDeck = [...ORG_QUIZ_DATA];
  else if (mode === 'endo') quizDeck = [...ENDO_QUIZ_DATA];
  else if (mode === 'urinary') quizDeck = [...URN_QUIZ_DATA];
  else if (mode === 'cvs') quizDeck = [...CVS_QUIZ_DATA];
  else quizDeck = [...QUIZ_DATA, ...WBC_QUIZ_DATA, ...PLT_QUIZ_DATA, ...BG_QUIZ_DATA, ...MUS_QUIZ_DATA, ...ORG_QUIZ_DATA, ...ENDO_QUIZ_DATA, ...URN_QUIZ_DATA, ...CVS_QUIZ_DATA];

  // shuffle
  for (let i = quizDeck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [quizDeck[i], quizDeck[j]] = [quizDeck[j], quizDeck[i]];
  }

  quizIndex = 0;
  quizCorrect = 0;
  quizAnswered = false;

  document.getElementById('quizStart').style.display = 'none';
  document.getElementById('quizResult').classList.remove('visible');
  document.getElementById('quizActive').style.display = 'block';

  renderQuestion();
}

function renderQuestion() {
  const q = quizDeck[quizIndex];
  quizAnswered = false;

  document.getElementById('qNum').textContent = `Q${quizIndex + 1} / ${quizDeck.length}`;
  document.getElementById('qScore').textContent = `✓ ${quizCorrect}`;
  document.getElementById('qProgress').style.width = `${(quizIndex / quizDeck.length) * 100}%`;

  const badge = document.getElementById('qTypeBadge');
  badge.className = 'quiz-type-badge ' + q.type;
  badge.textContent = q.type === 'tf' ? 'TRUE / FALSE' : 'MCQ';

  document.getElementById('qQuestion').textContent = q.q;
  document.getElementById('qExplanation').classList.remove('visible');
  document.getElementById('qNextBtn').classList.remove('visible');

  const optsEl = document.getElementById('qOptions');
  optsEl.innerHTML = '';

  if (q.type === 'tf') {
    const div = document.createElement('div');
    div.className = 'tf-buttons';

    const tBtn = document.createElement('button');
    tBtn.className = 'tf-btn true-btn';
    tBtn.textContent = '✓ TRUE';
    tBtn.onclick = () => answerTF(true, tBtn, fBtn, q);

    const fBtn = document.createElement('button');
    fBtn.className = 'tf-btn false-btn';
    fBtn.textContent = '✗ FALSE';
    fBtn.onclick = () => answerTF(false, tBtn, fBtn, q);

    div.appendChild(tBtn);
    div.appendChild(fBtn);
    optsEl.appendChild(div);
  } else {
    const labels = ['A', 'B', 'C', 'D'];
    const btns = [];
    q.opts.forEach((opt, i) => {
      const btn = document.createElement('button');
      btn.className = 'quiz-opt';
      btn.innerHTML = `<span class="opt-label">${labels[i]}</span><span>${opt}</span>`;
      btn.onclick = () => answerMCQ(i, btns, q);
      optsEl.appendChild(btn);
      btns.push(btn);
    });
  }
}

function answerTF(chosen, tBtn, fBtn, q) {
  if (quizAnswered) return;
  quizAnswered = true;
  const correct = q.ans;
  const isCorrect = chosen === correct;
  if (isCorrect) quizCorrect++;

  tBtn.disabled = true;
  fBtn.disabled = true;

  if (chosen === true) {
    tBtn.classList.add(isCorrect ? 'correct' : 'wrong');
    if (!isCorrect) fBtn.classList.add('correct');
  } else {
    fBtn.classList.add(isCorrect ? 'correct' : 'wrong');
    if (!isCorrect) tBtn.classList.add('correct');
  }

  showExplanation(isCorrect, q.exp);
}

function answerMCQ(chosen, btns, q) {
  if (quizAnswered) return;
  quizAnswered = true;
  const isCorrect = chosen === q.ans;
  if (isCorrect) quizCorrect++;

  btns.forEach((b, i) => {
    b.disabled = true;
    if (i === chosen && isCorrect) b.classList.add('correct');
    else if (i === chosen && !isCorrect) b.classList.add('wrong');
    else if (i === q.ans) b.classList.add('show-correct');
  });

  showExplanation(isCorrect, q.exp);
}

function showExplanation(correct, text) {
  const el = document.getElementById('qExplanation');
  el.innerHTML = `<strong>${correct ? '✓ Correct!' : '✗ Incorrect'}</strong> — ${text}`;
  el.classList.add('visible');
  document.getElementById('qNextBtn').textContent =
    quizIndex + 1 < quizDeck.length ? 'Next Question →' : 'See Results';
  document.getElementById('qNextBtn').classList.add('visible');
  document.getElementById('qScore').textContent = `✓ ${quizCorrect}`;
}

function nextQuestion() {
  quizIndex++;
  if (quizIndex >= quizDeck.length) {
    showResult();
  } else {
    renderQuestion();
    document.querySelector('.main').scrollTop = 0;
  }
}

function showResult() {
  document.getElementById('quizActive').style.display = 'none';
  const result = document.getElementById('quizResult');
  result.classList.add('visible');
  const pct = Math.round((quizCorrect / quizDeck.length) * 100);
  document.getElementById('rScore').textContent = pct + '%';
  const wrong = quizDeck.length - quizCorrect;
  document.getElementById('rCorrect').textContent = `✓ ${quizCorrect} Correct`;
  document.getElementById('rWrong').textContent = `✗ ${wrong} Wrong`;

  let label = '';
  if (pct >= 90) label = 'Excellent! You\'re ready for the exam 🎯';
  else if (pct >= 75) label = 'Good work — review the missed questions 📖';
  else if (pct >= 60) label = 'Keep studying — you\'re getting there 💪';
  else label = 'Review the material and try again 🔁';
  document.getElementById('rLabel').textContent = label;
}

function restartQuiz() {
  document.getElementById('quizResult').classList.remove('visible');
  document.getElementById('quizStart').style.display = 'block';
  document.querySelector('.main').scrollTop = 0;
}

function quizBack() {
  if (quizIndex === 0 && !quizAnswered) {
    // No question answered yet — go back directly
    exitToMenu();
  } else {
    // Show confirmation
    document.getElementById('confirmCount').textContent = quizAnswered ? quizIndex + 1 : quizIndex;
    document.getElementById('confirmModal').style.display = 'flex';
  }
}

function exitToMenu() {
  document.getElementById('quizActive').style.display = 'none';
  document.getElementById('quizResult').classList.remove('visible');
  document.getElementById('quizStart').style.display = 'block';
  document.querySelector('.main').scrollTop = 0;
}

function closeConfirmModal() {
  document.getElementById('confirmModal').style.display = 'none';
}

function closeConfirm(e) {
  if (e.target === document.getElementById('confirmModal')) closeConfirmModal();
}

function confirmExit() {
  closeConfirmModal();
  exitToMenu();
}

/* ═══════════════════════════════════════════════
   NAVIGATION
═══════════════════════════════════════════════ */
function showSection(id) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.navbtn').forEach(b => b.classList.remove('active'));
  document.getElementById('section-' + id).classList.add('active');
  document.getElementById('nav-' + id).classList.add('active');
  document.querySelector('.main').scrollTop = 0;

  const labels = { fc: 'Flash Cards', quiz: 'Quiz' };
  document.getElementById('sectionBadge').textContent = labels[id];
}

/* ── INIT ── */
buildDeck();
</script>
