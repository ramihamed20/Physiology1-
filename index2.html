<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Physiology — Study App</title>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#080d14"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0b0f17;
    --surface: #141922;
    --surface2: #1c2333;
    --border: #252d3d;
    --text: #e8edf5;
    --muted: #6b7a99;
    --accent: #4f9cf9;
    --accent2: #38d9a9;
    --red: #ff6b6b;
    --green: #38d9a9;
    --yellow: #ffd43b;
    --card-h: clamp(220px, 55vw, 340px);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    display: flex;
    flex-direction: column;
    height: 100dvh;
  }

/* ── TOP BAR ── */
.topbar {
background: var(--surface);
border-bottom: 1px solid var(--border);
padding: 14px 20px 12px;
display: flex;
align-items: center;
justify-content: space-between;
flex-shrink: 0;
}
.topbar h1 {
font-family: ‘Syne’, sans-serif;
font-size: 17px;
font-weight: 800;
letter-spacing: -0.3px;
color: var(--text);
}
.topbar h1 span { color: var(--accent); }
.badge {
font-size: 11px;
background: var(--accent);
color: #fff;
padding: 3px 9px;
border-radius: 20px;
font-weight: 600;
}

/* ── MAIN CONTENT ── */
.main {
flex: 1;
overflow-y: auto;
overflow-x: hidden;
-webkit-overflow-scrolling: touch;
}
.section { display: none; padding: 16px 16px 100px; }
.section.active { display: block; }

/* ── BOTTOM NAV ── */
.bottomnav {
display: flex;
background: var(--surface);
border-top: 1px solid var(--border);
flex-shrink: 0;
}
.navbtn {
flex: 1;
padding: 12px 8px;
background: none;
border: none;
color: var(--muted);
font-family: ‘DM Sans’, sans-serif;
font-size: 12px;
font-weight: 500;
cursor: pointer;
display: flex;
flex-direction: column;
align-items: center;
gap: 4px;
transition: color 0.2s;
}
.navbtn.active { color: var(--accent); }
.navbtn svg { width: 22px; height: 22px; }

/* ── FILTER TABS ── */
.filter-row {
display: flex;
gap: 8px;
margin-bottom: 16px;
overflow-x: auto;
padding-bottom: 4px;
scrollbar-width: none;
}
.filter-row::-webkit-scrollbar { display: none; }
.filter-btn {
flex-shrink: 0;
padding: 7px 14px;
border-radius: 20px;
border: 1px solid var(--border);
background: var(--surface);
color: var(--muted);
font-size: 13px;
font-weight: 500;
cursor: pointer;
transition: all 0.18s;
font-family: ‘DM Sans’, sans-serif;
}
.filter-btn.active {
background: var(--accent);
border-color: var(--accent);
color: #fff;
}

/* ── FLASH CARD ── */
.fc-counter {
text-align: center;
font-size: 13px;
color: var(--muted);
margin-bottom: 14px;
font-weight: 500;
}
.fc-counter strong { color: var(--accent); }
.fc-scene {
width: 100%;
height: var(--card-h);
perspective: 1000px;
cursor: pointer;
margin-bottom: 16px;
}
.fc-card {
width: 100%;
height: 100%;
position: relative;
transform-style: preserve-3d;
transition: transform 0.45s cubic-bezier(0.4,0,0.2,1);
}
.fc-card.flipped { transform: rotateY(180deg); }
.fc-front, .fc-back {
position: absolute;
inset: 0;
border-radius: 16px;
padding: 24px 22px;
display: flex;
flex-direction: column;
justify-content: center;
align-items: center;
backface-visibility: hidden;
-webkit-backface-visibility: hidden;
}
.fc-front {
background: var(--surface);
border: 1px solid var(--border);
}
.fc-back {
background: linear-gradient(135deg, #1a2540 0%, #1c2f45 100%);
border: 1px solid #2a4060;
transform: rotateY(180deg);
}
.fc-tag {
font-size: 10px;
letter-spacing: 1px;
text-transform: uppercase;
color: var(--accent);
font-weight: 700;
margin-bottom: 14px;
background: rgba(79,156,249,0.1);
padding: 3px 10px;
border-radius: 10px;
align-self: flex-start;
}
.fc-question {
font-size: clamp(14px, 4vw, 17px);
line-height: 1.55;
color: var(--text);
font-weight: 400;
text-align: center;
}
.fc-tap-hint {
font-size: 11px;
color: var(--muted);
margin-top: 16px;
display: flex;
align-items: center;
gap: 5px;
}
.fc-answer {
font-size: clamp(13px, 3.8vw, 16px);
line-height: 1.6;
color: var(--accent2);
font-weight: 500;
text-align: center;
}
.fc-answer-label {
font-size: 10px;
letter-spacing: 1px;
color: var(--accent2);
text-transform: uppercase;
font-weight: 700;
margin-bottom: 12px;
opacity: 0.7;
}

.fc-controls {
display: flex;
gap: 10px;
justify-content: center;
margin-bottom: 14px;
}
.fc-btn {
flex: 1;
max-width: 130px;
padding: 11px;
border-radius: 12px;
border: 1px solid var(--border);
background: var(--surface);
color: var(--text);
font-size: 14px;
font-weight: 600;
cursor: pointer;
transition: all 0.18s;
font-family: ‘DM Sans’, sans-serif;
display: flex;
align-items: center;
justify-content: center;
gap: 6px;
}
.fc-btn:hover { background: var(--surface2); border-color: var(--accent); }
.fc-btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }

.fc-shuffle-row {
display: flex;
justify-content: center;
gap: 10px;
}
.fc-small-btn {
padding: 8px 16px;
border-radius: 10px;
border: 1px solid var(--border);
background: none;
color: var(--muted);
font-size: 12px;
font-weight: 500;
cursor: pointer;
font-family: ‘DM Sans’, sans-serif;
transition: all 0.18s;
display: flex;
align-items: center;
gap: 5px;
}
.fc-small-btn:hover { color: var(--text); border-color: var(--text); }

/* ── QUIZ ── */
.quiz-header {
display: flex;
align-items: center;
justify-content: space-between;
margin-bottom: 14px;
}
.quiz-progress-bar {
height: 4px;
background: var(--surface2);
border-radius: 4px;
margin-bottom: 16px;
overflow: hidden;
}
.quiz-progress-fill {
height: 100%;
background: var(--accent);
border-radius: 4px;
transition: width 0.3s ease;
}
.quiz-score-chip {
font-size: 13px;
font-weight: 600;
color: var(--accent2);
background: rgba(56,217,169,0.1);
padding: 4px 12px;
border-radius: 20px;
}
.quiz-q-num {
font-size: 13px;
color: var(--muted);
font-weight: 500;
}
.quiz-type-badge {
font-size: 10px;
padding: 3px 9px;
border-radius: 10px;
font-weight: 700;
letter-spacing: 0.5px;
text-transform: uppercase;
}
.quiz-type-badge.tf { background: rgba(255,212,59,0.15); color: var(--yellow); }
.quiz-type-badge.mcq { background: rgba(79,156,249,0.15); color: var(--accent); }

.quiz-card {
background: var(--surface);
border: 1px solid var(--border);
border-radius: 16px;
padding: 20px 18px;
margin-bottom: 14px;
}
.quiz-question {
font-size: clamp(14px, 4vw, 16px);
line-height: 1.6;
color: var(--text);
margin-bottom: 18px;
font-weight: 400;
}
.quiz-options {
display: flex;
flex-direction: column;
gap: 9px;
}
.quiz-opt {
padding: 12px 14px;
border-radius: 11px;
border: 1px solid var(--border);
background: var(--surface2);
color: var(--text);
font-size: 14px;
font-weight: 400;
cursor: pointer;
text-align: left;
transition: all 0.18s;
font-family: ‘DM Sans’, sans-serif;
line-height: 1.45;
display: flex;
align-items: flex-start;
gap: 10px;
}
.quiz-opt:hover { border-color: var(--accent); }
.quiz-opt.correct { background: rgba(56,217,169,0.12); border-color: var(--green); color: var(--green); }
.quiz-opt.wrong { background: rgba(255,107,107,0.1); border-color: var(--red); color: var(--red); }
.quiz-opt.show-correct { background: rgba(56,217,169,0.08); border-color: var(--green); color: var(--green); }
.quiz-opt .opt-label {
font-weight: 700;
font-size: 13px;
flex-shrink: 0;
margin-top: 1px;
opacity: 0.6;
}
.quiz-opt.correct .opt-label,
.quiz-opt.wrong .opt-label,
.quiz-opt.show-correct .opt-label { opacity: 1; }
.quiz-opt[disabled] { cursor: default; }

.quiz-explanation {
margin-top: 13px;
padding: 12px 14px;
background: rgba(79,156,249,0.07);
border: 1px solid rgba(79,156,249,0.2);
border-radius: 10px;
font-size: 13px;
color: var(--muted);
line-height: 1.55;
display: none;
}
.quiz-explanation.visible { display: block; }
.quiz-explanation strong { color: var(--accent); }

.quiz-next-btn {
width: 100%;
padding: 13px;
border-radius: 12px;
border: none;
background: var(--accent);
color: #fff;
font-size: 15px;
font-weight: 600;
cursor: pointer;
font-family: ‘DM Sans’, sans-serif;
transition: opacity 0.18s;
display: none;
}
.quiz-next-btn.visible { display: block; }
.quiz-next-btn:hover { opacity: 0.88; }

/* TF Buttons */
.tf-buttons {
display: flex;
gap: 10px;
}
.tf-btn {
flex: 1;
padding: 14px;
border-radius: 12px;
border: 1px solid var(--border);
background: var(--surface2);
color: var(--text);
font-size: 16px;
font-weight: 700;
cursor: pointer;
font-family: ‘DM Sans’, sans-serif;
transition: all 0.18s;
}
.tf-btn.true-btn:hover { background: rgba(56,217,169,0.1); border-color: var(--green); }
.tf-btn.false-btn:hover { background: rgba(255,107,107,0.1); border-color: var(--red); }
.tf-btn.correct { background: rgba(56,217,169,0.15); border-color: var(--green); color: var(--green); }
.tf-btn.wrong { background: rgba(255,107,107,0.12); border-color: var(--red); color: var(--red); }
.tf-btn[disabled] { cursor: default; }

/* Result screen */
.quiz-result {
display: none;
text-align: center;
padding: 30px 20px;
}
.quiz-result.visible { display: block; }
.result-score {
font-family: ‘Syne’, sans-serif;
font-size: 64px;
font-weight: 800;
line-height: 1;
color: var(--accent);
margin: 16px 0 8px;
}
.result-label {
font-size: 14px;
color: var(--muted);
margin-bottom: 24px;
}
.result-stats {
display: flex;
gap: 10px;
justify-content: center;
margin-bottom: 28px;
}
.stat-chip {
padding: 8px 16px;
border-radius: 12px;
font-size: 14px;
font-weight: 600;
}
.stat-chip.green { background: rgba(56,217,169,0.12); color: var(--green); }
.stat-chip.red { background: rgba(255,107,107,0.12); color: var(--red); }
.restart-btn {
padding: 13px 32px;
border-radius: 12px;
border: none;
background: var(--accent);
color: #fff;
font-size: 15px;
font-weight: 600;
cursor: pointer;
font-family: ‘DM Sans’, sans-serif;
}

/* start screen */
.quiz-start {
text-align: center;
padding: 20px 0;
}
.quiz-start h2 {
font-family: ‘Syne’, sans-serif;
font-size: 22px;
font-weight: 700;
margin-bottom: 8px;
}
.quiz-start p {
color: var(--muted);
font-size: 14px;
margin-bottom: 24px;
line-height: 1.55;
}
.start-options {
display: flex;
flex-direction: column;
gap: 10px;
max-width: 320px;
margin: 0 auto 20px;
}
.start-opt-btn {
padding: 16px 18px;
border-radius: 13px;
border: 1px solid var(--border);
background: var(--surface);
color: var(--text);
text-align: left;
cursor: pointer;
font-family: ‘DM Sans’, sans-serif;
transition: all 0.2s;
}
.start-opt-btn:hover { border-color: var(--accent); background: var(--surface2); }
.start-opt-btn .sot { font-size: 15px; font-weight: 600; display: block; margin-bottom: 3px; }
.start-opt-btn .son { font-size: 12px; color: var(--muted); }

/* scrollbar */
.main::-webkit-scrollbar { width: 4px; }
.main::-webkit-scrollbar-track { background: transparent; }
.main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

@media (min-width: 480px) {
.fc-controls { max-width: 320px; margin: 0 auto 14px; }
.start-options { gap: 12px; }
}


/* ══════════════════════════════════════
   DESIGN OVERHAUL — Premium Medical UI
══════════════════════════════════════ */

/* Enhanced root variables */
:root {
  --bg: #080d14;
  --surface: #0f1620;
  --surface2: #161f2e;
  --surface3: #1c2840;
  --border: #1e2d45;
  --border2: #243550;
  --text: #e4eaf5;
  --text2: #a8b8d8;
  --muted: #5a6e8f;
  --accent: #3d8ef0;
  --accent-glow: rgba(61,142,240,0.18);
  --accent2: #30d4a0;
  --accent2-glow: rgba(48,212,160,0.15);
  --red: #f06060;
  --green: #30d4a0;
  --yellow: #f0c030;
  --card-h: clamp(210px, 52vw, 330px);
  --radius: 14px;
  --radius-sm: 10px;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
  --shadow-lg: 0 8px 40px rgba(0,0,0,0.6);
}

/* Subtle grid background */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(61,142,240,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(61,142,240,0.025) 1px, transparent 1px);
  background-size: 32px 32px;
  pointer-events: none;
  z-index: 0;
}
.topbar, .main, .bottomnav { position: relative; z-index: 1; }

/* Enhanced topbar */
.topbar {
  background: linear-gradient(180deg, #0d1624 0%, #0a1220 100%);
  border-bottom: 1px solid var(--border2);
  padding: 14px 18px 12px;
  box-shadow: 0 2px 16px rgba(0,0,0,0.3);
}
.topbar h1 {
  font-size: 18px;
  font-weight: 800;
  letter-spacing: -0.5px;
  background: linear-gradient(135deg, var(--text) 0%, var(--text2) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.topbar h1 span {
  background: linear-gradient(135deg, var(--accent) 0%, #60b4ff 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.badge {
  font-size: 10px;
  background: linear-gradient(135deg, var(--accent) 0%, #2a7de0 100%);
  color: #fff;
  padding: 4px 10px;
  border-radius: 20px;
  font-weight: 700;
  letter-spacing: 0.3px;
  box-shadow: 0 2px 8px rgba(61,142,240,0.3);
}

/* Enhanced bottom nav */
.bottomnav {
  background: linear-gradient(180deg, #0a1220 0%, #080d14 100%);
  border-top: 1px solid var(--border2);
  box-shadow: 0 -2px 20px rgba(0,0,0,0.4);
}
.navbtn {
  padding: 10px 8px 12px;
  color: var(--muted);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.2px;
  transition: color 0.2s, transform 0.15s;
}
.navbtn.active {
  color: var(--accent);
}
.navbtn.active svg {
  filter: drop-shadow(0 0 4px rgba(61,142,240,0.5));
}
.navbtn:active { transform: scale(0.93); }

/* Enhanced filter tabs */
.filter-row { gap: 7px; padding-bottom: 6px; }
.filter-btn {
  padding: 8px 14px;
  border-radius: 22px;
  border: 1px solid var(--border2);
  background: var(--surface);
  color: var(--text2);
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.1px;
  transition: all 0.18s;
}
.filter-btn:active { transform: scale(0.95); }
.filter-btn.active {
  background: linear-gradient(135deg, var(--accent) 0%, #2a7de0 100%);
  border-color: var(--accent);
  color: #fff;
  box-shadow: 0 2px 12px rgba(61,142,240,0.35);
}

/* Enhanced flashcard */
.fc-counter {
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 12px;
  font-weight: 500;
  letter-spacing: 0.3px;
}
.fc-counter strong { color: var(--accent); }

.fc-scene { cursor: pointer; }
.fc-front {
  background: linear-gradient(160deg, var(--surface) 0%, var(--surface2) 100%);
  border: 1px solid var(--border2);
  box-shadow: var(--shadow);
}
.fc-front:active { transform: scale(0.98); }
.fc-back {
  background: linear-gradient(160deg, #0e1e36 0%, #112240 100%);
  border: 1px solid rgba(61,142,240,0.25);
  box-shadow: var(--shadow), 0 0 30px rgba(61,142,240,0.06);
}
.fc-tag {
  font-size: 9px;
  letter-spacing: 1.2px;
  background: var(--accent-glow);
  border: 1px solid rgba(61,142,240,0.2);
  color: var(--accent);
  padding: 4px 10px;
  border-radius: 12px;
}
.fc-question {
  font-size: clamp(14px, 3.8vw, 17px);
  line-height: 1.6;
  color: var(--text);
}
.fc-answer {
  font-size: clamp(13px, 3.6vw, 16px);
  line-height: 1.65;
  color: var(--accent2);
}
.fc-answer-label {
  color: var(--accent2);
  opacity: 0.6;
  font-size: 9px;
  letter-spacing: 1.2px;
}
.fc-tap-hint { color: var(--muted); font-size: 11px; margin-top: 14px; }

/* Enhanced fc controls */
.fc-btn {
  border-radius: var(--radius-sm);
  border: 1px solid var(--border2);
  background: var(--surface);
  color: var(--text);
  font-size: 14px;
  font-weight: 600;
  padding: 12px;
  transition: all 0.18s;
  min-height: 48px;
}
.fc-btn:active { transform: scale(0.96); }
.fc-btn:hover { background: var(--surface2); border-color: var(--accent); }
.fc-btn.primary {
  background: linear-gradient(135deg, var(--accent) 0%, #2a7de0 100%);
  border-color: transparent;
  box-shadow: 0 3px 14px rgba(61,142,240,0.35);
}
.fc-small-btn {
  border-radius: var(--radius-sm);
  border: 1px solid var(--border2);
  color: var(--muted);
  font-size: 12px;
  font-weight: 600;
  padding: 9px 18px;
  min-height: 40px;
  transition: all 0.18s;
}
.fc-small-btn:active { transform: scale(0.95); }
.fc-small-btn:hover { color: var(--text); border-color: var(--accent); }

/* Enhanced quiz start screen */
.quiz-start { text-align: center; padding: 12px 0; }
.quiz-start h2 {
  font-family: 'Syne', sans-serif;
  font-size: 22px;
  font-weight: 800;
  margin-bottom: 6px;
  background: linear-gradient(135deg, var(--text) 0%, var(--text2) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.quiz-start p { color: var(--muted); font-size: 13px; margin-bottom: 20px; }
.start-options { display: flex; flex-direction: column; gap: 9px; max-width: 340px; margin: 0 auto 16px; }

.start-opt-btn {
  padding: 14px 16px;
  border-radius: var(--radius);
  border: 1px solid var(--border2);
  background: var(--surface);
  color: var(--text);
  text-align: left;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  transition: all 0.2s;
  min-height: 56px;
  position: relative;
  overflow: hidden;
}
.start-opt-btn::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--accent);
  opacity: 0;
  transition: opacity 0.2s;
  border-radius: 3px 0 0 3px;
}
.start-opt-btn:hover { border-color: var(--accent); background: var(--surface2); }
.start-opt-btn:hover::before { opacity: 1; }
.start-opt-btn:active { transform: scale(0.98); }
.start-opt-btn .sot { font-size: 14px; font-weight: 700; display: block; margin-bottom: 3px; }
.start-opt-btn .son { font-size: 11px; color: var(--muted); }

.start-opt-all {
  border-color: var(--accent) !important;
  background: linear-gradient(135deg, rgba(61,142,240,0.1) 0%, rgba(61,142,240,0.05) 100%) !important;
}
.start-opt-all::before { opacity: 1 !important; background: linear-gradient(180deg, var(--accent) 0%, var(--accent2) 100%) !important; }
.start-opt-all .sot { color: var(--accent); }

/* Enhanced quiz active */
.quiz-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 12px;
}
.quiz-back-btn {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 7px 12px;
  border-radius: 20px;

.section { padding: 14px 14px 96px; }

  {cat:'digestive',q:'Parotid gland: location, duct, and opening?',a:'Largest gland. Below & in front of the ear. Stensen\'s duct. Opens inside cheek opposite upper 2nd molar tooth.'},
  {cat:'digestive',q:'Submandibular gland: location, duct, and opening?',a:'Submaxillary triangle, medial to mandible. Wharton\'s duct. Opens at caruncula sublingualis (side of frenulum of tongue).'},
  {cat:'digestive',q:'Sublingual gland: location, duct, and opening?',a:'Smallest major gland. Floor of mouth. 5–15 Ducts of Rivinus + one Bartholin\'s duct. Opens near submaxillary duct.'},
  {cat:'digestive',q:'Duct summary: Parotid | Submandibular | Sublingual.',a:'Parotid → Stensen\'s duct. Submandibular → Wharton\'s duct. Sublingual → Ducts of Rivinus / Bartholin\'s duct.'},
  {cat:'digestive',q:'Classification of salivary glands by secretion type.',a:'SEROUS – thin watery (Parotid, lingual serous). MUCOUS – thick, high mucin (lingual mucous, buccal, palatal). MIXED – both (Submandibular, sublingual, labial).'},
  {cat:'digestive',q:'Daily volume and contributions of each major gland.',a:'1,000–1,500 mL/day ≈ 1 mL/min. Submandibular: 70% | Parotid: 25% | Sublingual: 5%.'},
  {cat:'digestive',q:'Physical properties of mixed saliva.',a:'pH: 6.35–6.85 (slightly acidic). Specific gravity: 1.002–1.012. Tonicity: HYPOTONIC to plasma.'},
  {cat:'digestive',q:'Composition of saliva.',a:'Water: 99.5%. Solids: 0.5% → Organic (enzymes, mucin, IgA, lysozyme) + Inorganic (Na, Ca, K, bicarbonate, fluoride) + Gases.'},
  {cat:'digestive',q:'Inorganic substances in saliva.',a:'Na, Ca, K, Bicarbonate, Bromide, Chloride, Fluoride, Phosphate. NOTE: Glucose ABSENT normally; appears in diabetes mellitus.'},
  {cat:'digestive',q:'What are the 3 digestive enzymes in saliva?',a:'1. Salivary amylase (ptyalin) – all glands 2. Maltase – major glands 3. Lingual lipase – lingual glands'},
  {cat:'digestive',q:'Salivary amylase: action and key facts.',a:'Amylolytic; converts cooked starch → dextrin + maltose. Optimum pH = 6. CANNOT digest cellulose.'},
  {cat:'digestive',q:'Lingual lipase: action.',a:'Lipolytic. Digests pre-emulsified (milk) fats. Hydrolyzes triglycerides → fatty acids + diacylglycerol.'},
  {cat:'digestive',q:'What are the 8 functions of saliva?',a:'1. Food prep for swallowing 2. Taste (dissolves food) 3. Digestion (amylase, maltase, lipase) 4. Cleansing/protective (lysozyme, IgA, mucin) 5. Speech 6. Excretion (mercury, Pb, viruses) 7. Temperature regulation (animals) 8. Water balance regulation'},
  {cat:'digestive',q:'How does saliva exert antibacterial protection?',a:'Lysozyme: kills Staphylococcus, Streptococcus, Brucella. Secretory IgA: antibacterial + antiviral. Mucin: lubricates oral mucosa. Cleanses food debris → prevents caries.'},
  {cat:'digestive',q:'Autonomic regulation of saliva: parasympathetic vs sympathetic.',a:'PARASYMPATHETIC → large watery saliva (few organics) via ACETYLCHOLINE + vasodilation. SYMPATHETIC → small, thick, mucous-rich saliva via NORADRENALINE + vasoconstriction.'},
  {cat:'digestive',q:'Drugs that INCREASE vs DECREASE salivary secretion.',a:'INCREASE: Sympathomimetics (adrenaline, ephedrine), Parasympathomimetics (pilocarpine, muscarine, physostigmine), Histamine. DECREASE: ATROPINE, scopolamine, ergotamine.'},
  {cat:'digestive',q:'Define hyposalivation and its types.',a:'Reduced saliva. TEMPORARY: fear, fever, dehydration. PERMANENT: sialolithiasis, congenital absence/hypoplasia, Bell\'s palsy. Consequence: dental caries.'},
  {cat:'digestive',q:'Define hypersalivation and its causes.',a:'Excess saliva. PHYSIOLOGICAL: Pregnancy. PATHOLOGICAL (ptyalism/sialorrhea): tooth decay, esophageal disease, neurological disorders (stroke, Parkinsonism).'},
  {cat:'digestive',q:'Define Xerostomia, Mumps, and Drooling.',a:'Xerostomia: Dry mouth (pasties/cotton mouth). Mumps: Viral parotid infection by PARAMYXOVIRUS; affects meninges, gonads, pancreas. Drooling: Uncontrolled saliva flow outside mouth.'},
  // ── PANCREAS ──
  {cat:'digestive',q:'What are the two functions of the pancreas?',a:'ENDOCRINE: hormones (insulin, glucagon, somatostatin). EXOCRINE: pancreatic digestive juice.'},
  {cat:'digestive',q:'Exocrine structure of the pancreas.',a:'Acini/alveoli with acinar cells containing ZYMOGEN GRANULES. Small ducts → intralobular duct → WIRSUNG\'S DUCT. Wirsung\'s + common bile duct = AMPULLA OF VATER → duodenum.'},
  {cat:'digestive',q:'Properties of pancreatic juice.',a:'Volume: 500–800 mL/day. HIGHLY ALKALINE pH 8–8.3. Specific gravity: 1.010–1.018. 99.5% water + 0.5% solids.'},
  {cat:'digestive',q:'Bicarbonate content of pancreatic juice and its significance.',a:'HCO₃⁻: 110–150 mEq/L (plasma = 24 mEq/L). Responsible for alkalinity. NEUTRALIZES acid chyme from stomach → protects intestinal mucosa.'},
  {cat:'digestive',q:'Classify the enzymes in pancreatic juice.',a:'PROTEOLYTIC: Trypsin, Chymotrypsin, Carboxypeptidases, Nuclease, Elastase, Collagenase. LIPOLYTIC: Pancreatic lipase, Cholesterol ester hydrolase, Phospholipase A&B, Colipase. AMYLOLYTIC: Pancreatic amylase.'},
  {cat:'digestive',q:'How is trypsinogen activated? What is autocatalysis?',a:'Trypsinogen → Trypsin via ENTEROKINASE (brush-border cells of duodenum). Autocatalytic: trypsin itself activates more trypsinogen.'},
  {cat:'digestive',q:'What enzymes does trypsin activate?',a:'Chymotrypsinogen → Chymotrypsin. Procarboxypeptidases → Carboxypeptidases. Proelastase → Elastase. Procolipase → Colipase. + Collagenase, Phospholipase A, Phospholipase B.'},
  {cat:'digestive',q:'Actions of Trypsin (6 actions).',a:'i. Most powerful proteolytic enzyme ii. Curdles milk iii. Accelerates blood clotting iv. Activates other proenzymes v. Activates collagenase, phospholipase A&B vi. Autocatalytic action'},
  {cat:'digestive',q:'Chymotrypsin: type and actions.',a:'ENDOPEPTIDASE. Actions: i. Digests proteins → polypeptides ii. Digests milk casein faster than trypsin iii. NO action on blood clotting.'},
  {cat:'digestive',q:'Carboxypeptidases: type and action.',a:'EXOPEPTIDASES (cleave terminal amino acids). Split polypeptides and proteins → free amino acids. Activated by trypsin.'},
  {cat:'digestive',q:'Pancreatic lipase: key facts.',a:'Most powerful lipolytic enzyme. Digests triglycerides → monoglycerides + fatty acids. pH: 7–9. Requires BILE SALTS + COLIPASE. Digests ~80% dietary fat. Deficiency → steatorrhea.'},
  {cat:'digestive',q:'Hormones that STIMULATE pancreatic secretion.',a:'SECRETIN (S cells, duodenum/jejunum) → watery juice, high bicarbonate, low enzymes. CCK (I cells, duodenum/jejunum) → enzyme-rich juice, less volume.'},
  {cat:'digestive',q:'Hormones that INHIBIT pancreatic secretion.',a:'1. Pancreatic polypeptide (PP cells). 2. Somatostatin (D cells, islets of Langerhans).'},
  {cat:'digestive',q:'How does the exocrine pancreas prevent autodigestion?',a:'Enzymes are secreted as INACTIVE ZYMOGENS (trypsinogen, chymotrypsinogen, etc.). Only activated INSIDE the duodenum by enterokinase.'},
  // ── LIVER & BILE ──
  {cat:'digestive',q:'Basic facts about the liver.',a:'Dual organ: SECRETORY + EXCRETORY. Largest gland: ~1.5 kg. Upper-right abdomen beneath diaphragm. Made of hepatic lobes → hepatic lobules (structural/functional unit).'},
  {cat:'digestive',q:'Describe the hepatic lobule structure.',a:'Honeycomb-like. HEPATOCYTES in hepatic plates. Between columns: BILE CANALICULUS. Between plates: SINUSOID (blood space). Between endothelial cells: KUPFFER CELLS.'},
  {cat:'digestive',q:'What is a portal triad?',a:'3 structures surrounding each lobule: 1. Branch of hepatic artery 2. Branch of portal vein 3. Tributary of bile duct.'},
  {cat:'digestive',q:'Blood flow pathway through the liver.',a:'Hepatic artery + Portal vein → Interlobular vein → SINUSOID → Central vein → Hepatic vein → IVC → Right atrium.'},
  {cat:'digestive',q:'The biliary system (extrahepatic biliary apparatus).',a:'Right + left hepatic ducts → COMMON HEPATIC DUCT + cystic duct → COMMON BILE DUCT + pancreatic duct → AMPULLA OF VATER → duodenum.'},
  {cat:'digestive',q:'What is the sphincter of Oddi?',a:'Smooth muscle sphincter at lower common bile duct. Normally CLOSED → bile stored in gallbladder. Opens on stimulation (CCK, food) → bile flows into intestine.'},
  {cat:'digestive',q:'Properties of bile.',a:'Color: golden yellow or greenish. Volume: 800–1,200 mL/day. ALKALINE pH 8–8.6. Specific gravity: 1.010–1.011. 97.6% water + 2.4% solids.'},
  {cat:'digestive',q:'Organic substances in bile.',a:'1. Bile salts 2. Bile pigments 3. Cholesterol 4. Fatty acids 5. Lecithin 6. Mucin.'},
  {cat:'digestive',q:'What are the 5 functions of bile salts?',a:'1. EMULSIFICATION of fat 2. ABSORPTION of fats (micelles) 3. CHOLERETIC ACTION (stimulate more bile) 4. LAXATIVE ACTION (stimulate peristalsis) 5. PREVENTION OF GALLSTONE FORMATION.'},
  {cat:'digestive',q:'What are bile pigments?',a:'Excretory products. Bilirubin (MAJOR, human) and Biliverdin. Formed from breakdown of HEMOGLOBIN by reticuloendothelial system.'},
  {cat:'digestive',q:'Stages of formation of bilirubin.',a:'Senile RBCs → Hb released → Heme + Globin → Biliverdin + Iron → Bilirubin (free/unconjugated) → Liver conjugates with glucuronic acid → Conjugated bilirubin → excreted in bile → intestine.'},
  {cat:'digestive',q:'Bilirubin levels: normal, hyperbilirubinemia, jaundice.',a:'Normal: 0.5–1.5 mg/dL. >1 mg/dL = HYPERBILIRUBINEMIA. >2 mg/dL = JAUNDICE.'},
  {cat:'digestive',q:'What are the 9 functions of bile?',a:'1. Digestive 2. Absorptive (fat-soluble vitamins) 3. Excretory (pigments, metals, toxins) 4. Laxative 5. Antiseptic 6. Choleretic 7. Neutralizes acid chyme 8. Prevents gallstones 9. Lubrication (mucin).'},
  {cat:'digestive',q:'What are the 9 functions of the liver?',a:'1. Metabolic 2. Storage (glycogen, Fe, vitamins) 3. Synthetic (plasma proteins, glucose) 4. Bile secretion 5. Excretory 6. Heat production 7. Haemopoietic (fetal) 8. Hemolytic (Kupffer cells) 9. Inactivation of hormones/drugs.'},
  {cat:'digestive',q:'Synthetic function of the liver.',a:'Glucose by gluconeogenesis. ALL plasma proteins EXCEPT immunoglobulins (albumin, clotting factors, complement). Also: steroids, somatomedin, heparin.'},
  {cat:'digestive',q:'Two types of bilirubin.',a:'FREE (Unconjugated): in blood before liver; albumin-bound; fat-soluble. CONJUGATED (Direct): after conjugation with glucuronic acid in liver; water-soluble; excreted in bile.'},
  // ── HIGH-YIELD COMPARISONS ──
  {cat:'digestive',q:'TRAP: Which accelerates blood clotting – trypsin or chymotrypsin?',a:'TRYPSIN accelerates blood clotting and curdles milk. CHYMOTRYPSIN has NO action on blood clotting.'},
  {cat:'digestive',q:'TRAP: Secretin vs CCK – which stimulates what?',a:'SECRETIN (S cells) → bicarbonate-rich, watery juice. CCK (I cells) → enzyme-rich, less volume. (Secretin = Sodium bicarbonate; CCK = enzyme Cocktail)'},
  {cat:'digestive',q:'TRAP: Saliva is isotonic to plasma – True or False?',a:'FALSE. Saliva is HYPOTONIC to plasma (much lower electrolyte concentration).'},
  {cat:'digestive',q:'Compare pH: saliva vs pancreatic juice vs bile.',a:'Saliva: 6.35–6.85 (slightly ACIDIC). Pancreatic juice: 8.0–8.3 (highly ALKALINE). Bile: 8.0–8.6 (ALKALINE).'},
  {cat:'digestive',q:'TRAP: Does the liver produce immunoglobulins?',a:'NO. Liver produces ALL plasma proteins EXCEPT immunoglobulins. These are made by plasma cells (B lymphocytes).'},
  {cat:'digestive',q:'What happens to bilirubin in the intestine?',a:'Conjugated bilirubin → bacteria reduce it → UROBILINOGEN. Some reabsorbed → excreted in urine (urobilin). Rest → oxidized → STERCOBILIN (brown color of feces).'},
  {cat:'digestive',q:'MASTER: Enzyme activation chain.',a:'Enterokinase → Trypsin → activates ALL other proenzymes (chymotrypsinogen, procarboxypeptidases, proelastase, procolipase, phospholipase A&B).'},
  {cat:'digestive',q:'MASTER: Volume comparison of secretions.',a:'Saliva: 1,000–1,500 mL/day. Pancreatic juice: 500–800 mL/day. Bile: 800–1,200 mL/day.'},
  {cat:'digestive',q:'Molar glands: what are they?',a:'4–5 larger buccal glands situated OUTSIDE the buccinator muscle around the terminal part of the parotid duct. They are minor salivary glands.'},
  {cat:'digestive',q:'Excretory function of saliva.',a:'Excretes: mercury, lead, thiocyanate, potassium iodide, viruses (rabies, mumps). Pathological: glucose (diabetes), urea (nephritis), excess calcium (hyperparathyroidism).'},

  // ── ADDITIONAL CARDS (completing to 100) ──
  {cat:'digestive',q:'Two alternative names for the oral cavity?',a:'Oral cavity = Buccal cavity / Mouth. Formed by cheeks, lips, and palate. Encloses teeth, tongue, and salivary glands.'},
  {cat:'digestive',q:'Racemose (bunch-of-grapes) structure of salivary glands.',a:'Acini/alveoli (central cavity) → Intercalated duct → Intralobular duct → Interlobular duct → Main duct. Racemose = bunch-of-grapes appearance.'},
  {cat:'digestive',q:'Maltase: action and key fact.',a:'Converts maltose → glucose. Present only in TRACES in human saliva.'},
  {cat:'digestive',q:'Nerve supply of the pancreas.',a:'Sympathetic: via SPLANCHNIC NERVE. Parasympathetic: via VAGUS NERVE.'},
  {cat:'digestive',q:'Nucleases in pancreatic juice: types and actions.',a:'Ribonuclease: RNA → mononucleotides. Deoxyribonuclease: DNA → mononucleotides.'},
  {cat:'digestive',q:'Elastase and Collagenase: activation and actions.',a:'Elastase: proelastase → elastase (by trypsin); digests elastic fibers. Collagenase: procollagenase → collagenase (by trypsin); digests collagen.'},
  {cat:'digestive',q:'Cholesterol ester hydrolase, Phospholipase A, Phospholipase B.',a:'Cholesterol ester hydrolase: cholesterol ester → free cholesterol + fatty acid. Phospholipase A (trypsin-activated): lecithin + cephalin → lysolecithin + lysocephalin. Phospholipase B (trypsin-activated): lysolecithin + lysocephalin → phosphoryl choline + fatty acids.'},
  {cat:'digestive',q:'Colipase and pancreatic amylase roles.',a:'Colipase: small coenzyme for pancreatic lipase; facilitates fat hydrolysis; activated from procolipase by trypsin. Pancreatic amylase: converts starch → dextrin + maltose (like salivary amylase).'},
  {cat:'digestive',q:'Neutralizing function of pancreatic juice.',a:'Acid chyme from stomach → pancreatic juice (high HCO₃⁻) released → NEUTRALIZES acid chyme → protects intestinal mucosa from acid destruction.'},
  {cat:'digestive',q:'Inorganic substances in pancreatic juice.',a:'Na, Ca, K, Mg, Bicarbonate (110–150 mEq/L), Chloride, Phosphate, Sulfate. Bicarbonate is responsible for the high alkalinity.'},
  {cat:'digestive',q:'Organic substances in pancreatic juice.',a:'Enzymes (proteolytic, lipolytic, amylolytic) + Albumin + Globulin.'},
  {cat:'digestive',q:'What activates phospholipase A and B?',a:'Both are activated by TRYPSIN.'},
  {cat:'digestive',q:'Volume comparison: saliva vs pancreatic juice vs bile.',a:'Saliva: 1,000–1,500 mL/day. Pancreatic juice: 500–800 mL/day. Bile: 800–1,200 mL/day.'},
  {cat:'digestive',q:'Kupffer cells: what are they and what do they do?',a:'Special macrophages (reticuloendothelial cells) in liver sinusoids. Functions: destroy senile RBCs, body defense (phagocytosis of bacteria and foreign particles).'},
  {cat:'digestive',q:'Bile flow pathway from hepatocyte to duodenum.',a:'Hepatocytes secrete bile → Bile canaliculus → Tributary of bile duct → Small bile ducts → Left + Right hepatic ducts → Common hepatic duct → + cystic duct → Common bile duct → Ampulla of Vater → duodenum.'},
  {cat:'digestive',q:'Inorganic substances in bile.',a:'Na, Ca, K, Chloride, Bicarbonate. These contribute to bile\'s alkaline nature (pH 8–8.6).'},
  {cat:'digestive',q:'Bile salts: what are they and where are they formed?',a:'Sodium and potassium salts of bile acids (cholic/chenodeoxycholic acids), conjugated with GLYCINE or TAURINE. Formed in the LIVER.'},
  {cat:'digestive',q:'Storage function of the liver.',a:'Stores: glycogen, amino acids, iron, folic acid, vitamins A, B12, D.'},
  {cat:'digestive',q:'Haemopoietic function of the liver.',a:'In fetal life (hepatic stage): produces blood cells. Stores vitamin B12 (for erythropoiesis) and iron (for Hb synthesis). Produces THROMBOPOIETIN → promotes thrombocyte production.'},
  {cat:'digestive',q:'Hemolytic function of the liver.',a:'Kupffer cells (reticuloendothelial cells) destroy senile RBCs after their 120-day lifespan.'},
  {cat:'digestive',q:'What substances does the liver inactivate?',a:'Hormones: GH, parathormone, cortisol, insulin, glucagon, estrogen. Defensive: Kupffer cells phagocytose bacteria and foreign particles.'},
  {cat:'digestive',q:'How is bile stored and released?',a:'Sphincter of Oddi normally CLOSED → bile enters gallbladder via cystic duct → stored and concentrated. Upon stimulation (CCK, food) → sphincter OPENS → bile released into duodenum.'},
  {cat:'digestive',q:'TRAP: Compare 3 major glands: size, duct, classification.',a:'Parotid: LARGEST – Stensen\'s duct – SEROUS. Submandibular: MEDIUM – Wharton\'s duct – MIXED. Sublingual: SMALLEST – Rivinus/Bartholin\'s duct – MIXED.'},
  {cat:'digestive',q:'TRAP: Parotid contributes 70% of saliva. True or False?',a:'FALSE. SUBMANDIBULAR contributes 70%. Parotid: 25%, Sublingual: 5%.'},
  {cat:'digestive',q:'TRAP: Bile and pancreatic juice enter duodenum through the same opening?',a:'TRUE. Both enter via the AMPULLA OF VATER (common hepatopancreatic duct).'},
  {cat:'digestive',q:'pH comparison: salivary amylase vs pancreatic lipase.',a:'Salivary amylase: pH 6 (acid medium). Pancreatic lipase: pH 7–9 (near neutral to alkaline).'},
  {cat:'digestive',q:'TRAP: Difference between conjugated vs free bilirubin in blood tests.',a:'FREE (indirect): from RBC breakdown, before liver; albumin-bound; fat-soluble. CONJUGATED (direct): after liver processing with glucuronic acid; water-soluble; excreted in bile.'},
  {cat:'digestive',q:'What activates proelastase, procolipase, and procarboxypeptidases?',a:'All three are activated by TRYPSIN.'},
  {cat:'digestive',q:'TRAP: Does the liver produce immunoglobulins?',a:'NO. Liver produces ALL plasma proteins EXCEPT immunoglobulins. Immunoglobulins are produced by plasma cells (B lymphocytes).'},
  {cat:'digestive',q:'What is Wirsung\'s duct?',a:'Main pancreatic duct formed by union of all intralobular ducts. Joins common bile duct → AMPULLA OF VATER → opens into DUODENUM.'},
  {cat:'digestive',q:'Hyposalivation: temporary vs. permanent causes.',a:'TEMPORARY: fear, fever, dehydration. PERMANENT: sialolithiasis (duct stone/obstruction), congenital hypoplasia/absence, Bell\'s palsy (CN VII paralysis).'},
  {cat:'digestive',q:'What are ptyalism, sialorrhea, sialism, sialosis?',a:'All are names for HYPERSALIVATION in pathological conditions. Physiological hypersalivation: pregnancy only.'},
  {cat:'digestive',q:'Why is the liver called a dual organ?',a:'SECRETORY function: secretes bile (digestive). EXCRETORY function: excretes bile pigments, heavy metals, cholesterol.'},
  {cat:'digestive',q:'Role of bile salts in gallstone prevention.',a:'Bile salts keep cholesterol and lecithin IN SOLUTION. Absence of bile salts → cholesterol + lecithin precipitate → GALLSTONES form.'},
  {cat:'digestive',q:'TRAP: Saliva is isotonic to plasma. True or False?',a:'FALSE. Saliva is HYPOTONIC to plasma (much lower electrolyte concentration).'},
  {cat:'digestive',q:'Molar glands: definition and location.',a:'4–5 larger buccal glands situated OUTSIDE the buccinator muscle around the terminal part of the parotid duct. They are minor salivary glands.'},
  {cat:'digestive',q:'What happens to bilirubin after excretion in the intestine?',a:'Conjugated bilirubin → bacteria reduce → UROBILINOGEN. Some reabsorbed → excreted in urine (UROBILIN). Remainder → oxidized in stool → STERCOBILIN (brown color of feces).'},
  {cat:'digestive',q:'Choleretic action of bile salts.',a:'Bile salts stimulate the SECRETION OF BILE from liver hepatocytes. This is a positive feedback mechanism.'},
  {cat:'digestive',q:'Zymogen granules in pancreatic acinar cells.',a:'Secretory granules containing INACTIVE digestive enzymes (zymogens). Prevents autodigestion of the pancreas itself before activation in duodenum.'},
];

  {type:'mcq',q:'All of the following are causes of muscle fatigue EXCEPT:',opts:['Exhaustion of acetylcholine at motor endplate','Accumulation of lactic acid and phosphoric acid','Lack of glycogen and oxygen','Increased calcium ion release from sarcoplasmic reticulum'],ans:3,exp:'Increased Ca²⁺ release would ENHANCE contraction, not cause fatigue. All others are true causes.'},
  {type:'mcq',q:'All of the following are true about T-tubules EXCEPT:',opts:['Formed by invagination of sarcolemma','Open to the exterior of the muscle cell','Extracellular fluid runs through their lumen','Store calcium ions for contraction'],ans:3,exp:'Ca²⁺ is stored in L-tubules (SR), NOT T-tubules. T-tubules function in action potential conduction.'},
  {type:'mcq',q:'All of the following are true about myosin filaments EXCEPT:',opts:['They are thick filaments','Located in the A band','Have cross bridges with myosin heads','Contain troponin regulatory protein'],ans:3,exp:'Troponin is a regulatory protein of ACTIN filaments. Myosin filaments do not contain troponin.'},
  {type:'mcq',q:'All of the following are recognized types of muscle rigor EXCEPT:',opts:['Heat rigor','Cold rigor','Calcium rigor','Phosphate rigor'],ans:3,exp:'Phosphate rigor does not exist in the classification. The four types are: heat, cold, calcium, and rigor mortis.'},
  {type:'mcq',q:'All of the following are components of the skeletal muscle triad EXCEPT:',opts:['Transverse (T) tubule','Terminal cisternae','Sarcolemma directly','Two lateral sacs of SR'],ans:2,exp:'The triad = T-tubule + two terminal cisternae. Sarcolemma forms T-tubules but is not part of the triad itself.'},
  {type:'mcq',q:'All of the following are true about smooth muscle tone EXCEPT:',opts:['Maintained by calcium ion levels','Depends on number of cross bridges','Myogenic in origin','Maintained by somatic nerve discharge'],ans:3,exp:'Smooth muscle tone is MYOGENIC (depends on Ca²⁺ and cross bridges). Somatic nerves supply skeletal muscle.'},
  {type:'mcq',q:'All of the following are found in the axon terminal EXCEPT:',opts:['Mitochondria','Synaptic vesicles containing ACh','Acetylcholinesterase','ATP (energy source)'],ans:2,exp:'Acetylcholinesterase is located in the BASAL LAMINA of the synaptic cleft, NOT in the axon terminal.'},
  {type:'mcq',q:'All of the following occur at warm temperature (40°C) to increase muscle contraction EXCEPT:',opts:['Increased excitability of muscle','Acceleration of chemical processes','Decreased viscosity of muscle','Increased viscosity of muscle'],ans:3,exp:'At 40°C, viscosity DECREASES (facilitating contraction). Increased viscosity occurs at cold temperatures.'},
  {type:'mcq',q:'All of the following are true about single-unit (visceral) smooth muscle EXCEPT:',opts:['Gap junctions connect adjacent fibers','Develops a functional syncytium','Each fiber receives individual nerve supply','Can contract spontaneously'],ans:2,exp:'Individual nerve supply per fiber is a feature of MULTIUNIT smooth muscle, NOT single-unit.'},
  {type:'mcq',q:'All of the following are nitrogenous organic substances in skeletal muscle EXCEPT:',opts:['ATP and adenylic acid','Creatine and phosphocreatine','Glycogen','Carnosine and carnitine'],ans:2,exp:'Glycogen is a CARBOHYDRATE (polysaccharide), not a nitrogenous substance. All others are nitrogenous.'},
  {type:'mcq',q:'Which band contains ONLY actin thin filaments?',opts:['A band','H zone','I band','M line'],ans:2,exp:'I band = only actin. A band = actin + myosin overlap. H zone = only myosin. M line = myosin midpoint.'},
  {type:'mcq',q:'The structural and functional unit of myofibrils is:',opts:['Myosin molecule','Sarcomere','Actin filament','Muscle fasciculus'],ans:1,exp:'Sarcomere is the repeating unit between two Z lines — the structural and functional unit of skeletal muscle.'},
  {type:'mcq',q:'Acetylcholine at the NMJ is destroyed by:',opts:['Acetyl CoA','Acetylcholinesterase','Choline acetyltransferase','Monoamine oxidase'],ans:1,exp:'Acetylcholinesterase in the basal lamina destroys ACh within 1 ms, allowing muscle relaxation.'},
  {type:'mcq',q:'The amplitude of miniature endplate potential is:',opts:['5 mV','15 mV','0.5 mV','90 mV'],ans:2,exp:'MEPP = 0.5 mV only. Multiple summated MEPPs produce EPP (−60 mV) which then triggers full action potential.'},
  {type:'mcq',q:'The firing level of action potential in skeletal muscle occurs at:',opts:['−90 mV','−80 mV','−75 mV','+55 mV'],ans:2,exp:'After 15 mV of slow depolarization from RMP (−90 mV), firing level is reached at −75 mV.'},
  {type:'mcq',q:'Which muscle fiber type has a LARGE diameter and is fast-twitch?',opts:['Type I fibers','Slow-twitch fibers','Type II fibers','Red muscle fibers'],ans:2,exp:'Type II = fast twitch (pale muscle), LARGE diameter. Type I = slow twitch (red muscle), small diameter.'},
  {type:'mcq',q:'All of the following are inorganic substances in skeletal muscle EXCEPT:',opts:['Potassium','Calcium','Creatine','Phosphate'],ans:2,exp:'Creatine/phosphocreatine are ORGANIC (nitrogenous) substances. Potassium, calcium, and phosphate are inorganic.'},
  {type:'mcq',q:'All of the following contribute to recovery from muscle fatigue EXCEPT:',opts:['Removal of metabolic waste products','Reformation of ACh at the NMJ','Re-establishment of normal polarized state','Continued accumulation of lactic acid'],ans:3,exp:'Lactic acid accumulation CAUSES fatigue — its REMOVAL leads to recovery. All other options aid recovery.'},
  {type:'mcq',q:'All of the following are features of smooth muscle EXCEPT:',opts:['Involuntary control','Non-striated (plain) appearance','Dense bodies serve as anchors for thin filaments','Well-defined sarcomeres present'],ans:3,exp:'Smooth muscle has NO sarcomeres — it uses dense bodies instead. Sarcomeres are exclusive to striated muscle.'},
  {type:'mcq',q:'All of the following are true about multiunit smooth muscle EXCEPT:',opts:['No interconnecting gap junctions','Each fiber has individual nerve supply','Do not show spontaneous contractions','Form a functional syncytium'],ans:3,exp:'Functional syncytium is a feature of SINGLE-UNIT smooth muscle (connected by gap junctions).'},
  {type:'mcq',q:'The postsynaptic membrane at the NMJ is thrown into folds called:',opts:['Gap junctions','Synaptic cleft','Subneural clefts','Terminal cisternae'],ans:2,exp:'Subneural clefts (junctional folds) increase the surface area of the postsynaptic membrane with nicotinic receptors.'},
  {type:'mcq',q:'Which type of action potential in smooth muscle causes SUSTAINED contraction?',opts:['Simple spike potential','Slow-wave potential','Action potential with plateau','Miniature endplate potential'],ans:2,exp:'Action potential with plateau remains depolarized for 100–1000 ms → prolonged Ca²⁺ entry → sustained contraction.'},
  {type:'mcq',q:'The resting membrane potential of visceral smooth muscle ranges between:',opts:['−90 to −100 mV','−50 to −75 mV','−25 to −40 mV','0 to −10 mV'],ans:1,exp:'Visceral smooth muscle RMP is unstable: −50 to −75 mV (sometimes as low as −25 mV due to slow waves).'},
  {type:'mcq',q:'Slow waves in visceral smooth muscle occur at a frequency of:',opts:['1–3 per minute','4–10 per minute','20–30 per minute','60–80 per minute'],ans:1,exp:'Slow waves: 4–10/min, amplitude 10–15 mV. They are the basis of pacemaker activity in visceral smooth muscle.'},
  {type:'mcq',q:'All of the following are features of cardiac muscle EXCEPT:',opts:['Striated appearance','Involuntary control','Supplied by somatic nerve fibers','Forms the musculature of the heart'],ans:2,exp:'Cardiac muscle is supplied by AUTONOMIC (not somatic) nerve fibers. Somatic nerves supply skeletal muscle.'},
  {type:'mcq',q:'All of the following are true about endomysium EXCEPT:',opts:['It is a connective tissue layer','It covers each individual muscle fiber','It lies outside the sarcolemma','It covers each muscle fasciculus'],ans:3,exp:'Fasciculi are covered by PERIMYSIUM. Endomysium covers each individual fiber only.'},
  {type:'mcq',q:'All of the following are true about the sites of fatigue in correct order EXCEPT:',opts:['Betz cells fatigue first','NMJ fatigues before spinal motor neurons','Skeletal muscle fatigues last','Anterior gray horn cells fatigue second'],ans:1,exp:'Correct order: Betz cells → Anterior gray horn cells (spinal) → NMJ → Muscle. NMJ is AFTER spinal neurons.'},
  {type:'mcq',q:'Afterhyperpolarization (positive afterpotential) is correctly described as:',opts:['Lasts 0.4 milliseconds','Occurs before the spike potential','Goes more negative than the resting membrane potential','Reaches an amplitude of +55 mV'],ans:2,exp:'Afterhyperpolarization: potential drops BELOW RMP (more negative than −90 mV), lasting >50 ms.'},
  {type:'mcq',q:'All of the following are contents of sarcoplasm EXCEPT:',opts:['Myofibrils','Mitochondria','Tendons','Sarcoplasmic reticulum'],ans:2,exp:'Tendons are external connective tissue structures anchoring muscle to bone — NOT within sarcoplasm.'},
  {type:'mcq',q:'Free load differs from afterload in that free load acts on muscle:',opts:['Only after the muscle begins to contract','Before the onset of contraction','Only during the relaxation phase','Only when tetanus occurs'],ans:1,exp:'Free load acts BEFORE contraction (e.g., holding bucket). Afterload acts only AFTER contraction begins.'},

const BG_CARDS = [
  // ── ABO BLOOD GROUPS ──
  {cat:'bg',q:'What determines a person’s ABO blood group?',a:'The presence or absence of antigens (agglutinogens) on the RBC membrane — specifically antigen A and/or antigen B.'},
  {cat:'bg',q:'What are agglutinogens?',a:'Antigens on the surface of RBCs that cause agglutination when mixed with their corresponding antibody (agglutinin). Named by Landsteiner.'},
  {cat:'bg',q:'What are agglutinins?',a:'Antibodies in the plasma corresponding to blood group antigens (e.g., anti-A/alpha, anti-B/beta). A particular agglutinogen and its corresponding agglutinin CANNOT coexist.'},
  {cat:'bg',q:'What antigen(s) and antibody(ies) are present in blood group A?',a:'Antigen A on RBCs + Anti-B (β) antibody in serum.'},
  {cat:'bg',q:'What antigen(s) and antibody(ies) are present in blood group B?',a:'Antigen B on RBCs + Anti-A (α) antibody in serum.'},
  {cat:'bg',q:'What antigen(s) and antibody(ies) are present in blood group AB?',a:'Both A and B antigens on RBCs + NO antibodies in serum. AB is the universal recipient.'},
  {cat:'bg',q:'What antigen(s) and antibody(ies) are present in blood group O?',a:'NO antigens on RBCs + Both Anti-A and Anti-B antibodies in serum. O is the universal donor.'},
  {cat:'bg',q:'Why is blood group O called the universal donor?',a:'Because O RBCs carry no antigens (A or B), so the recipient’s antibodies cannot agglutinate them — compatible with all blood groups.'},
  {cat:'bg',q:'Why is blood group AB called the universal recipient?',a:'Because AB plasma has NO antibodies, so it cannot agglutinate donor RBCs from any blood group.'},
  {cat:'bg',q:'What is agglutination and what causes it?',a:'Clumping of RBCs when an antigen meets its corresponding antibody (e.g., A antigen + anti-A). The antibody involved is called an isoagglutinin.'},
  // ── TRANSFUSION ──
  {cat:'bg',q:'What is the difference between blood matching and crossmatching?',a:'Blood matching (typing) = Recipient’s RBCs + Test antisera. Crossmatching = Recipient’s SERUM + Donor’s RBCs. Both are done before transfusion.'},
  {cat:'bg',q:'What are the three complications of an incompatible blood transfusion?',a:'(1) Jaundice — serum bilirubin rises above 2 mg/dL. (2) Cardiac shock — increased blood viscosity overloads the heart. (3) Renal shutdown — toxic substances from hemolyzed RBCs constrict renal vessels.'},
  {cat:'bg',q:'What is the Rh factor?',a:'An antigen (specifically the D antigen) on the RBC surface. Discovered by Landsteiner and Wiener in rhesus monkeys. D antigen = Rh positive; without = Rh negative.'},
  {cat:'bg',q:'How does the Rh system differ from the ABO system?',a:'In ABO, corresponding antibodies are naturally present in plasma. In Rh, there is NO natural anti-D antibody — it only forms after exposure to Rh-positive blood.'},
  {cat:'bg',q:'What happens when an Rh-negative person receives Rh-positive blood for the first time?',a:'Sensitization occurs — anti-D antibodies form. No immediate severe reaction. On second exposure, the pre-formed anti-D causes hemolytic transfusion reaction.'},
  // ── RETICULOENDOTHELIAL SYSTEM & SPLEEN ──
  {cat:'bg',q:'What is the reticuloendothelial system (RES)?',a:'A system of primitive phagocytic cells (macrophages and related cells) that play an important role in the body’s defense mechanism.'},
  {cat:'bg',q:'What is a macrophage and where does it come from?',a:'A large phagocytic cell derived from MONOCYTES. When monocytes leave the blood and enter tissues, they differentiate into tissue macrophages.'},
  {cat:'bg',q:'Name three examples of fixed tissue macrophages and their locations.',a:'Kupffer cells (liver), Alveolar macrophages (lungs), Microglia (brain). Also: meningocytes (meninges), reticular cells of spleen/lymph node/bone marrow.'},
  {cat:'bg',q:'Which macrophage secretion prevents rejection of transplanted organs?',a:'Transforming Growth Factor (TGF).'},
  {cat:'bg',q:'What cytokines do tissue macrophages secrete that help in immunity?',a:'Interleukin-1, Interleukin-6, and Interleukin-12.'},
  {cat:'bg',q:'What is M-CSF and what does it do?',a:'M-CSF (Colony-Stimulating Factor) secreted by macrophages accelerates growth of granulocytes, monocytes, and macrophages.'},
  {cat:'bg',q:'Why is the spleen called the "graveyard of RBCs"?',a:'Old, fragile RBCs (lifespan ~120 days) cannot withstand squeezing through thin splenic capillaries and are destroyed there. The spleen is the primary site of senile RBC destruction.'},
  {cat:'bg',q:'What are the four main functions of the spleen?',a:'(1) Formation of blood cells (hemopoiesis in embryo). (2) Destruction of old blood cells. (3) Blood reservoir — releases RBCs during hypoxia/hemorrhage. (4) Defense — macrophages phagocytose microorganisms; ~25% T cells and ~15% B cells.'},
  // ── LYMPHATICS ──
  {cat:'bg',q:'What is the lymphatic system?',a:'A closed, ONE-WAY system of lymph channels through which lymph flows from tissue spaces toward the blood (not in reverse).'},
  {cat:'bg',q:'What is the structure of a lymph node?',a:'Small glandular structure covered by dense connective tissue capsule, arranged in three layers: cortex, paracortex, and medulla. Receives lymph via afferent vessels; drains via efferent vessels.'},
  {cat:'bg',q:'Why are lymph nodes called "defense barriers"?',a:'Macrophages in lymph nodes destroy bacteria and toxic substances passing through lymph. Water and electrolytes are filtered out; proteins and lipids are retained.'},
  {cat:'bg',q:'What is the rate of lymph flow into the blood per hour?',a:'~120 mL/hour — 100 mL/h through the thoracic duct and 20 mL/h through the right lymphatic duct.'},
  {cat:'bg',q:'What is the composition of lymph?',a:'96% water + 4% solids (proteins, lipids/chylomicrons, carbohydrates, amino acids, urea, creatinine, inorganic substances).'},
  {cat:'bg',q:'What is the most important function of lymph?',a:'To return PROTEINS from tissue spaces back into the blood. Proteins cannot enter blood capillaries (too large), so they enter lymph capillaries (more permeable).'},
  {cat:'bg',q:'Why does lymph appear milky after a fatty meal?',a:'Chylomicrons and lipoproteins absorbed from intestinal villi enter lymph vessels, giving lymph a milky (chylous) appearance.'},
  // ── TISSUE FLUID & EDEMA ──
  {cat:'bg',q:'What is tissue (interstitial) fluid and how is it formed?',a:'Medium bathing cells (~20% of ECF). Formed by filtration at the ARTERIAL end of capillaries (hydrostatic pressure 30 mmHg > oncotic 25 mmHg pushes fluid out).'},
  {cat:'bg',q:'How is tissue fluid reabsorbed?',a:'At the VENOUS end, oncotic pressure (25 mmHg) exceeds hydrostatic pressure (15 mmHg) → 10 mmHg gradient pulls fluid back. About 10% of filtered fluid enters lymph capillaries instead.'},
  {cat:'bg',q:'What are the two main types of edema based on fluid compartment?',a:'(1) Intracellular edema — fluid inside cells (malnutrition, poor metabolism, inflammation). (2) Extracellular edema — fluid in interstitial space.'},
  {cat:'bg',q:'What are the five causes of extracellular edema?',a:'(1) Heart failure. (2) Renal disease. (3) Decreased plasma proteins. (4) Lymphatic obstruction. (5) Increased endothelial permeability.'},
  {cat:'bg',q:'What is the difference between pitting and non-pitting edema?',a:'Pitting edema = free fluid; finger pressure leaves a depression. Non-pitting edema = hard; no pit forms (due to cell swelling or fibrinogen clotting in interstitial fluid).'},
  // ── TRANSFUSION TYPES ──
  {cat:'bg',q:'What is exchange transfusion and when is it used?',a:'Removal of patient’s blood and replacement with fresh donor blood or plasma. Used in severe jaundice and sickle cell anemia.'},
  {cat:'bg',q:'What is autologous blood transfusion?',a:'Collection and reinfusion of the PATIENT’S OWN blood. Also called self-blood donation. Eliminates compatibility risks.'},
  {cat:'bg',q:'What are the common blood substitutes?',a:'Human plasma, 0.9% NaCl (isotonic saline), and 5% glucose solution. These replace volume but cannot carry oxygen like whole blood.'},
  {cat:'bg',q:'What precautions must be taken during blood transfusion?',a:'(1) Donor must be healthy (free of syphilis, AIDS). (2) Only compatible blood + confirmed Rh compatibility. (3) Both matching and crossmatching done. (4) Sterile apparatus. (5) Blood at body temperature. (6) Slow transfusion.'},
];

const PLT_CARDS = [
  // ── PLATELETS ──
  {cat:'plt',q:'What are platelets also called, and what are they structurally?',a:'Also called thrombocytes. Small, colorless, NON-nucleated fragments of cytoplasm shed from megakaryocytes.'},
  {cat:'plt',q:'What is the normal size of platelets?',a:'Diameter: 2.5 µm (2–4 µm) | Volume: 7.5 cu µm (7–8 cu µm)'},

  {cat:'plt',q:'What is Platelet-Derived Growth Factor (PDGF)?',a:'A protein responsible for repair of damaged blood vessels and wound healing.'},

  {cat:'plt',q:'What does Thrombospondin do?',a:'INHIBITS angiogenesis (formation of new blood vessels).'},

  {cat:'plt',q:'What is Glanzmann’s Thrombasthenia?',a:'An inherited hemorrhagic disorder caused by structural/functional abnormality of platelets → leads to thrombasthenic purpura.'},
  // ── HEMOSTASIS ──
  {cat:'plt',q:'Define Hemostasis and list its 3 stages.',a:'Hemostasis = arrest/stoppage of bleeding. Stages: 1) Vasoconstriction 2) Platelet plug formation 3) Coagulation of blood.'},
  {cat:'plt',q:'What happens during Stage 1 of hemostasis (Vasoconstriction)?',a:'The injured blood vessel constricts (arterioles & small arteries) to decrease blood loss. It is a purely LOCAL phenomenon.'},
  {cat:'plt',q:'What substances are secreted during platelet plug formation and what do they do?',a:'Platelets adhere to collagen and secrete ADP & Thromboxane A2 → attract & activate more platelets → form a loose temporary platelet plug.'},
  {cat:'plt',q:'What happens in Stage 3 of hemostasis?',a:'Fibrinogen is converted to fibrin. Fibrin threads attach to the loose platelet plug, blocking the ruptured vessel completely.'},
  // ── COAGULATION ──
  {cat:'plt',q:'How many clotting factors are identified? What is special about Factor IX?',a:'13 clotting factors. Factor IX (Christmas factor) was named after the PATIENT in whom it was discovered, not the scientist.'},
  {cat:'plt',q:'List the 3 stages of blood clotting.',a:'1) Formation of prothrombin activator 2) Conversion of prothrombin → thrombin 3) Conversion of fibrinogen → fibrin.'},
  {cat:'plt',q:'What is the difference between the Intrinsic and Extrinsic pathways?',a:'Intrinsic → initiated by PLATELETS (within blood). Extrinsic → initiated by TISSUE THROMBOPLASTIN (from injured tissues).'},
  {cat:'plt',q:'What is the positive feedback effect of thrombin?',a:'Thrombin activates Factor V → Factor V accelerates formation of both intrinsic & extrinsic prothrombin activator → more thrombin is produced.'},
  {cat:'plt',q:'What role does Factor XIII play in clot formation?',a:'Factor XIII (Fibrin-stabilizing factor/Fibrinase) converts loose fibrin strands into DENSE & TIGHT fibrin threads in the presence of calcium ions.'},
  {cat:'plt',q:'Define a blood clot.',a:'A mesh of fibrin threads entangling RBCs, WBCs, and platelets.'},
  {cat:'plt',q:'What is clot retraction and which proteins are responsible?',a:'Contraction of the blood clot with oozing of serum (occurs 30–45 min after clot forms). Responsible proteins: Actin, Myosin, and Thrombosthenin.'},

  // ── FIBRINOLYSIS & ANTICOAGULANTS ──
  {cat:'plt',q:'Define Fibrinolysis and what substance is required?',a:'Lysis (dissolving) of a blood clot INSIDE the blood vessel. Requires PLASMIN (fibrinolysin).'},
  {cat:'plt',q:'How is Plasmin formed?',a:'Plasminogen (inactive glycoprotein made in liver) is converted to Plasmin by: tissue plasminogen activator (t-PA), lysosomal enzymes, and thrombin.'},
  {cat:'plt',q:'Where is Heparin produced and by which cells?',a:'Produced naturally by MAST CELLS (in connective tissue of liver & lungs) and BASOPHILS.'},
  {cat:'plt',q:'What are the mechanisms of action of Heparin?',a:'1) Directly suppresses thrombin activity 2) Combines with Antithrombin III → removes thrombin 3) Inactivates clotting factors IX, X, XI, and XII.'},
  {cat:'plt',q:'How do Coumarin derivatives (Warfarin, Dicoumoral) work?',a:'Inhibit the action of VITAMIN K → prevent formation of clotting factors II, VII, IX, and X. Used orally (in vivo).'},
  {cat:'plt',q:'How does EDTA work as an anticoagulant?',a:'EDTA removes CALCIUM from blood, preventing clotting. In vivo: used intravenously in LEAD POISONING cases.'},
  // ── CLOTTING TESTS ──
  {cat:'plt',q:'What is Bleeding Time and its normal duration? What prolongs it?',a:'Time from injury until bleeding STOPS. Normal: 3–6 minutes. Prolonged in PURPURA.'},
  {cat:'plt',q:'What is Clotting Time and its normal duration? What prolongs it?',a:'Time from injury until CLOT FORMS. Normal: 3–8 minutes. Prolonged in HEMOPHILIA.'},
  {cat:'plt',q:'What is Prothrombin Time and how is it measured?',a:'Time for blood to clot after adding TISSUE THROMBOPLASTIN. Blood is oxalated first, then thromboplastin + calcium is added.'},
  // ── BLEEDING DISORDERS & THROMBOSIS ──
  {cat:'plt',q:'What are the 3 types of Hemophilia and their causes?',a:'Hemophilia A (Classic) → Factor VIII deficiency (85%). Hemophilia B (Christmas) → Factor IX deficiency. Hemophilia C → Factor XI deficiency (rare).'},
  {cat:'plt',q:'What is Purpura and what makes Thrombasthenic Purpura unique?',a:'Purpura = prolonged BLEEDING TIME, normal CLOTTING TIME. Thrombasthenic purpura: platelet count NORMAL but platelets have structural/functional abnormality.'},
  {cat:'plt',q:'What is von Willebrand Disease?',a:'Inherited deficiency of von Willebrand factor → impaired platelet adhesion + secondary Factor VIII deficiency → excess bleeding.'},
  {cat:'plt',q:'Define Thrombosis, Embolism, Ischemia, and Infarction.',a:'Thrombosis → clotting inside vessels. Embolism → detached thrombus blocking distant vessel. Ischemia → insufficient blood supply. Infarction → tissue DEATH from loss of blood supply.'},
];
