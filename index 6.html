<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Physiology — Study App</title>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#080d14"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0b0f17;
    --surface: #141922;
    --surface2: #1c2333;
    --border: #252d3d;
    --text: #e8edf5;
    --muted: #6b7a99;
    --accent: #4f9cf9;
    --accent2: #38d9a9;
    --red: #ff6b6b;
    --green: #38d9a9;
    --yellow: #ffd43b;
    --card-h: clamp(220px, 55vw, 340px);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    display: flex;
    flex-direction: column;
    height: 100dvh;
  }

/* ── TOP BAR ── */
.topbar {
background: var(--surface);
border-bottom: 1px solid var(--border);
padding: 14px 20px 12px;
display: flex;
align-items: center;
justify-content: space-between;
flex-shrink: 0;
}
.topbar h1 {
font-family: ‘Syne’, sans-serif;
font-size: 17px;
font-weight: 800;
letter-spacing: -0.3px;
color: var(--text);
}
.topbar h1 span { color: var(--accent); }
.badge {
font-size: 11px;
background: var(--accent);
color: #fff;
padding: 3px 9px;
border-radius: 20px;
font-weight: 600;
}

/* ── MAIN CONTENT ── */
.main {
flex: 1;
overflow-y: auto;
overflow-x: hidden;
-webkit-overflow-scrolling: touch;
}
.section { display: none; padding: 16px 16px 100px; }
.section.active { display: block; }

/* ── BOTTOM NAV ── */
.bottomnav {
display: flex;
background: var(--surface);
border-top: 1px solid var(--border);
flex-shrink: 0;
}
.navbtn {
flex: 1;
padding: 12px 8px;
background: none;
border: none;
color: var(--muted);
font-family: ‘DM Sans’, sans-serif;
font-size: 12px;
font-weight: 500;
cursor: pointer;
display: flex;
flex-direction: column;
align-items: center;
gap: 4px;
transition: color 0.2s;
}
.navbtn.active { color: var(--accent); }
.navbtn svg { width: 22px; height: 22px; }

/* ── FILTER TABS ── */
.filter-row {
display: flex;
gap: 8px;
margin-bottom: 16px;
overflow-x: auto;
padding-bottom: 4px;
scrollbar-width: none;
}
.filter-row::-webkit-scrollbar { display: none; }
.filter-btn {
flex-shrink: 0;
padding: 7px 14px;
border-radius: 20px;
border: 1px solid var(--border);
background: var(--surface);
color: var(--muted);
font-size: 13px;
font-weight: 500;
cursor: pointer;
transition: all 0.18s;
font-family: ‘DM Sans’, sans-serif;
}
.filter-btn.active {
background: var(--accent);
border-color: var(--accent);
color: #fff;
}

/* ── FLASH CARD ── */
.fc-counter {
text-align: center;
font-size: 13px;
color: var(--muted);
margin-bottom: 14px;
font-weight: 500;
}
.fc-counter strong { color: var(--accent); }
.fc-scene {
width: 100%;
height: var(--card-h);
perspective: 1000px;
cursor: pointer;
margin-bottom: 16px;
}
.fc-card {
width: 100%;
height: 100%;
position: relative;
transform-style: preserve-3d;
transition: transform 0.45s cubic-bezier(0.4,0,0.2,1);
}
.fc-card.flipped { transform: rotateY(180deg); }
.fc-front, .fc-back {
position: absolute;
inset: 0;
border-radius: 16px;
padding: 24px 22px;
display: flex;
flex-direction: column;
justify-content: center;
align-items: center;
backface-visibility: hidden;
-webkit-backface-visibility: hidden;
}
.fc-front {
background: var(--surface);
border: 1px solid var(--border);
}
.fc-back {
background: linear-gradient(135deg, #1a2540 0%, #1c2f45 100%);
border: 1px solid #2a4060;
transform: rotateY(180deg);
}
.fc-tag {
font-size: 10px;
letter-spacing: 1px;
text-transform: uppercase;
color: var(--accent);
font-weight: 700;
margin-bottom: 14px;
background: rgba(79,156,249,0.1);
padding: 3px 10px;
border-radius: 10px;
align-self: flex-start;
}
.fc-question {
font-size: clamp(14px, 4vw, 17px);
line-height: 1.55;
color: var(--text);
font-weight: 400;
text-align: center;
}
.fc-tap-hint {
font-size: 11px;
color: var(--muted);
margin-top: 16px;
display: flex;
align-items: center;
gap: 5px;
}
.fc-answer {
font-size: clamp(13px, 3.8vw, 16px);
line-height: 1.6;
color: var(--accent2);
font-weight: 500;
text-align: center;
}
.fc-answer-label {
font-size: 10px;
letter-spacing: 1px;
color: var(--accent2);
text-transform: uppercase;
font-weight: 700;
margin-bottom: 12px;
opacity: 0.7;
}

.fc-controls {
display: flex;
gap: 10px;
justify-content: center;
margin-bottom: 14px;
}
.fc-btn {
flex: 1;
max-width: 130px;
padding: 11px;
border-radius: 12px;
border: 1px solid var(--border);
background: var(--surface);
color: var(--text);
font-size: 14px;
font-weight: 600;
cursor: pointer;
transition: all 0.18s;
font-family: ‘DM Sans’, sans-serif;
display: flex;
align-items: center;
justify-content: center;
gap: 6px;
}
.fc-btn:hover { background: var(--surface2); border-color: var(--accent); }
.fc-btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }

.fc-shuffle-row {
display: flex;
justify-content: center;
gap: 10px;
}
.fc-small-btn {
padding: 8px 16px;
border-radius: 10px;
border: 1px solid var(--border);
background: none;
color: var(--muted);
font-size: 12px;
font-weight: 500;
cursor: pointer;
font-family: ‘DM Sans’, sans-serif;
transition: all 0.18s;
display: flex;
align-items: center;
gap: 5px;
}
.fc-small-btn:hover { color: var(--text); border-color: var(--text); }

/* ── QUIZ ── */
.quiz-header {
display: flex;
align-items: center;
justify-content: space-between;
margin-bottom: 14px;
}
.quiz-progress-bar {
height: 4px;
background: var(--surface2);
border-radius: 4px;
margin-bottom: 16px;
overflow: hidden;
}
.quiz-progress-fill {
height: 100%;
background: var(--accent);
border-radius: 4px;
transition: width 0.3s ease;
}
.quiz-score-chip {
font-size: 13px;
font-weight: 600;
color: var(--accent2);
background: rgba(56,217,169,0.1);
padding: 4px 12px;
border-radius: 20px;
}
.quiz-q-num {
font-size: 13px;
color: var(--muted);
font-weight: 500;
}
.quiz-type-badge {
font-size: 10px;
padding: 3px 9px;
border-radius: 10px;
font-weight: 700;
letter-spacing: 0.5px;
text-transform: uppercase;
}
.quiz-type-badge.tf { background: rgba(255,212,59,0.15); color: var(--yellow); }
.quiz-type-badge.mcq { background: rgba(79,156,249,0.15); color: var(--accent); }

.quiz-card {
background: var(--surface);
border: 1px solid var(--border);
border-radius: 16px;
padding: 20px 18px;
margin-bottom: 14px;
}
.quiz-question {
font-size: clamp(14px, 4vw, 16px);
line-height: 1.6;
color: var(--text);
margin-bottom: 18px;
font-weight: 400;
}
.quiz-options {
display: flex;
flex-direction: column;
gap: 9px;
}
.quiz-opt {
padding: 12px 14px;
border-radius: 11px;
border: 1px solid var(--border);
background: var(--surface2);
color: var(--text);
font-size: 14px;
font-weight: 400;
cursor: pointer;
text-align: left;
transition: all 0.18s;
font-family: ‘DM Sans’, sans-serif;
line-height: 1.45;
display: flex;
align-items: flex-start;
gap: 10px;
}
.quiz-opt:hover { border-color: var(--accent); }
.quiz-opt.correct { background: rgba(56,217,169,0.12); border-color: var(--green); color: var(--green); }
.quiz-opt.wrong { background: rgba(255,107,107,0.1); border-color: var(--red); color: var(--red); }
.quiz-opt.show-correct { background: rgba(56,217,169,0.08); border-color: var(--green); color: var(--green); }
.quiz-opt .opt-label {
font-weight: 700;
font-size: 13px;
flex-shrink: 0;
margin-top: 1px;
opacity: 0.6;
}
.quiz-opt.correct .opt-label,
.quiz-opt.wrong .opt-label,
.quiz-opt.show-correct .opt-label { opacity: 1; }
.quiz-opt[disabled] { cursor: default; }

.quiz-explanation {
margin-top: 13px;
padding: 12px 14px;
background: rgba(79,156,249,0.07);
border: 1px solid rgba(79,156,249,0.2);
border-radius: 10px;
font-size: 13px;
color: var(--muted);
line-height: 1.55;
display: none;
}
.quiz-explanation.visible { display: block; }
.quiz-explanation strong { color: var(--accent); }

.quiz-next-btn {
width: 100%;
padding: 13px;
border-radius: 12px;
border: none;
background: var(--accent);
color: #fff;
font-size: 15px;
font-weight: 600;
cursor: pointer;
font-family: ‘DM Sans’, sans-serif;
transition: opacity 0.18s;
display: none;
}
.quiz-next-btn.visible { display: block; }
.quiz-next-btn:hover { opacity: 0.88; }

/* TF Buttons */
.tf-buttons {
display: flex;
gap: 10px;
}
.tf-btn {
flex: 1;
padding: 14px;
border-radius: 12px;
border: 1px solid var(--border);
background: var(--surface2);
color: var(--text);
font-size: 16px;
font-weight: 700;
cursor: pointer;
font-family: ‘DM Sans’, sans-serif;
transition: all 0.18s;
}
.tf-btn.true-btn:hover { background: rgba(56,217,169,0.1); border-color: var(--green); }
.tf-btn.false-btn:hover { background: rgba(255,107,107,0.1); border-color: var(--red); }
.tf-btn.correct { background: rgba(56,217,169,0.15); border-color: var(--green); color: var(--green); }
.tf-btn.wrong { background: rgba(255,107,107,0.12); border-color: var(--red); color: var(--red); }
.tf-btn[disabled] { cursor: default; }

/* Result screen */
.quiz-result {
display: none;
text-align: center;
padding: 30px 20px;
}
.quiz-result.visible { display: block; }
.result-score {
font-family: ‘Syne’, sans-serif;
font-size: 64px;
font-weight: 800;
line-height: 1;
color: var(--accent);
margin: 16px 0 8px;
}
.result-label {
font-size: 14px;
color: var(--muted);
margin-bottom: 24px;
}
.result-stats {
display: flex;
gap: 10px;
justify-content: center;
margin-bottom: 28px;
}
.stat-chip {
padding: 8px 16px;
border-radius: 12px;
font-size: 14px;
font-weight: 600;
}
.stat-chip.green { background: rgba(56,217,169,0.12); color: var(--green); }
.stat-chip.red { background: rgba(255,107,107,0.12); color: var(--red); }
.restart-btn {
padding: 13px 32px;
border-radius: 12px;
border: none;
background: var(--accent);
color: #fff;
font-size: 15px;
font-weight: 600;
cursor: pointer;
font-family: ‘DM Sans’, sans-serif;
}

/* start screen */
.quiz-start {
text-align: center;
padding: 20px 0;
}
.quiz-start h2 {
font-family: ‘Syne’, sans-serif;
font-size: 22px;
font-weight: 700;
margin-bottom: 8px;
}
.quiz-start p {
color: var(--muted);
font-size: 14px;
margin-bottom: 24px;
line-height: 1.55;
}
.start-options {
display: flex;
flex-direction: column;
gap: 10px;
max-width: 320px;
margin: 0 auto 20px;
}
.start-opt-btn {
padding: 16px 18px;
border-radius: 13px;
border: 1px solid var(--border);
background: var(--surface);
color: var(--text);
text-align: left;
cursor: pointer;
font-family: ‘DM Sans’, sans-serif;
transition: all 0.2s;
}
.start-opt-btn:hover { border-color: var(--accent); background: var(--surface2); }
.start-opt-btn .sot { font-size: 15px; font-weight: 600; display: block; margin-bottom: 3px; }
.start-opt-btn .son { font-size: 12px; color: var(--muted); }

/* scrollbar */
.main::-webkit-scrollbar { width: 4px; }
.main::-webkit-scrollbar-track { background: transparent; }
.main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

@media (min-width: 480px) {
.fc-controls { max-width: 320px; margin: 0 auto 14px; }
.start-options { gap: 12px; }
}


/* ══════════════════════════════════════
   DESIGN OVERHAUL — Premium Medical UI
══════════════════════════════════════ */

/* Enhanced root variables */
:root {
  --bg: #080d14;
  --surface: #0f1620;
  --surface2: #161f2e;
  --surface3: #1c2840;
  --border: #1e2d45;
  --border2: #243550;
  --text: #e4eaf5;
  --text2: #a8b8d8;
  --muted: #5a6e8f;
  --accent: #3d8ef0;
  --accent-glow: rgba(61,142,240,0.18);
  --accent2: #30d4a0;
  --accent2-glow: rgba(48,212,160,0.15);
  --red: #f06060;
  --green: #30d4a0;
  --yellow: #f0c030;
  --card-h: clamp(210px, 52vw, 330px);
  --radius: 14px;
  --radius-sm: 10px;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
  --shadow-lg: 0 8px 40px rgba(0,0,0,0.6);
}

/* Subtle grid background */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(61,142,240,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(61,142,240,0.025) 1px, transparent 1px);
  background-size: 32px 32px;
  pointer-events: none;
  z-index: 0;
}
.topbar, .main, .bottomnav { position: relative; z-index: 1; }

/* Enhanced topbar */
.topbar {
  background: linear-gradient(180deg, #0d1624 0%, #0a1220 100%);
  border-bottom: 1px solid var(--border2);
  padding: 14px 18px 12px;
  box-shadow: 0 2px 16px rgba(0,0,0,0.3);
}
.topbar h1 {
  font-size: 18px;
  font-weight: 800;
  letter-spacing: -0.5px;
  background: linear-gradient(135deg, var(--text) 0%, var(--text2) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.topbar h1 span {
  background: linear-gradient(135deg, var(--accent) 0%, #60b4ff 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.badge {
  font-size: 10px;
  background: linear-gradient(135deg, var(--accent) 0%, #2a7de0 100%);
  color: #fff;
  padding: 4px 10px;
  border-radius: 20px;
  font-weight: 700;
  letter-spacing: 0.3px;
  box-shadow: 0 2px 8px rgba(61,142,240,0.3);
}

/* Enhanced bottom nav */
.bottomnav {
  background: linear-gradient(180deg, #0a1220 0%, #080d14 100%);
  border-top: 1px solid var(--border2);
  box-shadow: 0 -2px 20px rgba(0,0,0,0.4);
}
.navbtn {
  padding: 10px 8px 12px;
  color: var(--muted);
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.2px;
  transition: color 0.2s, transform 0.15s;
}
.navbtn.active {
  color: var(--accent);
}
.navbtn.active svg {
  filter: drop-shadow(0 0 4px rgba(61,142,240,0.5));
}
.navbtn:active { transform: scale(0.93); }

/* Enhanced filter tabs */
.filter-row { gap: 7px; padding-bottom: 6px; }
.filter-btn {
  padding: 8px 14px;
  border-radius: 22px;
  border: 1px solid var(--border2);
  background: var(--surface);
  color: var(--text2);
  font-size: 12px;
  font-weight: 600;
  letter-spacing: 0.1px;
  transition: all 0.18s;
}
.filter-btn:active { transform: scale(0.95); }
.filter-btn.active {
  background: linear-gradient(135deg, var(--accent) 0%, #2a7de0 100%);
  border-color: var(--accent);
  color: #fff;
  box-shadow: 0 2px 12px rgba(61,142,240,0.35);
}

/* Enhanced flashcard */
.fc-counter {
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 12px;
  font-weight: 500;
  letter-spacing: 0.3px;
}
.fc-counter strong { color: var(--accent); }

.fc-scene { cursor: pointer; }
.fc-front {
  background: linear-gradient(160deg, var(--surface) 0%, var(--surface2) 100%);
  border: 1px solid var(--border2);
  box-shadow: var(--shadow);
}
.fc-front:active { transform: scale(0.98); }
.fc-back {
  background: linear-gradient(160deg, #0e1e36 0%, #112240 100%);
  border: 1px solid rgba(61,142,240,0.25);
  box-shadow: var(--shadow), 0 0 30px rgba(61,142,240,0.06);
}
.fc-tag {
  font-size: 9px;
  letter-spacing: 1.2px;
  background: var(--accent-glow);
  border: 1px solid rgba(61,142,240,0.2);
  color: var(--accent);
  padding: 4px 10px;
  border-radius: 12px;
}
.fc-question {
  font-size: clamp(14px, 3.8vw, 17px);
  line-height: 1.6;
  color: var(--text);
}
.fc-answer {
  font-size: clamp(13px, 3.6vw, 16px);
  line-height: 1.65;
  color: var(--accent2);
}
.fc-answer-label {
  color: var(--accent2);
  opacity: 0.6;
  font-size: 9px;
  letter-spacing: 1.2px;
}
.fc-tap-hint { color: var(--muted); font-size: 11px; margin-top: 14px; }

/* Enhanced fc controls */
.fc-btn {
  border-radius: var(--radius-sm);
  border: 1px solid var(--border2);
  background: var(--surface);
  color: var(--text);
  font-size: 14px;
  font-weight: 600;
  padding: 12px;
  transition: all 0.18s;
  min-height: 48px;
}
.fc-btn:active { transform: scale(0.96); }
.fc-btn:hover { background: var(--surface2); border-color: var(--accent); }
.fc-btn.primary {
  background: linear-gradient(135deg, var(--accent) 0%, #2a7de0 100%);
  border-color: transparent;
  box-shadow: 0 3px 14px rgba(61,142,240,0.35);
}
.fc-small-btn {
  border-radius: var(--radius-sm);
  border: 1px solid var(--border2);
  color: var(--muted);
  font-size: 12px;
  font-weight: 600;
  padding: 9px 18px;
  min-height: 40px;
  transition: all 0.18s;
}
.fc-small-btn:active { transform: scale(0.95); }
.fc-small-btn:hover { color: var(--text); border-color: var(--accent); }

/* Enhanced quiz start screen */
.quiz-start { text-align: center; padding: 12px 0; }
.quiz-start h2 {
  font-family: 'Syne', sans-serif;
  font-size: 22px;
  font-weight: 800;
  margin-bottom: 6px;
  background: linear-gradient(135deg, var(--text) 0%, var(--text2) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.quiz-start p { color: var(--muted); font-size: 13px; margin-bottom: 20px; }
.start-options { display: flex; flex-direction: column; gap: 9px; max-width: 340px; margin: 0 auto 16px; }

.start-opt-btn {
  padding: 14px 16px;
  border-radius: var(--radius);
  border: 1px solid var(--border2);
  background: var(--surface);
  color: var(--text);
  text-align: left;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  transition: all 0.2s;
  min-height: 56px;
  position: relative;
  overflow: hidden;
}
.start-opt-btn::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--accent);
  opacity: 0;
  transition: opacity 0.2s;
  border-radius: 3px 0 0 3px;
}
.start-opt-btn:hover { border-color: var(--accent); background: var(--surface2); }
.start-opt-btn:hover::before { opacity: 1; }
.start-opt-btn:active { transform: scale(0.98); }
.start-opt-btn .sot { font-size: 14px; font-weight: 700; display: block; margin-bottom: 3px; }
.start-opt-btn .son { font-size: 11px; color: var(--muted); }

.start-opt-all {
  border-color: var(--accent) !important;
  background: linear-gradient(135deg, rgba(61,142,240,0.1) 0%, rgba(61,142,240,0.05) 100%) !important;
}
.start-opt-all::before { opacity: 1 !important; background: linear-gradient(180deg, var(--accent) 0%, var(--accent2) 100%) !important; }
.start-opt-all .sot { color: var(--accent); }

/* Enhanced quiz active */
.quiz-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 12px;
}
.quiz-back-btn {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 7px 12px;
  border-radius: 20px;

/* ══════════════════════════════════════
   MOBILE-FIRST ENHANCEMENTS v2

/* Snap-smooth scrolling for main content */
.main { scroll-behavior: smooth; overscroll-behavior: contain; }

/* Better section padding for tall phones */
.section { padding: 14px 14px 96px; }
.section.active { display: flex; flex-direction: column; }

/* Quiz start: proper scroll on small phones */
#section-quiz .quiz-start { overflow-y: auto; }

.filter-row {
  -webkit-overflow-scrolling: touch;
  scroll-snap-type: x proximity;
  padding: 2px 0 8px;
}
.filter-btn { scroll-snap-align: start; }

/* Flashcard: larger tap area, better spacing */
.fc-scene { margin-bottom: 14px; touch-action: manipulation; }

/* Better card text overflow handling */
.fc-question, .fc-answer {
  overflow-y: auto;
  max-height: 180px;

  word-break: break-word;
  hyphens: auto;

.navbtn svg { width: 20px; height: 20px; }

@media (max-height: 500px) and (orientation: landscape) {
  :root { --card-h: 180px; }

}

}
.fc-scene { will-change: auto; }

.quiz-opt:active { opacity: 0.85; transform: scale(0.99); }

}
.quiz-result.visible .result-score {

  {cat:'bg',q:'What determines a person’s ABO blood group?',a:'The presence or absence of antigens (agglutinogens) on the RBC membrane — specifically antigen A and/or antigen B.'},

  {cat:'bg',q:'What are agglutinins?',a:'Antibodies in the plasma corresponding to blood group antigens (e.g., anti-A/alpha, anti-B/beta). A particular agglutinogen and its corresponding agglutinin CANNOT coexist.'},

  {cat:'bg',q:'What is the difference between blood matching and crossmatching?',a:'Blood matching (typing) = Recipient’s RBCs + Test antisera. Crossmatching = Recipient’s SERUM + Donor’s RBCs. Both are done before transfusion.'},
  {cat:'bg',q:'What are the three complications of an incompatible blood transfusion?',a:'(1) Jaundice — serum bilirubin rises above 2 mg/dL. (2) Cardiac shock — increased blood viscosity overloads the heart. (3) Renal shutdown — toxic substances from hemolyzed RBCs constrict renal vessels.'},

  {cat:'bg',q:'Name three examples of fixed tissue macrophages and their locations.',a:'Kupffer cells (liver), Alveolar macrophages (lungs), Microglia (brain). Also: meningocytes (meninges), reticular cells of spleen/lymph node/bone marrow.'},
  {cat:'bg',q:'Which macrophage secretion prevents rejection of transplanted organs?',a:'Transforming Growth Factor (TGF).'},
  {cat:'bg',q:'What cytokines do tissue macrophages secrete that help in immunity?',a:'Interleukin-1, Interleukin-6, and Interleukin-12.'},
  {cat:'bg',q:'What is M-CSF and what does it do?',a:'M-CSF (Colony-Stimulating Factor) secreted by macrophages accelerates growth of granulocytes, monocytes, and macrophages.'},
  {cat:'bg',q:'Why is the spleen called the "graveyard of RBCs"?',a:'Old, fragile RBCs (lifespan ~120 days) cannot withstand squeezing through thin splenic capillaries and are destroyed there. The spleen is the primary site of senile RBC destruction.'},
  {cat:'bg',q:'What are the four main functions of the spleen?',a:'(1) Formation of blood cells (hemopoiesis in embryo). (2) Destruction of old blood cells. (3) Blood reservoir — releases RBCs during hypoxia/hemorrhage. (4) Defense — macrophages phagocytose microorganisms; ~25% T cells and ~15% B cells.'},

  {cat:'bg',q:'What is the lymphatic system?',a:'A closed, ONE-WAY system of lymph channels through which lymph flows from tissue spaces toward the blood (not in reverse).'},
  {cat:'bg',q:'What is the structure of a lymph node?',a:'Small glandular structure covered by dense connective tissue capsule, arranged in three layers: cortex, paracortex, and medulla. Receives lymph via afferent vessels; drains via efferent vessels.'},
  {cat:'bg',q:'Why are lymph nodes called "defense barriers"?',a:'Macrophages in lymph nodes destroy bacteria and toxic substances passing through lymph. Water and electrolytes are filtered out; proteins and lipids are retained.'},
  {cat:'bg',q:'What is the rate of lymph flow into the blood per hour?',a:'~120 mL/hour — 100 mL/h through the thoracic duct and 20 mL/h through the right lymphatic duct.'},

/* ═══════════════════════════════════════════════
   FLASH CARDS LOGIC
═══════════════════════════════════════════════ */
let fcFilter = 'all';
let fcDeck = [];
let fcIndex = 0;
let fcFlipped = false;

function buildDeck() {
  const ALL_CARDS = [...CARDS, ...LAB_CARDS, ...WBC_CARDS, ...PLT_CARDS, ...BG_CARDS, ...MUS_CARDS];
  if (fcFilter === 'all') fcDeck = [...ALL_CARDS];
  else fcDeck = ALL_CARDS.filter(c => c.cat === fcFilter);
  fcIndex = 0;
  fcFlipped = false;
  renderCard();
}

function renderCard() {
  const card = fcDeck[fcIndex];
  document.getElementById('fcCurrent').textContent = fcIndex + 1;
  document.getElementById('fcTotal').textContent = fcDeck.length;
  document.getElementById('fcTag').textContent = card.cat === 'blood' ? '🩸 BLOOD' : card.cat === 'rbc' ? '🔴 RED BLOOD CELLS' : card.cat === 'lab' ? '🔬 LABORATORY' : card.cat === 'wbc' ? '🦠 WHITE BLOOD CELLS' : card.cat === 'plt' ? '🩹 PLATELETS & COAGULATION' : card.cat === 'bg' ? '🧬 BLOOD GROUPS & LYMPHATICS' : '💪 MUSCLE PHYSIOLOGY';
  document.getElementById('fcQuestion').textContent = card.q;
  document.getElementById('fcAnswer').textContent = card.a;
  const cardEl = document.getElementById('fcCard');
  cardEl.classList.remove('flipped');
  fcFlipped = false;
}

function flipCard() {
  fcFlipped = !fcFlipped;
  document.getElementById('fcCard').classList.toggle('flipped', fcFlipped);
}

function nextCard() {
  fcIndex = (fcIndex + 1) % fcDeck.length;
  renderCard();
}

function prevCard() {
  fcIndex = (fcIndex - 1 + fcDeck.length) % fcDeck.length;
  renderCard();
}

function shuffleCards() {
  for (let i = fcDeck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [fcDeck[i], fcDeck[j]] = [fcDeck[j], fcDeck[i]];
  }
  fcIndex = 0;
  renderCard();
}

function resetCards() {
  buildDeck();
}

function setFCFilter(f) {
  fcFilter = f;
  document.querySelectorAll('#fcFilter .filter-btn').forEach(b => b.classList.remove('active'));
  const btns = document.querySelectorAll('#fcFilter .filter-btn');
  if (f === 'all') btns[0].classList.add('active');
  else if (f === 'blood') btns[1].classList.add('active');
  else if (f === 'rbc') btns[2].classList.add('active');
  else if (f === 'lab') btns[3].classList.add('active');
  else if (f === 'wbc') btns[4].classList.add('active');
  else if (f === 'plt') btns[5].classList.add('active');
  else if (f === 'bg') btns[6].classList.add('active');
  else btns[7].classList.add('active');
  buildDeck();
}

  else if (mode === 'bg') quizDeck = [...BG_QUIZ_DATA];
  else if (mode === 'mus') quizDeck = [...MUS_QUIZ_DATA];
  else quizDeck = [...QUIZ_DATA, ...LAB_QUIZ_DATA, ...WBC_QUIZ_DATA, ...PLT_QUIZ_DATA, ...BG_QUIZ_DATA, ...MUS_QUIZ_DATA];

  // shuffle
  for (let i = quizDeck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [quizDeck[i], quizDeck[j]] = [quizDeck[j], quizDeck[i]];
  }

  quizIndex = 0;
  quizCorrect = 0;
  quizAnswered = false;

  document.getElementById('quizStart').style.display = 'none';
  document.getElementById('quizResult').classList.remove('visible');
  document.getElementById('quizActive').style.display = 'block';

  renderQuestion();
}

function renderQuestion() {
  const q = quizDeck[quizIndex];
  quizAnswered = false;

  document.getElementById('qNum').textContent = `Q${quizIndex + 1} / ${quizDeck.length}`;
  document.getElementById('qScore').textContent = `✓ ${quizCorrect}`;
  document.getElementById('qProgress').style.width = `${(quizIndex / quizDeck.length) * 100}%`;

  const badge = document.getElementById('qTypeBadge');
  badge.className = 'quiz-type-badge ' + q.type;
  badge.textContent = q.type === 'tf' ? 'TRUE / FALSE' : 'MCQ';

  document.getElementById('qQuestion').textContent = q.q;
  document.getElementById('qExplanation').classList.remove('visible');
  document.getElementById('qNextBtn').classList.remove('visible');

  const optsEl = document.getElementById('qOptions');
  optsEl.innerHTML = '';

  if (q.type === 'tf') {
    const div = document.createElement('div');
    div.className = 'tf-buttons';

    const tBtn = document.createElement('button');
    tBtn.className = 'tf-btn true-btn';
    tBtn.textContent = '✓ TRUE';
    tBtn.onclick = () => answerTF(true, tBtn, fBtn, q);

    const fBtn = document.createElement('button');
    fBtn.className = 'tf-btn false-btn';
    fBtn.textContent = '✗ FALSE';
    fBtn.onclick = () => answerTF(false, tBtn, fBtn, q);

    div.appendChild(tBtn);
    div.appendChild(fBtn);
    optsEl.appendChild(div);
  } else {
    const labels = ['A', 'B', 'C', 'D'];
    const btns = [];
    q.opts.forEach((opt, i) => {
      const btn = document.createElement('button');
      btn.className = 'quiz-opt';
      btn.innerHTML = `<span class="opt-label">${labels[i]}</span><span>${opt}</span>`;
      btn.onclick = () => answerMCQ(i, btns, q);
      optsEl.appendChild(btn);
      btns.push(btn);
    });
  }
}

function answerTF(chosen, tBtn, fBtn, q) {
  if (quizAnswered) return;
  quizAnswered = true;
  const correct = q.ans;
  const isCorrect = chosen === correct;
  if (isCorrect) quizCorrect++;

  tBtn.disabled = true;
  fBtn.disabled = true;

  if (chosen === true) {
    tBtn.classList.add(isCorrect ? 'correct' : 'wrong');
    if (!isCorrect) fBtn.classList.add('correct');
  } else {
    fBtn.classList.add(isCorrect ? 'correct' : 'wrong');
    if (!isCorrect) tBtn.classList.add('correct');
  }

  showExplanation(isCorrect, q.exp);
}

function answerMCQ(chosen, btns, q) {
  if (quizAnswered) return;
  quizAnswered = true;
  const isCorrect = chosen === q.ans;
  if (isCorrect) quizCorrect++;

  btns.forEach((b, i) => {
    b.disabled = true;
    if (i === chosen && isCorrect) b.classList.add('correct');
    else if (i === chosen && !isCorrect) b.classList.add('wrong');
    else if (i === q.ans) b.classList.add('show-correct');
  });

  showExplanation(isCorrect, q.exp);
}

function showExplanation(correct, text) {
  const el = document.getElementById('qExplanation');
  el.innerHTML = `<strong>${correct ? '✓ Correct!' : '✗ Incorrect'}</strong> — ${text}`;
  el.classList.add('visible');
  document.getElementById('qNextBtn').textContent =
    quizIndex + 1 < quizDeck.length ? 'Next Question →' : 'See Results';
  document.getElementById('qNextBtn').classList.add('visible');
  document.getElementById('qScore').textContent = `✓ ${quizCorrect}`;
}

function nextQuestion() {
  quizIndex++;
  if (quizIndex >= quizDeck.length) {
    showResult();
  } else {
    renderQuestion();
    document.querySelector('.main').scrollTop = 0;
  }
}

function showResult() {
  document.getElementById('quizActive').style.display = 'none';
  const result = document.getElementById('quizResult');
  result.classList.add('visible');
  const pct = Math.round((quizCorrect / quizDeck.length) * 100);
  document.getElementById('rScore').textContent = pct + '%';
  const wrong = quizDeck.length - quizCorrect;
  document.getElementById('rCorrect').textContent = `✓ ${quizCorrect} Correct`;
  document.getElementById('rWrong').textContent = `✗ ${wrong} Wrong`;

  let label = '';
  if (pct >= 90) label = 'Excellent! You\'re ready for the exam 🎯';
  else if (pct >= 75) label = 'Good work — review the missed questions 📖';
  else if (pct >= 60) label = 'Keep studying — you\'re getting there 💪';
  else label = 'Review the material and try again 🔁';
  document.getElementById('rLabel').textContent = label;
}

function restartQuiz() {
  document.getElementById('quizResult').classList.remove('visible');
  document.getElementById('quizStart').style.display = 'block';
  document.querySelector('.main').scrollTop = 0;
}

function quizBack() {
  if (quizIndex === 0 && !quizAnswered) {
    // No question answered yet — go back directly
    exitToMenu();
  } else {
    // Show confirmation
    document.getElementById('confirmCount').textContent = quizAnswered ? quizIndex + 1 : quizIndex;
    document.getElementById('confirmModal').style.display = 'flex';
  }
}

function exitToMenu() {
  document.getElementById('quizActive').style.display = 'none';
  document.getElementById('quizResult').classList.remove('visible');
  document.getElementById('quizStart').style.display = 'block';
  document.querySelector('.main').scrollTop = 0;
}

function closeConfirmModal() {
  document.getElementById('confirmModal').style.display = 'none';
}

function closeConfirm(e) {
  if (e.target === document.getElementById('confirmModal')) closeConfirmModal();
}

function confirmExit() {
  closeConfirmModal();
  exitToMenu();
}

/* ═══════════════════════════════════════════════
   NAVIGATION
═══════════════════════════════════════════════ */
function showSection(id) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.navbtn').forEach(b => b.classList.remove('active'));
  document.getElementById('section-' + id).classList.add('active');
  document.getElementById('nav-' + id).classList.add('active');
  document.querySelector('.main').scrollTop = 0;

  const labels = { fc: 'Flash Cards', quiz: 'Quiz' };
  document.getElementById('sectionBadge').textContent = labels[id];
}

/* ── INIT ── */
buildDeck();
</script>
