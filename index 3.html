<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Physiology — Study App</title>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#0b0f17"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0b0f17;
    --surface: #141922;
    --surface2: #1c2333;
    --border: #252d3d;
    --text: #e8edf5;
    --muted: #6b7a99;
    --accent: #4f9cf9;
    --accent2: #38d9a9;
    --red: #ff6b6b;
    --green: #38d9a9;
    --yellow: #ffd43b;
    --card-h: clamp(220px, 55vw, 340px);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    display: flex;
    flex-direction: column;
    height: 100dvh;
  }

/* ── TOP BAR ── */
.topbar {
background: var(--surface);
border-bottom: 1px solid var(--border);
padding: 14px 20px 12px;
display: flex;
align-items: center;
justify-content: space-between;
flex-shrink: 0;
}
.topbar h1 {
font-family: ‘Syne’, sans-serif;
font-size: 17px;
font-weight: 800;
letter-spacing: -0.3px;
color: var(--text);
}
.topbar h1 span { color: var(--accent); }
.badge {
font-size: 11px;
background: var(--accent);
color: #fff;
padding: 3px 9px;
border-radius: 20px;
font-weight: 600;
}

/* ── MAIN CONTENT ── */
.main {
flex: 1;
overflow-y: auto;
overflow-x: hidden;
-webkit-overflow-scrolling: touch;
}
.section { display: none; padding: 16px 16px 100px; }
.section.active { display: block; }

/* ── BOTTOM NAV ── */
.bottomnav {
display: flex;
background: var(--surface);
border-top: 1px solid var(--border);
flex-shrink: 0;
}
.navbtn {
flex: 1;
padding: 12px 8px;
background: none;
border: none;
color: var(--muted);
font-family: ‘DM Sans’, sans-serif;
font-size: 12px;
font-weight: 500;
cursor: pointer;
display: flex;
flex-direction: column;
align-items: center;
gap: 4px;
transition: color 0.2s;
}
.navbtn.active { color: var(--accent); }
.navbtn svg { width: 22px; height: 22px; }

/* ── FILTER TABS ── */
.filter-row {
display: flex;
gap: 8px;
margin-bottom: 16px;
overflow-x: auto;
padding-bottom: 4px;
scrollbar-width: none;
}
.filter-row::-webkit-scrollbar { display: none; }
.filter-btn {
flex-shrink: 0;
padding: 7px 14px;
border-radius: 20px;
border: 1px solid var(--border);
background: var(--surface);
color: var(--muted);
font-size: 13px;
font-weight: 500;
cursor: pointer;
transition: all 0.18s;
font-family: ‘DM Sans’, sans-serif;
}
.filter-btn.active {
background: var(--accent);
border-color: var(--accent);
color: #fff;
}

/* ── FLASH CARD ── */
.fc-counter {
text-align: center;
font-size: 13px;
color: var(--muted);
margin-bottom: 14px;
font-weight: 500;
}
.fc-counter strong { color: var(--accent); }
.fc-scene {
width: 100%;
height: var(--card-h);
perspective: 1000px;
cursor: pointer;
margin-bottom: 16px;
}
.fc-card {
width: 100%;
height: 100%;
position: relative;
transform-style: preserve-3d;
transition: transform 0.45s cubic-bezier(0.4,0,0.2,1);
}
.fc-card.flipped { transform: rotateY(180deg); }
.fc-front, .fc-back {
position: absolute;
inset: 0;
border-radius: 16px;
padding: 24px 22px;
display: flex;
flex-direction: column;
justify-content: center;
align-items: center;
backface-visibility: hidden;
-webkit-backface-visibility: hidden;
}
.fc-front {
background: var(--surface);
border: 1px solid var(--border);
}
.fc-back {
background: linear-gradient(135deg, #1a2540 0%, #1c2f45 100%);
border: 1px solid #2a4060;
transform: rotateY(180deg);
}
.fc-tag {
font-size: 10px;
letter-spacing: 1px;
text-transform: uppercase;
color: var(--accent);
font-weight: 700;
margin-bottom: 14px;
background: rgba(79,156,249,0.1);
padding: 3px 10px;
border-radius: 10px;
align-self: flex-start;
}
.fc-question {
font-size: clamp(14px, 4vw, 17px);
line-height: 1.55;
color: var(--text);
font-weight: 400;
text-align: center;
}
.fc-tap-hint {
font-size: 11px;
color: var(--muted);
margin-top: 16px;
display: flex;
align-items: center;
gap: 5px;
}
.fc-answer {
font-size: clamp(13px, 3.8vw, 16px);
line-height: 1.6;
color: var(--accent2);
font-weight: 500;
text-align: center;
}
.fc-answer-label {
font-size: 10px;
letter-spacing: 1px;
color: var(--accent2);
text-transform: uppercase;
font-weight: 700;
margin-bottom: 12px;
opacity: 0.7;
}

.fc-controls {
display: flex;
gap: 10px;
justify-content: center;
margin-bottom: 14px;
}
.fc-btn {
flex: 1;
max-width: 130px;
padding: 11px;
border-radius: 12px;
border: 1px solid var(--border);
background: var(--surface);
color: var(--text);
font-size: 14px;
font-weight: 600;
cursor: pointer;
transition: all 0.18s;
font-family: ‘DM Sans’, sans-serif;
display: flex;
align-items: center;
justify-content: center;
gap: 6px;
}
.fc-btn:hover { background: var(--surface2); border-color: var(--accent); }
.fc-btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }

.fc-shuffle-row {
display: flex;
justify-content: center;
gap: 10px;
}
.fc-small-btn {
padding: 8px 16px;
border-radius: 10px;
border: 1px solid var(--border);
background: none;
color: var(--muted);
font-size: 12px;
font-weight: 500;
cursor: pointer;
font-family: ‘DM Sans’, sans-serif;
transition: all 0.18s;
display: flex;
align-items: center;
gap: 5px;
}
.fc-small-btn:hover { color: var(--text); border-color: var(--text); }

/* ── QUIZ ── */
.quiz-header {
display: flex;
align-items: center;
justify-content: space-between;
margin-bottom: 14px;
}
.quiz-progress-bar {
height: 4px;
background: var(--surface2);
border-radius: 4px;
margin-bottom: 16px;
overflow: hidden;
}
.quiz-progress-fill {
height: 100%;
background: var(--accent);
border-radius: 4px;
transition: width 0.3s ease;
}
.quiz-score-chip {
font-size: 13px;
font-weight: 600;
color: var(--accent2);
background: rgba(56,217,169,0.1);
padding: 4px 12px;
border-radius: 20px;
}
.quiz-q-num {
font-size: 13px;
color: var(--muted);
font-weight: 500;
}
.quiz-type-badge {
font-size: 10px;
padding: 3px 9px;
border-radius: 10px;
font-weight: 700;
letter-spacing: 0.5px;
text-transform: uppercase;
}
.quiz-type-badge.tf { background: rgba(255,212,59,0.15); color: var(--yellow); }
.quiz-type-badge.mcq { background: rgba(79,156,249,0.15); color: var(--accent); }

.quiz-card {
background: var(--surface);
border: 1px solid var(--border);
border-radius: 16px;
padding: 20px 18px;
margin-bottom: 14px;
}
.quiz-question {
font-size: clamp(14px, 4vw, 16px);
line-height: 1.6;
color: var(--text);
margin-bottom: 18px;
font-weight: 400;
}
.quiz-options {
display: flex;
flex-direction: column;
gap: 9px;
}
.quiz-opt {
padding: 12px 14px;
border-radius: 11px;
border: 1px solid var(--border);
background: var(--surface2);
color: var(--text);
font-size: 14px;
font-weight: 400;
cursor: pointer;
text-align: left;
transition: all 0.18s;
font-family: ‘DM Sans’, sans-serif;
line-height: 1.45;
display: flex;
align-items: flex-start;
gap: 10px;
}
.quiz-opt:hover { border-color: var(--accent); }
.quiz-opt.correct { background: rgba(56,217,169,0.12); border-color: var(--green); color: var(--green); }
.quiz-opt.wrong { background: rgba(255,107,107,0.1); border-color: var(--red); color: var(--red); }
.quiz-opt.show-correct { background: rgba(56,217,169,0.08); border-color: var(--green); color: var(--green); }
.quiz-opt .opt-label {
font-weight: 700;
font-size: 13px;
flex-shrink: 0;
margin-top: 1px;
opacity: 0.6;
}
.quiz-opt.correct .opt-label,
.quiz-opt.wrong .opt-label,
.quiz-opt.show-correct .opt-label { opacity: 1; }
.quiz-opt[disabled] { cursor: default; }

.quiz-explanation {
margin-top: 13px;
padding: 12px 14px;
background: rgba(79,156,249,0.07);
border: 1px solid rgba(79,156,249,0.2);
border-radius: 10px;
font-size: 13px;
color: var(--muted);
line-height: 1.55;
display: none;
}
.quiz-explanation.visible { display: block; }
.quiz-explanation strong { color: var(--accent); }

.quiz-next-btn {
width: 100%;
padding: 13px;
border-radius: 12px;
border: none;
background: var(--accent);
color: #fff;
font-size: 15px;
font-weight: 600;
cursor: pointer;
font-family: ‘DM Sans’, sans-serif;
transition: opacity 0.18s;
display: none;
}
.quiz-next-btn.visible { display: block; }
.quiz-next-btn:hover { opacity: 0.88; }

/* TF Buttons */
.tf-buttons {
display: flex;
gap: 10px;
}
.tf-btn {
flex: 1;
padding: 14px;
border-radius: 12px;
border: 1px solid var(--border);
background: var(--surface2);
color: var(--text);
font-size: 16px;
font-weight: 700;
cursor: pointer;
font-family: ‘DM Sans’, sans-serif;
transition: all 0.18s;
}
.tf-btn.true-btn:hover { background: rgba(56,217,169,0.1); border-color: var(--green); }
.tf-btn.false-btn:hover { background: rgba(255,107,107,0.1); border-color: var(--red); }
.tf-btn.correct { background: rgba(56,217,169,0.15); border-color: var(--green); color: var(--green); }
.tf-btn.wrong { background: rgba(255,107,107,0.12); border-color: var(--red); color: var(--red); }
.tf-btn[disabled] { cursor: default; }

/* Result screen */
.quiz-result {
display: none;
text-align: center;
padding: 30px 20px;
}
.quiz-result.visible { display: block; }
.result-score {
font-family: ‘Syne’, sans-serif;
font-size: 64px;
font-weight: 800;
line-height: 1;
color: var(--accent);
margin: 16px 0 8px;
}
.result-label {
font-size: 14px;
color: var(--muted);
margin-bottom: 24px;
}
.result-stats {
display: flex;
gap: 10px;
justify-content: center;
margin-bottom: 28px;
}
.stat-chip {
padding: 8px 16px;
border-radius: 12px;
font-size: 14px;
font-weight: 600;
}
.stat-chip.green { background: rgba(56,217,169,0.12); color: var(--green); }
.stat-chip.red { background: rgba(255,107,107,0.12); color: var(--red); }
.restart-btn {
padding: 13px 32px;
border-radius: 12px;
border: none;
background: var(--accent);
color: #fff;
font-size: 15px;
font-weight: 600;
cursor: pointer;
font-family: ‘DM Sans’, sans-serif;
}

/* start screen */
.quiz-start {
text-align: center;
padding: 20px 0;
}
.quiz-start h2 {
font-family: ‘Syne’, sans-serif;
font-size: 22px;
font-weight: 700;
margin-bottom: 8px;
}
.quiz-start p {
color: var(--muted);
font-size: 14px;
margin-bottom: 24px;
line-height: 1.55;
}
.start-options {
display: flex;
flex-direction: column;
gap: 10px;
max-width: 320px;
margin: 0 auto 20px;
}
.start-opt-btn {
padding: 16px 18px;
border-radius: 13px;
border: 1px solid var(--border);
background: var(--surface);
color: var(--text);
text-align: left;
cursor: pointer;
font-family: ‘DM Sans’, sans-serif;
transition: all 0.2s;
}
.start-opt-btn:hover { border-color: var(--accent); background: var(--surface2); }
.start-opt-btn .sot { font-size: 15px; font-weight: 600; display: block; margin-bottom: 3px; }
.start-opt-btn .son { font-size: 12px; color: var(--muted); }

/* scrollbar */
.main::-webkit-scrollbar { width: 4px; }
.main::-webkit-scrollbar-track { background: transparent; }
.main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

@media (min-width: 480px) {
.fc-controls { max-width: 320px; margin: 0 auto 14px; }
.start-options { gap: 12px; }
}

/* ── MOBILE & iOS FIXES ── */
/* Safe area insets for iPhone notch/home bar */
body {
  padding-bottom: env(safe-area-inset-bottom);
}
.bottomnav {
  padding-bottom: env(safe-area-inset-bottom);
}
.topbar {
  padding-top: max(14px, env(safe-area-inset-top));
}

/* Prevent iOS text size adjust */
html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }

/* Prevent tap highlight on buttons */
button, [role="button"] {
  -webkit-tap-highlight-color: transparent;
  touch-action: manipulation;
}

/* Minimum tap target size (44px) for all interactive elements */
.navbtn { min-height: 52px; }
.fc-btn { min-height: 48px; }
.fc-small-btn { min-height: 44px; padding: 10px 18px; }
.filter-btn { min-height: 38px; }
.quiz-opt { min-height: 52px; padding: 14px; }
.tf-btn { min-height: 56px; padding: 16px; }
.quiz-next-btn { min-height: 52px; padding: 15px; }
.restart-btn { min-height: 52px; padding: 15px 36px; }
.start-opt-btn { min-height: 56px; padding: 16px 18px; }

/* Fix font sizes to prevent iOS auto-zoom (must be >= 16px on inputs) */
.quiz-opt { font-size: 15px; }
.tf-btn { font-size: 17px; }
.quiz-next-btn { font-size: 16px; }

/* Better card flip on mobile */
.fc-scene { -webkit-perspective: 1000px; }
.fc-card { -webkit-transform-style: preserve-3d; }
.fc-front, .fc-back { -webkit-backface-visibility: hidden; }

/* Improve touch scrolling */
.main { -webkit-overflow-scrolling: touch; scroll-behavior: smooth; }
.filter-row { -webkit-overflow-scrolling: touch; }

/* Better visual feedback for card tap */
.fc-scene:active { opacity: 0.92; transform: scale(0.995); }
.fc-scene { transition: opacity 0.1s, transform 0.1s; }

/* Prevent text selection on tap */
.fc-scene, .navbtn, .fc-btn, .fc-small-btn, .filter-btn { user-select: none; -webkit-user-select: none; }

/* Desktop: constrain width */
@media (min-width: 600px) {
  body { max-width: 480px; margin: 0 auto; border-left: 1px solid var(--border); border-right: 1px solid var(--border); }
}

/* Very small screens (SE, etc.) */
@media (max-width: 360px) {
  .topbar h1 { font-size: 15px; }
  .fc-controls { gap: 8px; }
  .fc-btn { font-size: 13px; }
  .result-score { font-size: 52px; }
}

</style>

</head>
<body>

<div class="topbar">
  <h1>Physio<span>logy</span></h1>
  <span class="badge" id="sectionBadge">Flash Cards</span>
</div>

<div class="main">

  <!-- ════════════ FLASH CARDS SECTION ════════════ -->

  <div class="section active" id="section-fc">
    <div class="filter-row" id="fcFilter">
      <button class="filter-btn active" onclick="setFCFilter('all')">All (270)</button>
      <button class="filter-btn" onclick="setFCFilter('blood')">🩸 Blood (30)</button>
      <button class="filter-btn" onclick="setFCFilter('rbc')">🔴 Red Blood Cells (100)</button>
      <button class="filter-btn" onclick="setFCFilter('lab')">🔬 Laboratory (50)</button>
      <button class="filter-btn" onclick="setFCFilter('wbc')">🦠 WBCs (50)</button>
      <button class="filter-btn" onclick="setFCFilter('plt')">🩹 Platelets (40)</button>
    </div>

<div class="fc-counter">
  Card <strong id="fcCurrent">1</strong> of <strong id="fcTotal">130</strong>
</div>

<div class="fc-scene" id="fcScene" onclick="flipCard()">
  <div class="fc-card" id="fcCard">
    <div class="fc-front">
      <div class="fc-tag" id="fcTag">BLOOD</div>
      <p class="fc-question" id="fcQuestion">Loading...</p>
      <p class="fc-tap-hint">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M9 18l6-6-6-6"/></svg>
        Tap to reveal answer
      </p>
    </div>
    <div class="fc-back">
      <p class="fc-answer-label">Answer</p>
      <p class="fc-answer" id="fcAnswer">—</p>
    </div>
  </div>
</div>

<div class="fc-controls">
  <button class="fc-btn" onclick="prevCard()">← Prev</button>
  <button class="fc-btn primary" onclick="nextCard()">Next →</button>
</div>

<div class="fc-shuffle-row">
  <button class="fc-small-btn" onclick="shuffleCards()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M16 3h5v5M4 20L21 3M21 16v5h-5M15 15l6 6M4 4l5 5"/></svg>
    Shuffle
  </button>
  <button class="fc-small-btn" onclick="resetCards()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 005.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 013.51 15"/></svg>
    Reset
  </button>
</div>

  </div>

  <!-- ════════════ QUIZ SECTION ════════════ -->

  <div class="section" id="section-quiz">

<!-- Start Screen -->
<div id="quizStart" class="quiz-start">
  <h2>Quiz Mode</h2>
  <p>Choose a subject to start your quiz session.</p>
  <div class="start-options">
    <button class="start-opt-btn" onclick="startQuiz('rbc')">
      <span class="sot">🔴 Red Blood Cells</span>
      <span class="son">70 questions — True/False & MCQ</span>
    </button>
    <button class="start-opt-btn" onclick="startQuiz('lab')">
      <span class="sot">🔬 Laboratory Physiology</span>
      <span class="son">70 questions — MCQ, T/F & Complete</span>
    </button>
    <button class="start-opt-btn" onclick="startQuiz('wbc')">
      <span class="sot">🦠 White Blood Cells</span>
      <span class="son">60 questions — T/F & MCQ</span>
    </button>
    <button class="start-opt-btn" onclick="startQuiz('plt')">
      <span class="sot">🩹 Platelets & Coagulation</span>
      <span class="son">40 questions — T/F & MCQ</span>
    </button>
    <button class="start-opt-btn" onclick="startQuiz('all')" style="border-color:var(--accent);background:rgba(79,156,249,0.07);">
      <span class="sot" style="color:var(--accent)">⚡ All Subjects</span>
      <span class="son">All 240 questions combined & shuffled</span>
    </button>
  </div>
</div>

<!-- Active Quiz -->
<div id="quizActive" style="display:none;">
  <div class="quiz-header">
    <span class="quiz-q-num" id="qNum">Q1 / 70</span>
    <span class="quiz-score-chip" id="qScore">✓ 0</span>
  </div>
  <div class="quiz-progress-bar">
    <div class="quiz-progress-fill" id="qProgress" style="width:0%"></div>
  </div>
  <div class="quiz-card">
    <span class="quiz-type-badge" id="qTypeBadge">T/F</span>
    <p class="quiz-question" id="qQuestion" style="margin-top:10px;">—</p>
    <div class="quiz-options" id="qOptions"></div>
    <div class="quiz-explanation" id="qExplanation"></div>
  </div>
  <button class="quiz-next-btn" id="qNextBtn" onclick="nextQuestion()">Next Question →</button>
</div>

<!-- Result Screen -->
<div id="quizResult" class="quiz-result">
  <p style="color:var(--muted);font-size:13px;">Your Score</p>
  <div class="result-score" id="rScore">0%</div>
  <p class="result-label" id="rLabel">—</p>
  <div class="result-stats">
    <div class="stat-chip green" id="rCorrect">✓ 0 Correct</div>
    <div class="stat-chip red" id="rWrong">✗ 0 Wrong</div>
  </div>
  <button class="restart-btn" onclick="restartQuiz()">Try Again</button>
</div>

  </div>
</div>

<nav class="bottomnav">
  <button class="navbtn active" id="nav-fc" onclick="showSection('fc')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>
    </svg>
    Flash Cards
  </button>
  <button class="navbtn" id="nav-quiz" onclick="showSection('quiz')">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/>
    </svg>
    Quiz
  </button>
</nav>

<script>
/* ═══════════════════════════════════════════════
   FLASH CARD DATA
═══════════════════════════════════════════════ */
const CARDS = [
  // ── BLOOD (30) ──
  {cat:'blood',q:'What type of tissue is blood?',a:'Fluid connective tissue — considered the "fluid of life"'},

/* ═══════════════════════════════════════════════
   FLASH CARDS LOGIC
═══════════════════════════════════════════════ */
let fcFilter = 'all';
let fcDeck = [];
let fcIndex = 0;
let fcFlipped = false;

function buildDeck() {
  const ALL_CARDS = [...CARDS, ...LAB_CARDS, ...WBC_CARDS, ...PLT_CARDS];
  if (fcFilter === 'all') fcDeck = [...ALL_CARDS];
  else fcDeck = ALL_CARDS.filter(c => c.cat === fcFilter);
  fcIndex = 0;
  fcFlipped = false;
  renderCard();
}

function renderCard() {
  const card = fcDeck[fcIndex];
  document.getElementById('fcCurrent').textContent = fcIndex + 1;
  document.getElementById('fcTotal').textContent = fcDeck.length;
  document.getElementById('fcTag').textContent = card.cat === 'blood' ? '🩸 BLOOD' : card.cat === 'rbc' ? '🔴 RED BLOOD CELLS' : card.cat === 'lab' ? '🔬 LABORATORY' : card.cat === 'wbc' ? '🦠 WHITE BLOOD CELLS' : '🩹 PLATELETS & COAGULATION';
  document.getElementById('fcQuestion').textContent = card.q;
  document.getElementById('fcAnswer').textContent = card.a;
  const cardEl = document.getElementById('fcCard');
  cardEl.classList.remove('flipped');
  fcFlipped = false;
}

function flipCard() {
  fcFlipped = !fcFlipped;
  document.getElementById('fcCard').classList.toggle('flipped', fcFlipped);
}

function nextCard() {
  fcIndex = (fcIndex + 1) % fcDeck.length;
  renderCard();
}

function prevCard() {
  fcIndex = (fcIndex - 1 + fcDeck.length) % fcDeck.length;
  renderCard();
}

function shuffleCards() {
  for (let i = fcDeck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [fcDeck[i], fcDeck[j]] = [fcDeck[j], fcDeck[i]];
  }
  fcIndex = 0;
  renderCard();
}

function resetCards() {
  buildDeck();
}

function setFCFilter(f) {
  fcFilter = f;
  document.querySelectorAll('#fcFilter .filter-btn').forEach(b => b.classList.remove('active'));
  const btns = document.querySelectorAll('#fcFilter .filter-btn');
  if (f === 'all') btns[0].classList.add('active');
  else if (f === 'blood') btns[1].classList.add('active');
  else if (f === 'rbc') btns[2].classList.add('active');
  else if (f === 'lab') btns[3].classList.add('active');
  else if (f === 'wbc') btns[4].classList.add('active');
  else btns[5].classList.add('active');
  buildDeck();
}

/* ═══════════════════════════════════════════════
   QUIZ LOGIC
═══════════════════════════════════════════════ */
let quizDeck = [];
let quizIndex = 0;
let quizCorrect = 0;
let quizAnswered = false;

function startQuiz(mode) {
  if (mode === 'rbc') quizDeck = [...QUIZ_DATA];
  else if (mode === 'lab') quizDeck = [...LAB_QUIZ_DATA];
  else if (mode === 'wbc') quizDeck = [...WBC_QUIZ_DATA];
  else if (mode === 'plt') quizDeck = [...PLT_QUIZ_DATA];
  else quizDeck = [...QUIZ_DATA, ...LAB_QUIZ_DATA, ...WBC_QUIZ_DATA, ...PLT_QUIZ_DATA];

  // shuffle
  for (let i = quizDeck.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [quizDeck[i], quizDeck[j]] = [quizDeck[j], quizDeck[i]];
  }

  quizIndex = 0;
  quizCorrect = 0;
  quizAnswered = false;

  document.getElementById('quizStart').style.display = 'none';
  document.getElementById('quizResult').classList.remove('visible');
  document.getElementById('quizActive').style.display = 'block';

  renderQuestion();
}

function renderQuestion() {
  const q = quizDeck[quizIndex];
  quizAnswered = false;

  document.getElementById('qNum').textContent = `Q${quizIndex + 1} / ${quizDeck.length}`;
  document.getElementById('qScore').textContent = `✓ ${quizCorrect}`;
  document.getElementById('qProgress').style.width = `${(quizIndex / quizDeck.length) * 100}%`;

  const badge = document.getElementById('qTypeBadge');
  badge.className = 'quiz-type-badge ' + q.type;
  badge.textContent = q.type === 'tf' ? 'TRUE / FALSE' : 'MCQ';

  document.getElementById('qQuestion').textContent = q.q;
  document.getElementById('qExplanation').classList.remove('visible');
  document.getElementById('qNextBtn').classList.remove('visible');

  const optsEl = document.getElementById('qOptions');
  optsEl.innerHTML = '';

  if (q.type === 'tf') {
    const div = document.createElement('div');
    div.className = 'tf-buttons';

    const tBtn = document.createElement('button');
    tBtn.className = 'tf-btn true-btn';
    tBtn.textContent = '✓ TRUE';
    tBtn.onclick = () => answerTF(true, tBtn, fBtn, q);

    const fBtn = document.createElement('button');
    fBtn.className = 'tf-btn false-btn';
    fBtn.textContent = '✗ FALSE';
    fBtn.onclick = () => answerTF(false, tBtn, fBtn, q);

    div.appendChild(tBtn);
    div.appendChild(fBtn);
    optsEl.appendChild(div);
  } else {
    const labels = ['A', 'B', 'C', 'D'];
    const btns = [];
    q.opts.forEach((opt, i) => {
      const btn = document.createElement('button');
      btn.className = 'quiz-opt';
      btn.innerHTML = `<span class="opt-label">${labels[i]}</span><span>${opt}</span>`;
      btn.onclick = () => answerMCQ(i, btns, q);
      optsEl.appendChild(btn);
      btns.push(btn);
    });
  }
}

function answerTF(chosen, tBtn, fBtn, q) {
  if (quizAnswered) return;
  quizAnswered = true;
  const correct = q.ans;
  const isCorrect = chosen === correct;
  if (isCorrect) quizCorrect++;

  tBtn.disabled = true;
  fBtn.disabled = true;

  if (chosen === true) {
    tBtn.classList.add(isCorrect ? 'correct' : 'wrong');
    if (!isCorrect) fBtn.classList.add('correct');
  } else {
    fBtn.classList.add(isCorrect ? 'correct' : 'wrong');
    if (!isCorrect) tBtn.classList.add('correct');
  }

  showExplanation(isCorrect, q.exp);
}

function answerMCQ(chosen, btns, q) {
  if (quizAnswered) return;
  quizAnswered = true;
  const isCorrect = chosen === q.ans;
  if (isCorrect) quizCorrect++;

  btns.forEach((b, i) => {
    b.disabled = true;
    if (i === chosen && isCorrect) b.classList.add('correct');
    else if (i === chosen && !isCorrect) b.classList.add('wrong');
    else if (i === q.ans) b.classList.add('show-correct');
  });

  showExplanation(isCorrect, q.exp);
}

function showExplanation(correct, text) {
  const el = document.getElementById('qExplanation');
  el.innerHTML = `<strong>${correct ? '✓ Correct!' : '✗ Incorrect'}</strong> — ${text}`;
  el.classList.add('visible');
  document.getElementById('qNextBtn').textContent =
    quizIndex + 1 < quizDeck.length ? 'Next Question →' : 'See Results';
  document.getElementById('qNextBtn').classList.add('visible');
  document.getElementById('qScore').textContent = `✓ ${quizCorrect}`;
}

function nextQuestion() {
  quizIndex++;
  if (quizIndex >= quizDeck.length) {
    showResult();
  } else {
    renderQuestion();
    document.querySelector('.main').scrollTop = 0;
  }
}

function showResult() {
  document.getElementById('quizActive').style.display = 'none';
  const result = document.getElementById('quizResult');
  result.classList.add('visible');
  const pct = Math.round((quizCorrect / quizDeck.length) * 100);
  document.getElementById('rScore').textContent = pct + '%';
  const wrong = quizDeck.length - quizCorrect;
  document.getElementById('rCorrect').textContent = `✓ ${quizCorrect} Correct`;
  document.getElementById('rWrong').textContent = `✗ ${wrong} Wrong`;

  let label = '';
  if (pct >= 90) label = 'Excellent! You\'re ready for the exam 🎯';
  else if (pct >= 75) label = 'Good work — review the missed questions 📖';
  else if (pct >= 60) label = 'Keep studying — you\'re getting there 💪';
  else label = 'Review the material and try again 🔁';
  document.getElementById('rLabel').textContent = label;
}

function restartQuiz() {
  document.getElementById('quizResult').classList.remove('visible');
  document.getElementById('quizStart').style.display = 'block';
  document.querySelector('.main').scrollTop = 0;
}

/* ═══════════════════════════════════════════════
   NAVIGATION
═══════════════════════════════════════════════ */
function showSection(id) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.navbtn').forEach(b => b.classList.remove('active'));
  document.getElementById('section-' + id).classList.add('active');
  document.getElementById('nav-' + id).classList.add('active');
  document.querySelector('.main').scrollTop = 0;

  const labels = { fc: 'Flash Cards', quiz: 'Quiz' };
  document.getElementById('sectionBadge').textContent = labels[id];
}

/* ── INIT ── */
buildDeck();
</script>
